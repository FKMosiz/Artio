<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Artio — Clients</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg:        #080b14;
  --surface:   #0e1220;
  --surface-2: #141829;
  --surface-3: #1a2035;
  --border:    rgba(255,255,255,0.07);
  --border-hi: rgba(255,255,255,0.13);
  --text:      #e2e5f1;
  --muted:     #6b7494;
  --amber:     #f5a742;
  --amber-dim: rgba(245,167,66,0.12);
  --amber-glow:rgba(245,167,66,0.26);
  --teal:      #3ecfcf;
  --teal-dim:  rgba(62,207,207,0.11);
  --purple:    #a78bfa;
  --fh: 'Space Grotesk', sans-serif;
  --fb: 'Plus Jakarta Sans', sans-serif;
  --r: 12px;
  --nav-h: 60px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--fb);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex; flex-direction: column;
}

/* ── NAV ── */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: var(--nav-h); padding: 0 20px;
  display: flex; align-items: center; gap: 16px;
  background: rgba(8,11,20,0.85); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}
.nav-logo { font-family: var(--fh); font-size: 18px; font-weight: 700; color: var(--amber); letter-spacing:-0.02em; text-decoration:none; flex-shrink:0; }
.nav-links { display: flex; gap: 3px; flex: 1; justify-content: center; overflow-x: auto; }
.nav-link { padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 500; color: var(--muted); text-decoration: none; white-space: nowrap; border: none; background: transparent; cursor: pointer; font-family: var(--fb); transition: color .2s, background .2s; }
.nav-link:hover { color: var(--text); background: var(--surface); }
.nav-link.active { color: var(--amber); background: var(--amber-dim); font-weight: 600; }
.nav-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.btn-logout { padding: 6px 14px; border-radius: 8px; font-size: 12px; font-weight: 500; background: transparent; border: 1px solid var(--border); color: var(--muted); cursor: pointer; font-family: var(--fb); transition: all .2s; }
.btn-logout:hover { border-color: var(--border-hi); color: var(--text); }

/* ── PAGE ── */
.page { flex:1; padding: calc(var(--nav-h) + 20px) 20px 40px; max-width: 860px; margin: 0 auto; width: 100%; }

/* ── TOOLBAR ── */
.page-toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
.page-title { font-family: var(--fh); font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
.page-title span { font-size: 14px; color: var(--muted); font-weight: 400; font-family: var(--fb); margin-left: 6px; }
.btn-new {
  padding: 9px 20px; border-radius: 10px; font-size: 13px; font-weight: 600;
  background: var(--amber); border: none; color: #080b14;
  cursor: pointer; font-family: var(--fb);
  box-shadow: 0 0 20px var(--amber-glow); transition: transform .15s, box-shadow .15s;
}
.btn-new:hover { transform: translateY(-1px); }

/* ── SEARCH ── */
.search-wrap {
  display: flex; align-items: center; gap: 10px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 10px 14px; margin-bottom: 16px;
  transition: border-color .2s;
}
.search-wrap:focus-within { border-color: var(--amber); }
.search-wrap svg { color: var(--muted); flex-shrink: 0; }
.search-input { flex: 1; background: none; border: none; outline: none; color: var(--text); font-size: 14px; font-family: var(--fb); }
.search-input::placeholder { color: var(--muted); }

/* ── CLIENT CARD ── */
.client-card {
  display: flex; align-items: center; gap: 14px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); padding: 14px 16px; margin-bottom: 8px;
  cursor: pointer; transition: border-color .2s, background .2s;
}
.client-card:hover { border-color: var(--border-hi); background: var(--surface-2); }
.client-av {
  width: 42px; height: 42px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--fh); font-size: 15px; font-weight: 700;
  background: var(--amber-dim); color: var(--amber);
}
.client-info { flex: 1; min-width: 0; }
.client-name { font-family: var(--fh); font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.client-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
.client-meta { text-align: right; flex-shrink: 0; }
.client-docs { font-size: 11px; color: var(--muted); }
.client-ca { font-size: 13px; font-weight: 700; color: var(--teal); margin-top: 2px; }

/* ── EMPTY ── */
.empty-state { text-align: center; padding: 48px 24px; color: var(--muted); }
.empty-icon { font-size: 40px; margin-bottom: 12px; }
.empty-txt { font-size: 14px; margin-bottom: 16px; }

/* ── PANEL ── */
.overlay { display: none; position: fixed; inset: 0; z-index: 299; background: rgba(0,0,0,.5); backdrop-filter: blur(4px); }
.overlay.open { display: block; }
.panel {
  position: fixed; top: 0; right: -440px; bottom: 0; width: 420px;
  background: var(--surface); border-left: 1px solid var(--border-hi);
  z-index: 300; overflow-y: auto;
  box-shadow: -12px 0 40px rgba(0,0,0,.45);
  transition: right .25s cubic-bezier(.4,0,.2,1);
  display: flex; flex-direction: column;
}
.panel.open { right: 0; }
.panel-head {
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 20px 20px 16px; border-bottom: 1px solid var(--border);
  position: sticky; top: 0; background: var(--surface); z-index: 2;
}
.panel-title { font-family: var(--fh); font-size: 16px; font-weight: 700; }
.panel-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
.panel-close {
  width: 28px; height: 28px; border-radius: 7px; display: flex; align-items: center; justify-content: center;
  background: var(--surface-2); border: 1px solid var(--border); color: var(--muted);
  cursor: pointer; font-size: 14px; flex-shrink: 0; transition: all .2s;
}
.panel-close:hover { border-color: var(--border-hi); color: var(--text); }
.panel-body { padding: 16px 20px; flex: 1; }

/* Panel form */
.field { margin-bottom: 14px; }
.field-label { display: block; font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing:.04em; margin-bottom: 6px; }
.field-input {
  width: 100%; padding: 10px 12px;
  background: var(--surface-2); border: 1px solid var(--border);
  border-radius: 9px; color: var(--text); font-size: 13px; font-family: var(--fb); outline: none;
  transition: border-color .2s;
}
.field-input:focus { border-color: var(--amber); }
.field-input::placeholder { color: var(--muted); }
textarea.field-input { resize: vertical; min-height: 70px; }

/* Buttons in panel */
.btn-panel-primary {
  width: 100%; padding: 12px; border-radius: 10px; font-size: 14px; font-weight: 600;
  background: var(--amber); border: none; color: #080b14;
  cursor: pointer; font-family: var(--fb); margin-top: 4px;
  box-shadow: 0 0 20px var(--amber-glow); transition: transform .15s;
  display: block; text-align: center; text-decoration: none;
}
.btn-panel-primary:hover { transform: translateY(-1px); }
.btn-panel-ghost {
  width: 100%; padding: 10px; border-radius: 10px; font-size: 13px; font-weight: 500;
  background: transparent; border: 1px solid var(--border); color: var(--muted);
  cursor: pointer; font-family: var(--fb); margin-top: 8px; transition: all .2s;
}
.btn-panel-ghost:hover { border-color: var(--border-hi); color: var(--text); }
.btn-panel-danger {
  width: 100%; padding: 10px; border-radius: 10px; font-size: 13px; font-weight: 500;
  background: rgba(248,113,113,.08); border: 1px solid rgba(248,113,113,.2); color: #f87171;
  cursor: pointer; font-family: var(--fb); margin-top: 8px; transition: all .2s;
}
.btn-panel-danger:hover { background: rgba(248,113,113,.15); }
.btn-sm {
  padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 500;
  background: var(--surface-3); border: 1px solid var(--border); color: var(--muted);
  cursor: pointer; font-family: var(--fb); transition: all .2s; white-space: nowrap;
}
.btn-sm:hover { border-color: var(--border-hi); color: var(--text); }
.btn-sm-amber { background: var(--amber-dim); color: var(--amber); border-color: rgba(245,167,66,.25); }
.btn-sm-teal { background: var(--teal-dim); color: var(--teal); border-color: rgba(62,207,207,.25); }
.btn-sm-purple { background: rgba(167,139,250,.1); color: var(--purple); border-color: rgba(167,139,250,.25); }

/* Dossier in panel */
.divider { height: 1px; background: var(--border); margin: 16px 0; }
.section-label { font-size: 11px; font-weight: 700; letter-spacing:.07em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
.dos-card {
  background: var(--surface-2); border: 1px solid var(--border);
  border-radius: 10px; margin-bottom: 8px; overflow: hidden;
}
.dos-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 11px 14px; cursor: pointer; user-select: none;
  transition: background .15s;
}
.dos-header:hover { background: var(--surface-3); }
.dos-badge {
  display: inline-flex; align-items: center;
  font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 100px;
  letter-spacing: .04em; margin-bottom: 3px;
}
.dos-name { font-size: 13px; font-weight: 600; }
.dos-meta { font-size: 11px; color: var(--muted); margin-top: 1px; }
.dos-doc-row {
  border-top: 1px solid var(--border); padding: 10px 14px;
  display: flex; flex-direction: column; gap: 6px;
}
.doc-row-top { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 6px; }
.doc-num { font-size: 12px; font-weight: 600; }
.doc-date { font-size: 11px; color: var(--muted); }
.doc-actions { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }
.doc-apercu { margin-top: 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px; font-size: 12px; line-height: 1.6; }

/* Toast */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--surface-2); border: 1px solid var(--border-hi);
  color: var(--text); padding: 12px 22px; border-radius: 12px;
  font-size: 13px; font-weight: 500; z-index: 9999;
  box-shadow: 0 8px 32px rgba(0,0,0,.4);
  transition: opacity .4s; opacity: 0; pointer-events: none;
}

/* Checkbox */
.check-row { display: flex; align-items: center; gap: 10px; cursor: pointer; }
.check-row input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--amber); flex-shrink: 0; }
.check-row span { font-size: 13px; }

.warning-box {
  background: rgba(245,167,66,.07); border: 1px solid rgba(245,167,66,.2);
  border-radius: 10px; padding: 12px 14px; margin-bottom: 14px;
  font-size: 12px; color: var(--muted); line-height: 1.6;
}
.warning-box strong { color: var(--amber); }

@media(max-width:580px) {
  .nav-links { display: none; }
  .panel { width: 100%; right: -100%; }
  .page { padding: calc(var(--nav-h) + 12px) 12px 24px; }
}

    /* ── FOOTER LÉGAL ── */
    .artio-legal-footer {
      position: relative; z-index: 1;
      text-align: center; padding: 12px 16px;
      font-size: 11px; color: var(--muted, #6b7494);
      border-top: 1px solid var(--border, rgba(255,255,255,0.07));
    }
    .artio-legal-footer a {
      color: var(--muted, #6b7494); text-decoration: none;
      transition: color 0.2s;
    }
    .artio-legal-footer a:hover { color: var(--amber, #f5a742); }
</style>
</head>
<body>

<header class="topbar">
  <a class="nav-logo" href="home.html">Artio</a>
  <nav class="nav-links">
    <a class="nav-link" href="home.html">Accueil</a>
    <a class="nav-link" href="app.html">Application</a>
    <a class="nav-link" href="dashboard.html">Tableau de bord</a>
    <a class="nav-link" href="calendar.html">Calendrier</a>
    <a class="nav-link active" href="clients.html">Clients</a>
  </nav>
  <div class="nav-right">
    <button class="btn-logout" onclick="location.href='aide.html'">Aide</button>
    <button class="btn-logout" onclick="location.href='settings.html'">Paramètres</button>
    <button class="btn-logout" id="btn-logout">Déconnexion</button>
  </div>
</header>

<div class="overlay" id="ov" onclick="closePanel()"></div>
<div class="panel" id="panel"></div>
<div id="toast" class="toast"></div>

<main class="page">
  <div id="root" style="display:flex;align-items:center;justify-content:center;height:200px;color:var(--muted);font-size:14px;">Chargement…</div>
</main>

<script>
const SUPABASE_URL = "https://mwmexkoeqeyueqgdkkni.supabase.co";
const SUPABASE_KEY = "sb_publishable_dbf0DrGQr377jyftcE-rYw_SK5nzZJw";
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

let user = null, dossiers = [], clients = [], search = "";
const openApercu = {};

function esc(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function fmt(n) { return Number(n||0).toLocaleString("fr-FR",{minimumFractionDigits:2,maximumFractionDigits:2}) + " €"; }

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.style.opacity = "1";
  setTimeout(() => { t.style.opacity = "0"; }, 3000);
}

/* ── BUILD CLIENTS ── */
function buildClients() {
  const map = {};
  clients.forEach(c => { map[c.id] = {...c, _source:"db", docs:[]}; });
  dossiers.forEach(dos => {
    const match = clients.find(c => c.email === dos.client || c.nom === dos.client || c.nom === dos.nom);
    if (match) {
      map[match.id].docs.push(dos);
    } else {
      const key = "implicit_" + esc(dos.client||dos.nom||"");
      if (!map[key]) map[key] = {id:key, nom:dos.client||dos.nom||"Client", email:"", tel:"", adresse:"", notes:"", _source:"implicit", docs:[]};
      map[key].docs.push(dos);
    }
  });
  return Object.values(map).sort((a,b) => a.nom.localeCompare(b.nom));
}

/* ── RENDER MAIN ── */
function render() {
  const all = buildClients();
  const filtered = search ? all.filter(c =>
    c.nom.toLowerCase().includes(search.toLowerCase()) ||
    (c.email||"").toLowerCase().includes(search.toLowerCase())
  ) : all;

  let html = `
    <div class="page-toolbar">
      <div class="page-title">Clients <span>(${all.length})</span></div>
      <button class="btn-new" onclick="openForm()">+ Nouveau client</button>
    </div>
    <div class="search-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="search-input" type="text" placeholder="Rechercher un client…" value="${esc(search)}" oninput="search=this.value;render()"/>
    </div>`;

  if (!filtered.length) {
    html += `<div class="empty-state">
      <div class="empty-icon">👥</div>
      <div class="empty-txt">Aucun client trouvé</div>
      <button class="btn-new" onclick="openForm()">+ Ajouter un client</button>
    </div>`;
  } else {
    filtered.forEach(c => {
      const initials = c.nom.split(" ").map(w => w[0]||"").slice(0,2).join("").toUpperCase() || "?";
      const nbDocs = (c.docs||[]).reduce((s,d) => s + (d.documents||[]).length, 0);
      const ca = (c.docs||[]).reduce((s,d) =>
        (d.documents||[]).filter(doc => doc.type === "facture").reduce((ss,doc) => ss + (doc.ttc||0), s), 0);
      html += `<div class="client-card" onclick="openClient('${c.id}')">
        <div class="client-av">${initials}</div>
        <div class="client-info">
          <div class="client-name">${esc(c.nom)}</div>
          <div class="client-sub">${esc(c.email||"") || '<span style="opacity:.5">Pas d\'email</span>'}</div>
        </div>
        <div class="client-meta">
          <div class="client-docs">${nbDocs} doc${nbDocs>1?"s":""}</div>
          ${ca > 0 ? `<div class="client-ca">${fmt(ca)}</div>` : ""}
        </div>
      </div>`;
    });
  }
  document.getElementById("root").innerHTML = html;
}

/* ── DOCUMENT APERCU ── */
function renderDocApercu(d) {
  const e = d.entreprise||{};
  const pieces = (d.pieces||[]).filter(p => p.description);
  const hasMO = d.nb_heures && parseFloat(d.nb_heures) > 0;
  return `<div class="doc-apercu">
    <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
      <div style="font-size:11px;color:var(--muted)">${e.nom||""}</div>
      <div style="font-size:11px;color:var(--muted)">${d.date||""}</div>
    </div>
    ${d.description ? `<p style="font-size:11px;color:var(--muted);margin-bottom:8px;font-style:italic;">${esc(d.description.slice(0,120))}${d.description.length>120?"…":""}</p>` : ""}
    ${hasMO||pieces.length>0 ? `<table style="width:100%;font-size:11px;border-collapse:collapse;margin-bottom:6px;">
      <thead><tr><th style="text-align:left;padding:3px 6px;border-bottom:1px solid var(--border);color:var(--muted)">Description</th><th style="text-align:right;padding:3px 6px;border-bottom:1px solid var(--border);color:var(--muted)">Total HT</th></tr></thead>
      <tbody>
        ${hasMO?`<tr><td style="padding:2px 6px;">Main d'œuvre (${d.nb_heures}h × ${e.taux_horaire}€/h)</td><td style="text-align:right;padding:2px 6px;">${(d.moHT||0).toFixed(2)} €</td></tr>`:""}
        ${pieces.map(p=>`<tr><td style="padding:2px 6px;">${esc(p.description)}</td><td style="text-align:right;padding:2px 6px;">${(parseFloat(p.quantite||0)*parseFloat(p.prix_unitaire||0)).toFixed(2)} €</td></tr>`).join("")}
      </tbody>
    </table>` : ""}
    <div style="text-align:right;border-top:1px solid var(--border);padding-top:6px;">
      <div style="font-family:var(--fh);font-size:14px;font-weight:700;color:var(--amber)">${e.assujetti_tva?"TTC":"Total"} : ${(d.ttc||0).toFixed(2)} €</div>
      ${!e.assujetti_tva?`<div style="font-size:10px;color:var(--muted);font-style:italic;">TVA non applicable — art. 293B du CGI</div>`:""}
    </div>
  </div>`;
}

window.toggleApercu = function(btn) {
  const id = btn.dataset.id, idx = parseInt(btn.dataset.idx);
  const el = document.getElementById(id);
  if (!el) return;
  if (el.style.display === "none") {
    el.style.display = "block";
    el.innerHTML = renderDocApercu(window._clientDocs[idx]);
    btn.textContent = "▲ Fermer";
  } else {
    el.style.display = "none";
    btn.textContent = "👁 Aperçu";
  }
};

/* ── BUILD DOSSIERS HTML ── */
function buildDossiersHtml(c) {
  window._clientDocs = {};
  let gi = 0;
  const statLabels = {devis_envoye:"Envoyé", devis_accepte:"Accepté", facture:"Facturé", termine:"Clôturé"};
  const statColors = {
    devis_envoye:  {bg:"rgba(251,146,60,.13)", text:"#fb923c"},
    devis_accepte: {bg:"rgba(167,139,250,.13)", text:"var(--purple)"},
    facture:       {bg:"rgba(74,222,128,.12)", text:"#4ade80"},
    termine:       {bg:"rgba(107,116,148,.13)", text:"var(--muted)"},
  };
  const dos = c.docs || [];
  if (!dos.length) return `<p style="font-size:13px;color:var(--muted);text-align:center;padding:16px 0;">Aucun dossier</p>`;

  return dos.map(d => {
    const documents = d.documents || [];
    const caTotal = documents.filter(doc => doc.type === "facture").reduce((s,doc) => s+(doc.ttc||0), 0);
    const sc = statColors[d.statut] || statColors.devis_envoye;
    const label = statLabels[d.statut] || d.statut || "";

    const docsHtml = documents.map(doc => {
      const isDevis = doc.type === "devis";
      const apercuId = "apercu_" + gi;
      const curIdx = gi;
      window._clientDocs[curIdx] = Object.assign({}, doc, {entreprise: doc.entreprise||{}});
      gi++;
      return `<div class="dos-doc-row">
        <div class="doc-row-top">
          <div>
            <span class="doc-num">${esc(doc.docNumber||"—")}</span>
            <span class="doc-date" style="margin-left:8px">${doc.date||""}</span>
          </div>
          <div class="doc-actions">
            <span class="btn-sm ${isDevis?"btn-sm-amber":"btn-sm-teal"}">${isDevis?"Devis":"Facture"}</span>
            <span style="font-size:12px;font-weight:700;color:var(--text)">${fmt(doc.ttc)}</span>
            <button class="btn-sm" onclick="generateClientPDF(window._clientDocs[${curIdx}])">⬇ PDF</button>
            <button class="btn-sm" id="btn-${apercuId}" onclick="toggleApercu(this)" data-id="${apercuId}" data-idx="${curIdx}">👁 Aperçu</button>
            ${doc.accepte ? `<button class="btn-sm btn-sm-purple" onclick="downloadSignedProof('${doc.docNumber}')">📄 Signé</button>` : ""}
          </div>
        </div>
        <div id="${apercuId}" style="display:none;"></div>
      </div>`;
    }).join("");

    return `<div class="dos-card">
      <div class="dos-header" onclick="toggleDossierClient(this)" data-dosid="${d.id}">
        <div>
          <div><span class="dos-badge" style="background:${sc.bg};color:${sc.text}">${label}</span></div>
          <div class="dos-name">${esc(d.nom||"Dossier")}</div>
          <div class="dos-meta">${documents.length} doc${documents.length>1?"s":""}${caTotal>0?" · "+fmt(caTotal):""}</div>
        </div>
        <span id="arr-${d.id}" style="color:var(--muted);font-size:20px;transition:transform .2s">›</span>
      </div>
      <div id="dp-${d.id}" style="display:none;">${docsHtml}</div>
    </div>`;
  }).join("");
}

window.toggleDossierClient = function(el) {
  const dosId = el.dataset.dosid;
  const dp = document.getElementById("dp-"+dosId);
  const arrow = document.getElementById("arr-"+dosId);
  if (!dp) return;
  const open = dp.style.display !== "none";
  dp.style.display = open ? "none" : "block";
  if (arrow) { arrow.textContent = open ? "›" : "⌄"; arrow.style.transform = open ? "" : "rotate(90deg)"; }
};

/* ── CRUD ── */
window.createClient = async function() {
  const nom = document.getElementById("new-nom")?.value.trim();
  if (!nom) { document.getElementById("new-nom")?.focus(); return; }
  const is_professionnel = document.getElementById("new-professionnel")?.checked||false;
  const { data, error } = await sb.from("clients").insert([{
    user_id: user.id,
    nom,
    email: document.getElementById("new-email")?.value.trim()||"",
    tel: document.getElementById("new-tel")?.value.trim()||"",
    adresse: document.getElementById("new-adresse")?.value.trim()||"",
    notes: document.getElementById("new-notes")?.value.trim()||"",
    is_professionnel,
    siret: is_professionnel ? (document.getElementById("new-siret")?.value.trim()||"") : "",
  }]).select();
  if (error) { alert("Erreur : "+error.message); return; }
  if (data?.[0]) { clients.push(data[0]); closePanel(); render(); showToast("✓ Client "+nom+" créé"); }
};

window.registerImplicitClient = async function(nom) {
  const { data, error } = await sb.from("clients").insert([{
    user_id: user.id, nom,
    email: document.getElementById("reg-email")?.value.trim()||"",
    tel: document.getElementById("reg-tel")?.value.trim()||"",
    adresse: document.getElementById("reg-adresse")?.value.trim()||"",
    notes: document.getElementById("reg-notes")?.value.trim()||"",
  }]).select().single();
  if (error) { alert("Erreur : "+error.message); return; }
  clients.push(data); closePanel(); render(); showToast("✓ Client enregistré");
};

window.saveClient = async function(id) {
  const is_professionnel = document.getElementById("edit-professionnel")?.checked||false;
  const patch = {
    nom: document.getElementById("edit-nom")?.value.trim()||"",
    email: document.getElementById("edit-email")?.value.trim()||"",
    tel: document.getElementById("edit-tel")?.value.trim()||"",
    adresse: document.getElementById("edit-adresse")?.value.trim()||"",
    notes: document.getElementById("edit-notes")?.value.trim()||"",
    is_professionnel,
    siret: is_professionnel ? (document.getElementById("edit-siret")?.value.trim()||"") : "",
    updated_at: new Date().toISOString(),
  };
  if (!patch.nom) { return; }
  const { error } = await sb.from("clients").update(patch).eq("id",id).eq("user_id",user.id);
  if (error) { alert("Erreur : "+error.message); return; }
  const ci = clients.findIndex(c => c.id === id);
  if (ci > -1) clients[ci] = {...clients[ci], ...patch};
  closePanel(); render(); showToast("✓ Client mis à jour");
};

window.deleteClient = async function(id) {
  if (!confirm("Supprimer ce client ? Les dossiers associés ne seront pas supprimés.")) return;
  await sb.from("clients").delete().eq("id",id);
  clients = clients.filter(c => c.id !== id);
  closePanel(); render(); showToast("Client supprimé");
};

/* ── PDF ── */
function generateClientPDF(d) {
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({unit:"mm",format:"a4"});
  const W=210, m=18, cW=W-2*m, rX=W-m; let y=m;
  const e = d.entreprise||{};
  pdf.setFontSize(16).setFont(undefined,"bold").text(e.nom||"",m,y); y+=6;
  pdf.setFontSize(9).setFont(undefined,"normal").text(e.adresse||"",m,y); y+=5;
  if(e.tel){pdf.text("Tél : "+e.tel,m,y);y+=4;}
  if(e.email){pdf.text("Email : "+e.email,m,y);y+=4;}
  if(e.siret){pdf.text("SIRET : "+e.siret,m,y);y+=4;}
  pdf.setFontSize(20).setFont(undefined,"bold").setTextColor(245,167,66);
  pdf.text(d.type==="devis"?"DEVIS":"FACTURE",rX,m,{align:"right"});
  pdf.setFontSize(10).setFont(undefined,"normal").setTextColor(0);
  pdf.text("N° "+d.docNumber,rX,m+9,{align:"right"});
  pdf.text("Date : "+d.date,rX,m+15,{align:"right"});
  if(d.validUntil)pdf.text("Valable jusqu'au : "+d.validUntil,rX,m+21,{align:"right"});
  let yOff=d.validUntil?27:21;
  if(d.client?.nom){
    pdf.setFontSize(9).setFillColor(20,24,41);
    pdf.roundedRect(rX-65,m,66,yOff-3,2,2,"F");
    pdf.setFontSize(8).setTextColor(150).text("CLIENT",rX-62,m+5);
    pdf.setFontSize(10).setFont(undefined,"bold").setTextColor(226,229,241).text(d.client.nom,rX-62,m+11);
    if(d.client.adresse)pdf.setFontSize(8).setFont(undefined,"normal").setTextColor(150).text(d.client.adresse,rX-62,m+17);
  }
  y=Math.max(y,m+yOff)+4;
  pdf.setFont(undefined,"bold").setFontSize(11).setTextColor(0).text(d.type==="devis"?"Description des travaux":"Description",m,y);y+=4;
  pdf.setFont(undefined,"normal").setFontSize(9);
  if(d.description){const dl=pdf.splitTextToSize(d.description,cW);pdf.text(dl,m,y);y+=dl.length*4.5+6;}
  const hasMO=d.nb_heures&&parseFloat(d.nb_heures)>0;
  const tb=[
    ...(hasMO?[["Main d'œuvre ("+d.nb_heures+"h × "+(e.taux_horaire||0)+"€/h)",d.nb_heures,parseFloat(e.taux_horaire||0).toFixed(2)+" €",(d.moHT||0).toFixed(2)+" €"]]:[] ),
    ...(d.pieces||[]).filter(p=>p.description&&p.quantite&&p.prix_unitaire).map(p=>[p.description,p.quantite,parseFloat(p.prix_unitaire).toFixed(2)+" €",(parseFloat(p.quantite)*parseFloat(p.prix_unitaire)).toFixed(2)+" €"]),
  ];
  if(tb.length>0){
    pdf.autoTable({startY:y,head:[["Description","Qté","Prix unit. HT","Total HT"]],body:tb,margin:{left:m,right:m},styles:{fontSize:9,cellPadding:3},headStyles:{fillColor:[245,167,66],textColor:[8,11,20],fontStyle:"bold"},columnStyles:{0:{cellWidth:85},1:{cellWidth:18,halign:"center"},2:{cellWidth:32,halign:"right"},3:{cellWidth:27,halign:"right"}}});
    y=pdf.lastAutoTable.finalY+6;
  }
  pdf.setFontSize(9).setFont(undefined,"normal");
  pdf.text("Total HT :",135,y);pdf.text((d.totalHT||0).toFixed(2)+" €",rX,y,{align:"right"});y+=5;
  if(e.assujetti_tva&&d.tva){pdf.text("TVA ("+d.tvaRate+"%) :",135,y);pdf.text((d.tva||0).toFixed(2)+" €",rX,y,{align:"right"});y+=5;}
  pdf.setFont(undefined,"bold").setFontSize(11).text(e.assujetti_tva?"TOTAL TTC :":"TOTAL :",145,y);pdf.text((d.ttc||0).toFixed(2)+" €",rX,y,{align:"right"});y+=10;
  if(!e.assujetti_tva){pdf.setFont(undefined,"italic").setFontSize(8).setTextColor(100).text("TVA non applicable, art. 293 B du CGI",m,y);y+=5;pdf.setTextColor(0);}
  pdf.save(d.docNumber+".pdf");
}

window.generateClientPDF = generateClientPDF;

window.downloadSignedProof = async function(docNumber) {
  try {
    const { data:sig, error } = await sb.from("signatures").select("*").eq("doc_number",docNumber).eq("user_id",user.id).eq("status","signed").single();
    if (error||!sig) { alert("Preuve introuvable."); return; }
    const doc = sig.doc_data; const e = doc.entreprise||{};
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({unit:"mm",format:"a4"});
    const W=210, m=18, cW=W-2*m, rX=W-m; let y=m;
    // En-tête entreprise
    pdf.setFontSize(16).setFont(undefined,"bold").text(e.nom||"",m,y); y+=6;
    pdf.setFontSize(9).setFont(undefined,"normal").text(e.adresse||"",m,y); y+=5;
    pdf.text("Tél : "+(e.tel||""),m,y); y+=4;
    pdf.text("Email : "+(e.email||""),m,y); y+=4;
    if(e.siret) pdf.text("SIRET : "+e.siret,m,y); y+=8;
    // Numéro de devis
    pdf.setFontSize(15).setFont(undefined,"bold").setTextColor(245,167,66);
    pdf.text("DEVIS N° "+doc.docNumber,W/2,y,{align:"center"}); y+=5;
    pdf.setFontSize(9).setFont(undefined,"normal").setTextColor(0);
    pdf.text("Date : "+doc.date,W/2,y,{align:"center"}); y+=8;
    // Bloc client
    pdf.setFillColor(249,248,246); pdf.roundedRect(m,y,cW,18,2,2,"F");
    pdf.setFontSize(8).setTextColor(120).text("CLIENT",m+4,y+5);
    pdf.setFontSize(10).setTextColor(0).setFont(undefined,"bold").text(doc.client?.nom||"",m+4,y+11);
    if(doc.client?.adresse) { pdf.setFontSize(8).setFont(undefined,"normal").setTextColor(80).text(doc.client.adresse,m+4,y+15); }
    y+=22; pdf.setFontSize(9).setTextColor(0);
    // Description
    if(doc.description) { const dl=pdf.splitTextToSize(doc.description,cW); pdf.text(dl,m,y); y+=dl.length*4.5+4; }
    // Tableau des pièces + main d'œuvre
    const tbB=[];
    if(doc.nb_heures && parseFloat(doc.nb_heures)>0)
      tbB.push(["Main d'\u0153uvre ("+doc.nb_heures+"h \u00d7 "+e.taux_horaire+"\u20ac/h)", doc.nb_heures, parseFloat(e.taux_horaire||0).toFixed(2)+" \u20ac", (doc.moHT||0).toFixed(2)+" \u20ac"]);
    (doc.pieces||[]).filter(p=>p.description).forEach(p=>
      tbB.push([p.description, p.quantite, parseFloat(p.prix_unitaire||0).toFixed(2)+" \u20ac", (parseFloat(p.quantite||0)*parseFloat(p.prix_unitaire||0)).toFixed(2)+" \u20ac"])
    );
    if(tbB.length>0) {
      pdf.autoTable({startY:y, head:[["Description","Qté","Prix unit. HT","Total HT"]], body:tbB, margin:{left:m,right:m}, styles:{fontSize:9,cellPadding:3}, headStyles:{fillColor:[245,167,66],textColor:255,fontStyle:"bold"}, columnStyles:{0:{cellWidth:85},1:{cellWidth:18,halign:"center"},2:{cellWidth:32,halign:"right"},3:{cellWidth:27,halign:"right"}}});
      y=pdf.lastAutoTable.finalY+6;
    }
    // Totaux
    pdf.setFontSize(9).setTextColor(0).setFont(undefined,"normal");
    pdf.text("Total HT :",135,y); pdf.text((doc.totalHT||0).toFixed(2)+" \u20ac",rX,y,{align:"right"}); y+=5;
    if(e.assujetti_tva && doc.tva) { pdf.text("TVA ("+doc.tvaRate+"%) :",135,y); pdf.text((doc.tva||0).toFixed(2)+" \u20ac",rX,y,{align:"right"}); y+=5; }
    pdf.setFont(undefined,"bold").setFontSize(11);
    pdf.text(e.assujetti_tva?"TOTAL TTC :":"TOTAL :",145,y); pdf.text((doc.ttc||0).toFixed(2)+" \u20ac",rX,y,{align:"right"}); y+=14;
    // Ligne séparatrice
    pdf.setDrawColor(245,167,66); pdf.setLineWidth(0.5); pdf.line(m,y,W-m,y); y+=6;
    // Section signature
    pdf.setFillColor(255,248,235); pdf.roundedRect(m,y,cW,52,3,3,"F");
    pdf.setFont(undefined,"bold").setFontSize(10).setTextColor(245,167,66);
    pdf.text("\u2713 DEVIS SIGNÉ ÉLECTRONIQUEMENT",W/2,y+8,{align:"center"});
    pdf.setFont(undefined,"normal").setFontSize(8).setTextColor(60);
    const sd = sig.signed_at ? new Date(sig.signed_at).toLocaleString("fr-FR") : "\u2014";
    pdf.text("Signé par : "+(doc.client?.nom||"Le client")+"  |  Date : "+sd,W/2,y+14,{align:"center"});
    pdf.text("La signature ci-dessous a valeur contractuelle.",W/2,y+19,{align:"center"});
    if(sig.signature_data) { try { pdf.addImage(sig.signature_data,"PNG",m+10,y+22,cW-20,22); } catch(er) {} }
    pdf.setDrawColor(180); pdf.setLineWidth(0.3); pdf.rect(m+10,y+22,cW-20,22); y+=55;
    // Footer
    pdf.setFont(undefined,"italic").setFontSize(7).setTextColor(120);
    pdf.text("Preuve de signature électronique — Artio — "+new Date().toLocaleString("fr-FR"),W/2,y,{align:"center"});
    pdf.setFontSize(7).setTextColor(150).text((e.nom||"")+" — SIRET : "+(e.siret||""),W/2,287,{align:"center"});
    pdf.save("PREUVE_SIGNATURE_"+docNumber+".pdf");
  } catch(err) { alert("Erreur : "+err.message); }
};

document.getElementById("btn-logout").addEventListener("click", async () => {
  await sb.auth.signOut();
  window.location.href = "index.html";

(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = "index.html"; return; }
  user = session.user;
  const [{ data: dos }, { data: cli }] = await Promise.all([
    sb.from("dossiers").select("*").eq("user_id", user.id),
    sb.from("clients").select("*").eq("user_id", user.id).order("nom"),
  ]);
  dossiers = (dos||[]).map(d => {
    let docs = [];
    try { docs = typeof d.documents === "string" ? JSON.parse(d.documents) : (d.documents||[]); } catch(e) {}
    return {...d, documents: docs};
  });
  clients = cli||[];
  render();
})();
