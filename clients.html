<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Artio — Clients</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="plan-guard.js"></script>
<script src="tour.js?v=1"></script>
<script>const PAGE_PLAN_REQUIRED = "solo";</script>
<style>
:root, [data-theme="dark"] {
  --bg:        #080b14;
  --surface:   #0e1220;
  --surface-2: #141829;
  --surface-3: #1a2035;
  --border:    rgba(255,255,255,0.07);
  --border-hi: rgba(255,255,255,0.13);
  --text:      #e2e5f1;
  --muted:     #6b7494;
  --amber:     #f5a742;
  --amber-dim: rgba(245,167,66,0.12);
  --amber-glow:rgba(245,167,66,0.26);
  --teal:      #3ecfcf;
  --teal-dim:  rgba(62,207,207,0.11);
  --purple:    #a78bfa;
  --green:     #4ade80;
  --green-dim: rgba(74,222,128,.12);
  --red:       #f87171;
  --fh: 'Space Grotesk', sans-serif;
  --fb: 'Plus Jakarta Sans', sans-serif;
  --nav-h: 60px;
}
[data-theme="light"] {
  --bg:        #faf8f3;
  --surface:   #ffffff;
  --surface-2: #f3efe6;
  --surface-3: #ece7dc;
  --border:    rgba(20,18,12,0.08);
  --border-hi: rgba(20,18,12,0.16);
  --text:      #1a1a1f;
  --muted:     #6a6b78;
  --amber:     #d97706;
  --amber-dim: rgba(217,119,6,0.10);
  --amber-glow:rgba(217,119,6,0.22);
  --teal:      #0d9488;
  --teal-dim:  rgba(13,148,136,0.10);
  --green:     #16a34a;
  --green-dim: rgba(22,163,74,0.10);
  --red:       #dc2626;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--fb);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex; flex-direction: column;
}

/* ── TOPBAR ── */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: var(--nav-h); padding: 0 20px 0 66px;
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(8,11,20,0.85); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}
[data-theme="light"] .topbar { background: rgba(250,248,243,0.92); border-bottom-color: rgba(20,18,12,0.10); }
.nav-logo { display: inline-flex; align-items: center; gap: 8px; font-family: var(--fh); font-size: 18px; font-weight: 700; color: var(--text); letter-spacing:-0.02em; text-decoration:none; }
.nav-logo img { width: 28px; height: 28px; }
.theme-toggle { width:34px; height:34px; display:flex; align-items:center; justify-content:center; background:var(--surface); border:1px solid var(--border); border-radius:9px; cursor:pointer; color:var(--text); transition:all .2s; }
.theme-toggle:hover { border-color:var(--amber); color:var(--amber); }
.theme-toggle svg { width:15px; height:15px; }
.theme-toggle .icon-sun { display:none; }
.theme-toggle .icon-moon { display:block; }
[data-theme="light"] .theme-toggle .icon-sun { display:block; }
[data-theme="light"] .theme-toggle .icon-moon { display:none; }

/* ── SIDEBAR ── */
.sidebar-trigger{position:fixed;top:11px;left:14px;z-index:110;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;color:var(--text);cursor:pointer;transition:background .15s}
.sidebar-trigger:hover{background:var(--surface-3)}
.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:120;opacity:0;pointer-events:none;transition:opacity .2s}
.sidebar-overlay.open{opacity:1;pointer-events:auto}
.sidebar{position:fixed;top:0;left:-280px;bottom:0;width:280px;background:var(--surface);border-right:1px solid var(--border);z-index:130;transition:left .25s ease;display:flex;flex-direction:column}
.sidebar.open{left:0}
.sidebar-head{display:flex;align-items:center;gap:10px;padding:18px 16px;border-bottom:1px solid var(--border)}
.sidebar-logo-img{width:28px;height:28px}
.sidebar-brand{font-family:var(--fh);font-weight:700;font-size:17px;flex:1}
.sidebar-close{background:var(--surface-2);border:1px solid var(--border);border-radius:8px;width:30px;height:30px;cursor:pointer;color:var(--muted);font-size:18px;display:flex;align-items:center;justify-content:center}
.sidebar-nav{flex:1;padding:12px 10px;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
.sidebar-link{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;font-size:14px;color:var(--muted);text-decoration:none;background:transparent;border:none;text-align:left;cursor:pointer;transition:background .12s,color .12s;font-family:var(--fb);width:100%}
.sidebar-link:hover{background:var(--surface-2);color:var(--text)}
.sidebar-link.active{background:var(--amber-dim);color:var(--amber);font-weight:600}
.sidebar-sep{height:1px;background:var(--border);margin:8px 12px}
.sidebar-logout{color:#f87171}
.sidebar-foot{padding:12px 10px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:2px}
.sidebar-theme-btn{background:var(--surface-2);border:1px solid var(--border);border-radius:8px;width:36px;height:36px;cursor:pointer;color:var(--text);display:flex;align-items:center;justify-content:center}
.sidebar-theme-btn .icon-sun{display:none}
[data-theme="dark"] .sidebar-theme-btn .icon-moon{display:none}
[data-theme="dark"] .sidebar-theme-btn .icon-sun{display:inline-block}
@media(max-width:767px){.sidebar.open{width:100%}}

/* ── MAIN LAYOUT (master-detail) ── */
.page {
  flex: 1;
  padding: var(--nav-h) 0 0;
  width: 100%;
}
.master-detail {
  display: flex;
  height: calc(100vh - var(--nav-h));
  background: var(--surface);
  overflow: hidden;
}

/* LEFT — Master (client list) */
.dcl {
  width: 340px;
  flex-shrink: 0;
  background: var(--surface);
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
}
.dclh { padding: 16px 14px 12px; }
.dclt {
  font-family: var(--fh);
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 10px;
  color: var(--text);
}
.dclt span {
  font-size: 12px; color: var(--muted); font-weight: 500;
  margin-left: 4px; font-family: var(--fb);
}
.dclsc {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 9px;
  padding: 7px 11px;
  transition: border-color .2s;
}
.dclsc:focus-within { border-color: var(--amber); }
.dclsc svg { color: var(--muted); flex-shrink: 0; }
.dclsc input {
  flex: 1; background: none; border: none; outline: none;
  color: var(--text); font-size: 13px; font-family: var(--fb);
}
.dclsc input::placeholder { color: var(--muted); }

.dclb {
  flex: 1;
  overflow-y: auto;
  padding: 6px 8px;
}
.dcit {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 9px;
  border-radius: 9px;
  cursor: pointer;
  margin-bottom: 2px;
  transition: background .15s;
}
.dcit:hover { background: var(--surface-2); }
.dcit.sel { background: var(--amber-dim); }
.dcit.sel .dciname { color: var(--amber); }
.dciav {
  width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--fh); font-size: 11px; font-weight: 700;
  color: #fff;
}
.dci-text { flex: 1; min-width: 0; }
.dciname {
  font-size: 12px; font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  color: var(--text);
}
.dcisub {
  font-size: 11px; color: var(--muted); margin-top: 1px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.dci-ca {
  font-family: var(--fh);
  font-size: 11px; font-weight: 700;
  color: var(--teal);
  flex-shrink: 0;
}

.dclfb { padding: 12px 14px; border-top: 1px solid var(--border); }
.abtn {
  width: 100%;
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  background: var(--amber); color: #080b14;
  border: none; border-radius: 10px;
  padding: 9px 18px;
  font-family: var(--fb); font-size: 13px; font-weight: 600;
  cursor: pointer;
  box-shadow: 0 2px 14px var(--amber-glow);
  transition: transform .15s, box-shadow .15s;
}
.abtn:hover { transform: translateY(-1px); }
.abtn svg { width: 13px; height: 13px; }

/* RIGHT — Detail */
.dcr {
  flex: 1;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.dcrh {
  display: flex; align-items: flex-start; gap: 14px;
  padding: 20px 24px 18px;
  border-bottom: 1px solid var(--border);
}
.dcrav {
  width: 50px; height: 50px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--fh); font-size: 18px; font-weight: 700;
  color: #fff;
}
.dcr-text { flex: 1; min-width: 0; }
.dcrname {
  font-family: var(--fh); font-size: 20px; font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--text);
}
.dcrsub {
  font-size: 12px; color: var(--muted); margin-top: 3px;
}
.dcrbtn {
  flex-shrink: 0;
  background: var(--amber); color: #080b14;
  border: none; border-radius: 10px;
  padding: 9px 16px;
  font-family: var(--fb); font-size: 12px; font-weight: 600;
  cursor: pointer; text-decoration: none;
  box-shadow: 0 2px 14px var(--amber-glow);
  transition: transform .15s;
  white-space: nowrap;
  display: inline-flex; align-items: center; gap: 5px;
}
.dcrbtn:hover { transform: translateY(-1px); }
.dcrbtn-mail {
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--border);
  box-shadow: none;
}
.dcrbtn-mail:hover { border-color: var(--border-hi); background: var(--surface-2); transform: translateY(-1px); }

.dcrb {
  flex: 1;
  overflow-y: auto;
  padding: 18px 24px;
}
.dcrsts {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 18px;
}
.dcrst {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
}
.dcrstl {
  font-size: 10px; font-weight: 700;
  color: var(--muted);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.dcrstv {
  font-family: var(--fh); font-size: 19px; font-weight: 700;
}
.dcrstv.ct { color: var(--teal); }
.dcrstv.ca { color: var(--amber); }

.dcrsecl {
  font-size: 10px; font-weight: 700;
  color: var(--muted);
  letter-spacing: 0.07em;
  text-transform: uppercase;
  margin-bottom: 10px;
  margin-top: 4px;
}

/* Dossier card */
.dcdos {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 11px;
  margin-bottom: 8px;
  overflow: hidden;
}
.dcdosh {
  display: flex; align-items: center; justify-content: space-between;
  padding: 11px 14px;
  cursor: pointer;
  transition: background .15s;
}
.dcdosh:hover { background: var(--surface-2); }
.dcbdg {
  display: inline-block;
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.04em;
  padding: 2px 8px;
  border-radius: 20px;
}
.dcdosn {
  font-family: var(--fh);
  font-size: 13px; font-weight: 600;
  margin-top: 3px;
  color: var(--text);
}
.dcdosm {
  font-size: 11px; color: var(--muted); margin-top: 1px;
}
.dcdos-arrow {
  color: var(--muted); font-size: 20px;
  transition: transform .2s;
}

.dcdocs { border-top: 1px solid var(--border); display: none; }
.dcdocs.open { display: block; }
.dcdocr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 14px;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap; gap: 8px;
}
.dcdocr:last-child { border-bottom: none; }
.dcdocr-left { flex: 1; min-width: 0; }
.dcdocn {
  font-size: 12px; font-weight: 600;
  color: var(--text);
}
.dcdocd {
  font-size: 11px; color: var(--muted);
  margin-top: 1px;
}
.dcdocr-right {
  display: flex; align-items: center; gap: 8px;
  flex-wrap: wrap;
}
.dcdocd-d, .dcdocd-f {
  display: inline-block;
  font-size: 10px; font-weight: 700;
  padding: 2px 7px;
  border-radius: 20px;
}
.dcdocd-d { background: var(--amber-dim); color: var(--amber); }
.dcdocd-f { background: var(--teal-dim); color: var(--teal); }
.dcdocttc {
  font-size: 12px; font-weight: 700;
  color: var(--text);
}
.dcdoc-actions { display: flex; gap: 4px; }
.btn-icon {
  padding: 4px 8px; border-radius: 6px;
  font-size: 11px; font-weight: 500;
  background: var(--surface-2); border: 1px solid var(--border);
  color: var(--muted); cursor: pointer;
  font-family: var(--fb); transition: all .2s;
  white-space: nowrap;
}
.btn-icon:hover { border-color: var(--border-hi); color: var(--text); }
.btn-icon.purple { background: rgba(167,139,250,.1); color: var(--purple); border-color: rgba(167,139,250,.25); }

.doc-apercu {
  margin: 6px 14px 10px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  font-size: 12px;
  line-height: 1.6;
}

/* Edit panel inline */
.dcr-edit {
  margin-top: 20px;
  padding-top: 18px;
  border-top: 1px solid var(--border);
}
.dcr-edit-title {
  font-family: var(--fh);
  font-size: 13px; font-weight: 700;
  margin-bottom: 12px;
  color: var(--text);
}
.field { margin-bottom: 12px; }
.field-label {
  display: block;
  font-size: 10px; font-weight: 700;
  color: var(--muted);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  margin-bottom: 5px;
}
.field-input {
  width: 100%;
  padding: 9px 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 9px;
  color: var(--text);
  font-size: 13px;
  font-family: var(--fb);
  outline: none;
  transition: border-color .2s;
}
.field-input:focus { border-color: var(--amber); }
.field-input::placeholder { color: var(--muted); }
textarea.field-input { resize: vertical; min-height: 60px; }
.fields-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.check-row { display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 13px; }
.check-row input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--amber); }

.btn-save {
  display: inline-flex; align-items: center; justify-content: center;
  padding: 10px 18px; border-radius: 10px;
  background: var(--amber); color: #080b14;
  border: none; font-size: 13px; font-weight: 600;
  font-family: var(--fb); cursor: pointer;
  box-shadow: 0 2px 14px var(--amber-glow);
  margin-right: 8px;
  transition: transform .15s;
}
.btn-save:hover { transform: translateY(-1px); }
.btn-danger {
  display: inline-flex; align-items: center; justify-content: center;
  padding: 10px 18px; border-radius: 10px;
  background: transparent; color: var(--red);
  border: 1px solid rgba(248,113,113,0.3);
  font-size: 13px; font-weight: 500;
  font-family: var(--fb); cursor: pointer;
  transition: all .15s;
}
.btn-danger:hover { background: rgba(248,113,113,0.1); }

.warning-box {
  background: var(--amber-dim);
  border: 1px solid rgba(245,167,66,.2);
  border-radius: 10px;
  padding: 12px 14px;
  margin-bottom: 14px;
  font-size: 12px;
  color: var(--muted);
  line-height: 1.6;
}
.warning-box strong { color: var(--amber); }

/* Empty states */
.empty-list {
  text-align: center;
  padding: 32px 16px;
  color: var(--muted);
  font-size: 13px;
}
.empty-detail {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: var(--muted);
  text-align: center;
  padding: 32px;
}
.empty-detail-icon { font-size: 56px; margin-bottom: 16px; opacity: 0.5; }
.empty-detail-txt { font-size: 14px; }

/* Modal — new client */
.modal-overlay {
  display: none; position: fixed; inset: 0; z-index: 299;
  background: rgba(0,0,0,.5); backdrop-filter: blur(4px);
  align-items: center; justify-content: center;
  padding: 16px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border-hi);
  border-radius: 14px;
  width: 100%; max-width: 440px;
  max-height: calc(100vh - 32px);
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,.45);
}
.modal-head {
  padding: 20px 24px 16px;
  display: flex; justify-content: space-between; align-items: center;
  border-bottom: 1px solid var(--border);
}
.modal-title { font-family: var(--fh); font-size: 17px; font-weight: 700; }
.modal-close {
  width: 28px; height: 28px; border-radius: 7px;
  background: var(--surface-2); border: 1px solid var(--border);
  color: var(--muted); cursor: pointer; font-size: 14px;
  display: flex; align-items: center; justify-content: center;
}
.modal-close:hover { color: var(--text); }
.modal-body { padding: 18px 24px 24px; }
.modal-body .btn-save { width: 100%; margin: 4px 0 0; }

/* Toast */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--surface-2); border: 1px solid var(--border-hi);
  color: var(--text); padding: 12px 22px; border-radius: 12px;
  font-size: 13px; font-weight: 500; z-index: 9999;
  box-shadow: 0 8px 32px rgba(0,0,0,.4);
  transition: opacity .4s; opacity: 0; pointer-events: none;
}

/* MOBILE — stack vertically, master/detail toggle */
@media (max-width: 767px) {
  .page { padding: var(--nav-h) 0 0; }
  .master-detail {
    height: calc(100vh - var(--nav-h));
    flex-direction: column;
    border-radius: 0;
  }
  .dcl {
    width: 100%;
    border-right: none;
    border-bottom: 1px solid var(--border);
  }
  /* On mobile, when a client is selected, hide list and show detail */
  .master-detail.detail-open .dcl { display: none; }
  .master-detail:not(.detail-open) .dcr { display: none; }
  .dcr-mobile-back {
    display: flex; align-items: center; gap: 6px;
    padding: 10px 14px;
    background: transparent; border: none;
    color: var(--amber);
    font-size: 13px; font-weight: 600;
    cursor: pointer;
    font-family: var(--fb);
  }
  .dcrh { padding: 4px 16px 14px; flex-wrap: wrap; }
  .dcrname { font-size: 17px; }
  .dcrbtn { width: 100%; margin-top: 8px; }
  .dcrb { padding: 14px 16px; }
  .dcrsts { grid-template-columns: 1fr 1fr; }
  .fields-2 { grid-template-columns: 1fr; }
}
@media (min-width: 768px) {
  .dcr-mobile-back { display: none; }
}
</style>
<script>
  (function(){ let t='light'; try{t=localStorage.getItem('artio-theme')||'light';}catch(e){} document.documentElement.setAttribute('data-theme',t); })();
</script>
</head>

</button>

<aside class="sidebar">
  <div class="sidebar-head">
    <img src="artio-icon.png" alt="" class="sidebar-logo-img"/>
    <span class="sidebar-brand">Artio</span>
    <button class="sidebar-close" onclick="closeSidebar()">✕</button>
  </div>
  <nav class="sidebar-nav">
    <a href="home.html" class="sidebar-link">🏠 Accueil</a>
    <a href="app.html" class="sidebar-link">🎙 Créer</a>
    <a href="dossiers.html" class="sidebar-link">📁 Dossiers</a>

<script>
const SUPABASE_URL = "https://mwmexkoeqeyueqgdkkni.supabase.co";
const SUPABASE_KEY = "sb_publishable_dbf0DrGQr377jyftcE-rYw_SK5nzZJw";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let user = null, dossiers = [], clients = [], search = "", selectedClientId = null;
const AVATAR_COLORS = ["#d97706","#0d9488","#7c3aed","#dc2626","#2563eb","#db2777","#059669","#ea580c"];

function esc(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function fmt(n) { return Number(n||0).toLocaleString("fr-FR",{minimumFractionDigits:2,maximumFractionDigits:2}) + " €"; }
function avatarColor(name) {
  let h = 0; for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
  return AVATAR_COLORS[h % AVATAR_COLORS.length];
}
function initials(name) {
  return name.split(" ").map(w => w[0]||"").slice(0,2).join("").toUpperCase() || "?";
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.style.opacity = "1";
  setTimeout(() => { t.style.opacity = "0"; }, 3000);
}

/* ── BUILD CLIENTS (unified DB + implicit) ── */
function buildClients() {
  const map = {};
  clients.forEach(c => { map[c.id] = {...c, _source:"db", docs:[]}; });
  dossiers.forEach(dos => {
    const match = clients.find(c => c.email === dos.client || c.nom === dos.client || c.nom === dos.nom);
    if (match) {
      map[match.id].docs.push(dos);
    } else {
      const key = "implicit_" + esc(dos.client||dos.nom||"");
      if (!map[key]) map[key] = {id:key, nom:dos.client||dos.nom||"Client", email:"", tel:"", adresse:"", notes:"", _source:"implicit", docs:[]};
      map[key].docs.push(dos);
    }
  });
  return Object.values(map).sort((a,b) => a.nom.localeCompare(b.nom));
}

/* ── RENDER LIST (left column) ── */
function renderList() {
  const all = buildClients();
  const filtered = search ? all.filter(c =>
    c.nom.toLowerCase().includes(search.toLowerCase()) ||
    (c.email||"").toLowerCase().includes(search.toLowerCase())
  ) : all;

  document.getElementById("clients-count").textContent = `(${all.length})`;

  const listEl = document.getElementById("client-list");
  if (!filtered.length) {
    listEl.innerHTML = `<div class="empty-list">${search ? "Aucun résultat" : "Aucun client"}</div>`;
    return;
  }

  listEl.innerHTML = filtered.map(c => {
    const ca = (c.docs||[]).reduce((s,d) =>
      (d.documents||[]).filter(doc => doc.type === "facture").reduce((ss,doc) => ss + (doc.ttc||0), s), 0);
    const isSel = c.id === selectedClientId;
    return `<div class="dcit ${isSel?"sel":""}" onclick="selectClient('${c.id}')">
      <div class="dciav" style="background:${avatarColor(c.nom)}">${initials(c.nom)}</div>
      <div class="dci-text">
        <div class="dciname">${esc(c.nom)}</div>
        <div class="dcisub">${esc(c.email||"") || "Pas d'email"}</div>
      </div>
      ${ca > 0 ? `<div class="dci-ca">${fmt(ca).replace(",00 €"," €")}</div>` : ""}
    </div>`;
  }).join("");
}

/* ── SELECT CLIENT ── */
function selectClient(id) {
  selectedClientId = id;
  renderList();
  renderDetail();
  // Mobile: open detail view
  document.getElementById("master-detail").classList.add("detail-open");
}

function backToList() {
  document.getElementById("master-detail").classList.remove("detail-open");
}

/* ── RENDER DETAIL (right column) ── */
function renderDetail() {
  const detailEl = document.getElementById("client-detail");
  if (!selectedClientId) {
    detailEl.innerHTML = `<div class="empty-detail">
      <div class="empty-detail-icon">👥</div>
      <div class="empty-detail-txt">Sélectionne un client pour voir ses détails</div>
    </div>`;
    return;
  }

  const all = buildClients();
  const c = all.find(x => x.id === selectedClientId);
  if (!c) {
    selectedClientId = null;
    return renderDetail();
  }

  const isDb = c._source === "db";
  const allDocs = (c.docs||[]).flatMap(d => d.documents||[]);
  const caTotal = allDocs.filter(d => d.type === "facture").reduce((s,d) => s + (d.ttc||0), 0);
  const dossierCount = (c.docs||[]).length;

  const editFields = isDb ? `
    <div class="dcr-edit">
      <div class="dcr-edit-title">Modifier le client</div>
      <div class="field"><label class="field-label">Nom</label><input id="edit-nom" class="field-input" type="text" value="${esc(c.nom)}"/></div>
      <div class="fields-2">
        <div class="field"><label class="field-label">Email</label><input id="edit-email" class="field-input" type="email" value="${esc(c.email||"")}"/></div>
        <div class="field"><label class="field-label">Téléphone</label><input id="edit-tel" class="field-input" type="tel" value="${esc(c.tel||"")}"/></div>
      </div>
      <div class="field"><label class="field-label">Adresse</label><input id="edit-adresse" class="field-input" type="text" value="${esc(c.adresse||"")}"/></div>
      <div class="field"><label class="field-label">Notes</label><textarea id="edit-notes" class="field-input">${esc(c.notes||"")}</textarea></div>
      <div class="field"><label class="check-row"><input id="edit-professionnel" type="checkbox" ${c.is_professionnel?"checked":""} onchange="document.getElementById('edit-siret-field').style.display=this.checked?'block':'none'"/><span>Client professionnel (B2B)</span></label></div>
      <div id="edit-siret-field" style="display:${c.is_professionnel?"block":"none"}">
        <div class="field">
          <label class="field-label">SIRET <span id="edit-siret-status" style="font-size:11px;font-weight:400;color:var(--muted);margin-left:6px;"></span></label>
          <input id="edit-siret" class="field-input" type="text" value="${esc(c.siret||"")}" placeholder="123 456 789 00012" oninput="lookupSiretClient(this.value,'edit')" autocomplete="off"/>
        </div>
        <div class="fields-2">
          <div class="field"><label class="field-label">Forme juridique</label><input id="edit-forme-juridique" class="field-input" type="text" value="${esc(c.forme_juridique||"")}" placeholder="SAS, SARL…"/></div>
          <div class="field"><label class="field-label">Code APE / NAF</label><input id="edit-code-naf" class="field-input" type="text" value="${esc(c.code_naf||"")}" placeholder="6201Z"/></div>
        </div>
        <div class="field"><label class="field-label">Libellé activité</label><input id="edit-libelle-naf" class="field-input" type="text" value="${esc(c.libelle_code_naf||"")}" placeholder="Programmation informatique"/></div>
        <div class="fields-2">
          <div class="field"><label class="field-label">N° TVA intracom</label><input id="edit-tva-intracom" class="field-input" type="text" value="${esc(c.tva_intracom||"")}" placeholder="FR12345678901"/></div>
          <div class="field"><label class="field-label">Date de création</label><input id="edit-date-creation" class="field-input" type="date" value="${esc(c.date_creation_entreprise||"")}"/></div>
        </div>
      </div>
      <button class="btn-save" onclick="saveClient('${c.id}')">Enregistrer</button>
      <button class="btn-danger" onclick="deleteClient('${c.id}')">Supprimer</button>
    </div>
  ` : `
    <div class="dcr-edit">
      <div class="warning-box"><strong>Client non enregistré</strong><br>Ce client existe uniquement via ses devis. Enregistre-le pour le conserver indépendamment.</div>
      <div class="fields-2">
        <div class="field"><label class="field-label">Email</label><input id="reg-email" class="field-input" type="email" placeholder="contact@email.com"/></div>
        <div class="field"><label class="field-label">Téléphone</label><input id="reg-tel" class="field-input" type="tel"/></div>
      </div>
      <div class="field"><label class="field-label">Adresse</label><input id="reg-adresse" class="field-input" type="text"/></div>
      <div class="field"><label class="field-label">Notes</label><textarea id="reg-notes" class="field-input"></textarea></div>
      <button class="btn-save" onclick="registerImplicitClient('${esc(c.nom).replace(/'/g,"\\'")}')">💾 Enregistrer ce client</button>
    </div>
  `;

  detailEl.innerHTML = `
    <button class="dcr-mobile-back" onclick="backToList()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
      Retour
    </button>
    <div class="dcrh">
      <div class="dcrav" style="background:${avatarColor(c.nom)}">${initials(c.nom)}</div>
      <div class="dcr-text">
        <div class="dcrname">${esc(c.nom)}</div>
        <div class="dcrsub">${c.email ? esc(c.email) : "Pas d'email"}${c.tel ? " · " + esc(c.tel) : ""}</div>
      </div>
      <div style="display:flex;gap:8px;flex-shrink:0;flex-wrap:wrap;">
        <a href="app.html?client_nom=${encodeURIComponent(c.nom)}&client_email=${encodeURIComponent(c.email||"")}&client_tel=${encodeURIComponent(c.tel||"")}&client_adresse=${encodeURIComponent(c.adresse||"")}" class="dcrbtn">+ Nouveau devis</a>
        ${c.email ? `<a href="rediger.html?to=${encodeURIComponent(c.email)}&name=${encodeURIComponent(c.nom)}" class="dcrbtn dcrbtn-mail">✉ Envoyer un email</a>` : ""}
      </div>
    </div>
    <div class="dcrb">
      <div class="dcrsts">
        <div class="dcrst">
          <div class="dcrstl">CA facturé</div>
          <div class="dcrstv ct">${fmt(caTotal)}</div>
        </div>
        <div class="dcrst">
          <div class="dcrstl">Dossiers</div>
          <div class="dcrstv ca">${dossierCount}</div>
        </div>
      </div>
      <div class="dcrsecl">Dossiers (${dossierCount})</div>
      ${buildDossiersHtml(c)}
      ${editFields}
    </div>`;
}

/* ── BUILD DOSSIERS HTML ── */
function buildDossiersHtml(c) {
  window._clientDocs = {};
  let gi = 0;
  const statLabels = {devis_envoye:"Envoyé", devis_accepte:"Accepté", facture:"Facturé", termine:"Clôturé"};
  const statColors = {
    devis_envoye:  {bg:"rgba(251,146,60,.13)", text:"#fb923c"},
    devis_accepte: {bg:"rgba(167,139,250,.13)", text:"var(--purple)"},
    facture:       {bg:"var(--green-dim)", text:"var(--green)"},
    termine:       {bg:"rgba(107,116,148,.13)", text:"var(--muted)"},
  };
  const dos = c.docs || [];
  if (!dos.length) return `<p style="font-size:13px;color:var(--muted);text-align:center;padding:16px 0;">Aucun dossier</p>`;

  return dos.map(d => {
    const documents = d.documents || [];
    const caTotal = documents.filter(doc => doc.type === "facture").reduce((s,doc) => s+(doc.ttc||0), 0);
    const sc = statColors[d.statut] || statColors.devis_envoye;
    const label = statLabels[d.statut] || d.statut || "";

    const docsHtml = documents.map(doc => {
      const isDevis = doc.type === "devis";
      const apercuId = "apercu_" + gi;
      const curIdx = gi;
      window._clientDocs[curIdx] = Object.assign({}, doc, {entreprise: doc.entreprise||{}});
      gi++;
      return `<div class="dcdocr">
        <div class="dcdocr-left">
          <span class="dcdocn">${esc(doc.docNumber||"—")}</span>
          <div class="dcdocd">${doc.date||""}</div>
        </div>
        <div class="dcdocr-right">
          <span class="${isDevis?"dcdocd-d":"dcdocd-f"}">${isDevis?"Devis":"Facture"}</span>
          <span class="dcdocttc">${fmt(doc.ttc)}</span>
          <div class="dcdoc-actions">
            <button class="btn-icon" onclick="generateClientPDF(window._clientDocs[${curIdx}])">⬇ PDF</button>
            <button class="btn-icon" id="btn-${apercuId}" onclick="toggleApercu(this)" data-id="${apercuId}" data-idx="${curIdx}">👁</button>
            ${doc.accepte ? `<button class="btn-icon purple" onclick="downloadSignedProof('${doc.docNumber}')">📄 Signé</button>` : ""}
          </div>
        </div>
        <div id="${apercuId}" style="display:none;width:100%"></div>
      </div>`;
    }).join("");

    return `<div class="dcdos">
      <div class="dcdosh" onclick="toggleDossier(this)" data-dosid="${d.id}">
        <div>
          <span class="dcbdg" style="background:${sc.bg};color:${sc.text}">${label}</span>
          <div class="dcdosn">${esc(d.nom||"Dossier")}</div>
          <div class="dcdosm">${documents.length} doc${documents.length>1?"s":""}${caTotal>0?" · "+fmt(caTotal):""}</div>
        </div>
        <span id="arr-${d.id}" class="dcdos-arrow">›</span>
      </div>
      <div id="dp-${d.id}" class="dcdocs">${docsHtml}</div>
    </div>`;
  }).join("");
}

window.toggleDossier = function(el) {
  const dosId = el.dataset.dosid;
  const dp = document.getElementById("dp-"+dosId);
  const arrow = document.getElementById("arr-"+dosId);
  if (!dp) return;
  const isOpen = dp.classList.toggle("open");
  if (arrow) arrow.style.transform = isOpen ? "rotate(90deg)" : "";
};

/* ── DOCUMENT APERCU ── */
function renderDocApercu(d) {
  const e = d.entreprise||{};
  const pieces = (d.pieces||[]).filter(p => p.description);
  const hasMO = d.nb_heures && parseFloat(d.nb_heures) > 0;
  return `<div class="doc-apercu">
    <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
      <div style="font-size:11px;color:var(--muted)">${e.nom||""}</div>
      <div style="font-size:11px;color:var(--muted)">${d.date||""}</div>
    </div>
    ${d.description ? `<p style="font-size:11px;color:var(--muted);margin-bottom:8px;font-style:italic;">${esc(d.description.slice(0,120))}${d.description.length>120?"…":""}</p>` : ""}
    ${hasMO||pieces.length>0 ? `<table style="width:100%;font-size:11px;border-collapse:collapse;margin-bottom:6px;">
      <thead><tr><th style="text-align:left;padding:3px 6px;border-bottom:1px solid var(--border);color:var(--muted)">Description</th><th style="text-align:right;padding:3px 6px;border-bottom:1px solid var(--border);color:var(--muted)">Total HT</th></tr></thead>
      <tbody>
        ${hasMO?`<tr><td style="padding:2px 6px;">Main d'œuvre (${d.nb_heures}h × ${e.taux_horaire}€/h)</td><td style="text-align:right;padding:2px 6px;">${(d.moHT||0).toFixed(2)} €</td></tr>`:""}
        ${pieces.map(p=>`<tr><td style="padding:2px 6px;">${esc(p.description)}</td><td style="text-align:right;padding:2px 6px;">${(parseFloat(p.quantite||0)*parseFloat(p.prix_unitaire||0)).toFixed(2)} €</td></tr>`).join("")}
      </tbody>
    </table>` : ""}
    <div style="text-align:right;border-top:1px solid var(--border);padding-top:6px;">
      <div style="font-family:var(--fh);font-size:14px;font-weight:700;color:var(--amber)">${e.assujetti_tva?"TTC":"Total"} : ${(d.ttc||0).toFixed(2)} €</div>
      ${!e.assujetti_tva?`<div style="font-size:10px;color:var(--muted);font-style:italic;">TVA non applicable — art. 293B du CGI</div>`:""}
    </div>
  </div>`;
}

window.toggleApercu = function(btn) {
  const id = btn.dataset.id, idx = parseInt(btn.dataset.idx);
  const el = document.getElementById(id);
  if (!el) return;
  if (el.style.display === "none") {
    el.style.display = "block";
    el.innerHTML = renderDocApercu(window._clientDocs[idx]);
    btn.textContent = "▲";
  } else {
    el.style.display = "none";
    btn.textContent = "👁";
  }
};

/* ── NEW CLIENT MODAL ── */
function openNewModal() {
  if (window.PlanGuard && window.PlanGuard.getPlan() === null) {
    window.PlanGuard.onReady(() => openNewModal()); return;
  }
  if(window.PlanGuard && window.PlanGuard.isFree()){
    const el=document.createElement("div");
    el.style.cssText="position:fixed;inset:0;z-index:9100;display:flex;align-items:center;justify-content:center;background:rgba(8,11,20,0.78);backdrop-filter:blur(8px);";

/* ── SIRET LOOKUP (data.gouv.fr) ── */
const _siretTimers = { new: null, edit: null };
const _lastSiretLookups = { new: "", edit: "" };

window.lookupSiretClient = async function(rawValue, mode) {
  const status = document.getElementById(`${mode}-siret-status`);
  if (!status) return;
  const clean = String(rawValue||"").replace(/\D/g, "");
  if (clean.length < 14) {
    status.textContent = clean.length > 0 ? `${clean.length}/14 chiffres` : "";
    status.style.color = "var(--muted)";
    return;
  }
  if (clean.length > 14) return;
  if (clean === _lastSiretLookups[mode]) return;
  _lastSiretLookups[mode] = clean;

  clearTimeout(_siretTimers[mode]);
  _siretTimers[mode] = setTimeout(async () => {
    status.textContent = "⏳ Recherche SIRENE…";
    status.style.color = "var(--muted)";
    try {
      const { data: { session } } = await sb.auth.getSession();
      const r = await fetch(SUPABASE_URL + "/functions/v1/siret-lookup", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": "Bearer " + session.access_token },
        body: JSON.stringify({ siret: clean }),
      });
      const data = await r.json();
      if (!r.ok) {
        status.textContent = "✗ " + (data.error || "Erreur");
        status.style.color = "#dc2626";
        return;
      }
      const fill = (id, value, force = false) => {
        const el = document.getElementById(id);
        if (!el) return;
        if (!force && el.value && el.value.trim() !== "") return;
        el.value = value || "";
      };
      fill(`${mode}-nom`,             data.nom_entreprise);
      fill(`${mode}-adresse`,         data.adresse_complete);
      fill(`${mode}-forme-juridique`, data.forme_juridique, true);
      fill(`${mode}-code-naf`,        data.code_naf, true);
      fill(`${mode}-libelle-naf`,     data.libelle_code_naf, true);
      fill(`${mode}-tva-intracom`,    data.tva_intracom, true);
      fill(`${mode}-date-creation`,   data.date_creation_entreprise, true);

      if (data.entreprise_cessee) {
        status.textContent = "⚠️ Entreprise cessée";
        status.style.color = "#d97706";
      } else {
        status.textContent = data.cached ? "✓ Vérifié (cache)" : "✓ Vérifié SIRENE";
        status.style.color = "#16a34a";
      }
    } catch (e) {
      status.textContent = "✗ Erreur réseau";
      status.style.color = "#dc2626";
    }
  }, 350);
};

window.saveClient = async function(id) {
  const is_professionnel = document.getElementById("edit-professionnel")?.checked||false;
  const patch = {
    nom: document.getElementById("edit-nom")?.value.trim()||"",
    email: document.getElementById("edit-email")?.value.trim()||"",
    tel: document.getElementById("edit-tel")?.value.trim()||"",
    adresse: document.getElementById("edit-adresse")?.value.trim()||"",
    notes: document.getElementById("edit-notes")?.value.trim()||"",
    is_professionnel,
    siret:                    is_professionnel ? (document.getElementById("edit-siret")?.value.trim()||"") : "",
    forme_juridique:          is_professionnel ? (document.getElementById("edit-forme-juridique")?.value.trim()||"") : "",
    code_naf:                 is_professionnel ? (document.getElementById("edit-code-naf")?.value.trim()||"") : "",
    libelle_code_naf:         is_professionnel ? (document.getElementById("edit-libelle-naf")?.value.trim()||"") : "",
    tva_intracom:             is_professionnel ? (document.getElementById("edit-tva-intracom")?.value.trim()||"") : "",
    date_creation_entreprise: is_professionnel ? (document.getElementById("edit-date-creation")?.value||null) : null,
    updated_at: new Date().toISOString(),
  };
  if (!patch.nom) { return; }
  const { error } = await sb.from("clients").update(patch).eq("id",id).eq("user_id",user.id);
  if (error) { alert("Erreur : "+error.message); return; }
  const ci = clients.findIndex(c => c.id === id);
  if (ci > -1) clients[ci] = {...clients[ci], ...patch};
  renderList(); renderDetail();
  showToast("✓ Client mis à jour");
};

window.deleteClient = async function(id) {
  if (!confirm("Supprimer ce client ? Les dossiers associés ne seront pas supprimés.")) return;
  await sb.from("clients").delete().eq("id",id);
  clients = clients.filter(c => c.id !== id);
  selectedClientId = null;
  renderList(); renderDetail();
  showToast("Client supprimé");
};

/* ── PDF ── */
function generateClientPDF(d) {
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({unit:"mm",format:"a4"});
  const W=210, m=18, cW=W-2*m, rX=W-m; let y=m;
  const e = d.entreprise||{};
  pdf.setFontSize(16).setFont(undefined,"bold").text(e.nom||"",m,y); y+=6;
  pdf.setFontSize(9).setFont(undefined,"normal").text(e.adresse||"",m,y); y+=5;
  if(e.tel){pdf.text("Tél : "+e.tel,m,y);y+=4;}
  if(e.email){pdf.text("Email : "+e.email,m,y);y+=4;}
  if(e.siret){pdf.text("SIRET : "+e.siret,m,y);y+=4;}
  pdf.setFontSize(20).setFont(undefined,"bold").setTextColor(245,167,66);
  pdf.text(d.type==="devis"?"DEVIS":"FACTURE",rX,m,{align:"right"});
  pdf.setFontSize(10).setFont(undefined,"normal").setTextColor(0);
  pdf.text("N° "+d.docNumber,rX,m+9,{align:"right"});
  pdf.text("Date : "+d.date,rX,m+15,{align:"right"});
  if(d.validUntil)pdf.text("Valable jusqu'au : "+d.validUntil,rX,m+21,{align:"right"});
  let yOff=d.validUntil?27:21;
  if(d.client?.nom){
    pdf.setFontSize(9).setFillColor(20,24,41);
    pdf.roundedRect(rX-65,m,66,yOff-3,2,2,"F");
    pdf.setFontSize(8).setTextColor(150).text("CLIENT",rX-62,m+5);
    pdf.setFontSize(10).setFont(undefined,"bold").setTextColor(226,229,241).text(d.client.nom,rX-62,m+11);
    if(d.client.adresse)pdf.setFontSize(8).setFont(undefined,"normal").setTextColor(150).text(d.client.adresse,rX-62,m+17);
  }
  y=Math.max(y,m+yOff)+4;
  pdf.setFont(undefined,"bold").setFontSize(11).setTextColor(0).text(d.type==="devis"?"Description des travaux":"Description",m,y);y+=4;
  pdf.setFont(undefined,"normal").setFontSize(9);
  if(d.description){const dl=pdf.splitTextToSize(d.description,cW);pdf.text(dl,m,y);y+=dl.length*4.5+6;}
  const hasMO=d.nb_heures&&parseFloat(d.nb_heures)>0;
  const tb=[
    ...(hasMO?[["Main d'œuvre ("+d.nb_heures+"h × "+(e.taux_horaire||0)+"€/h)",d.nb_heures,parseFloat(e.taux_horaire||0).toFixed(2)+" €",(d.moHT||0).toFixed(2)+" €"]]:[] ),
    ...(d.pieces||[]).filter(p=>p.description&&p.quantite&&p.prix_unitaire).map(p=>[p.description,p.quantite,parseFloat(p.prix_unitaire).toFixed(2)+" €",(parseFloat(p.quantite)*parseFloat(p.prix_unitaire)).toFixed(2)+" €"]),
  ];
  if(tb.length>0){
    pdf.autoTable({startY:y,head:[["Description","Qté","Prix unit. HT","Total HT"]],body:tb,margin:{left:m,right:m},styles:{fontSize:9,cellPadding:3},headStyles:{fillColor:[245,167,66],textColor:[8,11,20],fontStyle:"bold"},columnStyles:{0:{cellWidth:85},1:{cellWidth:18,halign:"center"},2:{cellWidth:32,halign:"right"},3:{cellWidth:27,halign:"right"}}});
    y=pdf.lastAutoTable.finalY+6;
  }
  pdf.setFontSize(9).setFont(undefined,"normal");
  pdf.text("Total HT :",135,y);pdf.text((d.totalHT||0).toFixed(2)+" €",rX,y,{align:"right"});y+=5;
  if(e.assujetti_tva&&d.tva){pdf.text("TVA ("+d.tvaRate+"%) :",135,y);pdf.text((d.tva||0).toFixed(2)+" €",rX,y,{align:"right"});y+=5;}
  pdf.setFont(undefined,"bold").setFontSize(11).text(e.assujetti_tva?"TOTAL TTC :":"TOTAL :",145,y);pdf.text((d.ttc||0).toFixed(2)+" €",rX,y,{align:"right"});y+=10;
  if(!e.assujetti_tva){pdf.setFont(undefined,"italic").setFontSize(8).setTextColor(100).text("TVA non applicable, art. 293 B du CGI",m,y);y+=5;pdf.setTextColor(0);}
  pdf.save(d.docNumber+".pdf");
}
window.generateClientPDF = generateClientPDF;
