<style>
:root, [data-theme="dark"] {
  --bg:        #080b14;
  --surface:   #0e1220;
  --surface-2: #141829;
  --surface-3: #1a2035;
  --border:    rgba(255,255,255,0.07);
  --border-hi: rgba(255,255,255,0.13);
  --text:      #e2e5f1;
  --muted:     #6b7494;
  --amber:     #f5a742;
  --amber-dim: rgba(245,167,66,0.12);
  --amber-glow:rgba(245,167,66,0.26);
  --teal:      #3ecfcf;
  --teal-dim:  rgba(62,207,207,0.11);
  --green:     #4ade80;
  --green-dim: rgba(74,222,128,0.1);
  --red:       #f87171;
  --red-dim:   rgba(248,113,113,0.1);
  --purple:    #a78bfa;
  --fh: 'Space Grotesk', sans-serif;
  --fb: 'Plus Jakarta Sans', sans-serif;
  --nav-h: 60px;
  --r: 14px;
}

[data-theme="light"] {
  --bg:        #faf8f3;
  --surface:   #ffffff;
  --surface-2: #f3efe6;
  --surface-3: #ece7dc;
  --border:    rgba(20,18,12,0.08);
  --border-hi: rgba(20,18,12,0.16);
  --text:      #1a1a1f;
  --muted:     #6a6b78;
  --amber:     #d97706;
  --amber-dim: rgba(217,119,6,0.10);
  --amber-glow:rgba(217,119,6,0.22);
  --teal:      #0d9488;
  --teal-dim:  rgba(13,148,136,0.10);
  --green:     #16a34a;
  --red:       #dc2626;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--fb); background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── NAV ── */
.topbar { position: fixed; top: 0; left: 0; right: 0; z-index: 100; height: var(--nav-h); padding: 0 20px 0 66px; display: flex; align-items: center; gap: 16px; background: rgba(8,11,20,0.85); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
.nav-logo { font-family: var(--fh); font-size: 18px; font-weight: 700; color: var(--text); letter-spacing:-0.02em; text-decoration:none; flex-shrink:0; }
.nav-links { display: flex; gap: 3px; flex: 1; justify-content: center; overflow-x: auto; }
.nav-link { padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 500; color: var(--muted); text-decoration: none; white-space: nowrap; border: none; background: transparent; cursor: pointer; font-family: var(--fb); transition: color .2s, background .2s; }
.nav-link:hover { color: var(--text); background: var(--surface); }
.nav-link.active { color: var(--amber); background: var(--amber-dim); font-weight: 600; }
.btn-logout { padding: 6px 14px; border-radius: 8px; font-size: 12px; font-weight: 500; background: transparent; border: 1px solid var(--border); color: var(--muted); cursor: pointer; font-family: var(--fb); transition: all .2s; }
.btn-logout:hover { border-color: var(--border-hi); color: var(--text); }

/* ── PAGE ── */
.page { padding: calc(var(--nav-h) + 24px) 20px 60px; max-width: 720px; margin: 0 auto; }
.page-title { font-family: var(--fh); font-size: 22px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 20px; }

/* ── TAB BAR ── */
.tab-bar { display: flex; gap: 4px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 4px; margin-bottom: 20px; }
.tab-btn { flex: 1; padding: 9px 8px; border: none; border-radius: 9px; font-size: 12px; font-weight: 600; cursor: pointer; background: transparent; color: var(--muted); font-family: var(--fb); transition: all .2s; white-space: nowrap; }
.tab-btn.active { background: var(--surface-2); color: var(--text); }
.tab-btn:hover:not(.active) { color: var(--text); }

/* ── CARDS ── */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 22px 24px; margin-bottom: 14px; }
.card-title { font-family: var(--fh); font-size: 14px; font-weight: 700; margin-bottom: 6px; }
.card-sub { font-size: 13px; color: var(--muted); margin-bottom: 16px; line-height: 1.6; }

/* ── FORM ── */
.field { margin-bottom: 14px; }
.field:last-child { margin-bottom: 0; }
.field-label { display: block; font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing:.06em; text-transform: uppercase; margin-bottom: 7px; }
.field-input { width: 100%; padding: 11px 14px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 14px; font-family: var(--fb); outline: none; transition: border-color .2s, box-shadow .2s; -webkit-appearance: none; }
.field-input:focus { border-color: var(--amber); box-shadow: 0 0 0 3px var(--amber-dim); }
.field-input::placeholder { color: var(--muted); }
select.field-input { cursor: pointer; }
select.field-input option { background: var(--surface-2); color: var(--text); }
.fields-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.check-row { display: flex; align-items: center; gap: 10px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; cursor: pointer; }
.check-row input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--amber); flex-shrink: 0; cursor: pointer; }
.check-row span { font-size: 14px; }

/* ── BUTTONS ── */
.btn-primary { width: 100%; padding: 13px; border-radius: 12px; background: var(--amber); border: none; color: #080b14; font-size: 14px; font-weight: 700; font-family: var(--fh); cursor: pointer; box-shadow: 0 0 24px var(--amber-glow); transition: transform .15s, opacity .2s; }
.btn-primary:hover { transform: translateY(-1px); }
.btn-primary:disabled { opacity: .5; cursor: not-allowed; transform: none; }
.btn-ghost { width: 100%; padding: 12px; border-radius: 12px; background: transparent; border: 1px solid var(--border); color: var(--muted); font-size: 13px; font-weight: 500; font-family: var(--fb); cursor: pointer; transition: all .2s; }
.btn-ghost:hover { border-color: var(--border-hi); color: var(--text); }
.btn-danger { width: 100%; padding: 12px; border-radius: 12px; background: var(--red-dim); border: 1px solid rgba(248,113,113,.2); color: var(--red); font-size: 13px; font-weight: 500; font-family: var(--fb); cursor: pointer; transition: all .2s; }
.btn-danger:hover { background: rgba(248,113,113,.18); }

/* ── PLAN CARDS ── */
.plans-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
.plan-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px; display: flex; flex-direction: column; gap: 14px; position: relative; }
.plan-card.current { border-color: var(--amber); background: linear-gradient(145deg, var(--amber-dim) 0%, var(--surface) 70%); }
.plan-card.pro-card { border-color: rgba(167,139,250,.3); background: linear-gradient(145deg, rgba(167,139,250,.07) 0%, var(--surface) 70%); }
.plan-badge { position: absolute; top: -11px; left: 50%; transform: translateX(-50%); background: var(--amber); color: #080b14; font-size: 10px; font-weight: 800; padding: 3px 12px; border-radius: 100px; white-space: nowrap; letter-spacing:.04em; }
.plan-badge.pro { background: var(--purple); color: #fff; }
.plan-name { font-family: var(--fh); font-size: 16px; font-weight: 700; }
.plan-price { font-family: var(--fh); font-size: 26px; font-weight: 800; }
.plan-price span { font-size: 13px; font-weight: 400; color: var(--muted); }
.plan-price-note { font-size: 10px; color: var(--green); font-weight: 600; margin-top: 2px; }
.plan-features { list-style: none; display: flex; flex-direction: column; gap: 7px; flex: 1; }
.plan-features li { font-size: 12px; display: flex; align-items: flex-start; gap: 7px; color: var(--muted); }
.plan-features li .ck { color: var(--teal); flex-shrink: 0; }
.billing-toggle { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 16px; }
.billing-btn { padding: 7px 18px; border-radius: 100px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: var(--fb); border: 1px solid var(--border); background: transparent; color: var(--muted); transition: all .2s; }
.billing-btn.on { background: var(--surface-2); color: var(--text); border-color: var(--border-hi); }
.discount-badge { background: var(--green-dim); color: var(--green); font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 100px; }

/* ── ALERT BOX ── */
.alert-box { border-radius: 12px; padding: 14px 16px; margin-bottom: 14px; display: flex; align-items: flex-start; gap: 12px; }
.alert-box.warning { background: rgba(251,146,60,.08); border: 1px solid rgba(251,146,60,.2); }
.alert-box.warning .alert-title { color: #fb923c; }
.alert-box.success { background: var(--green-dim); border: 1px solid rgba(74,222,128,.2); }
.alert-box.success .alert-title { color: var(--green); }
.alert-icon { font-size: 20px; flex-shrink: 0; }
.alert-title { font-family: var(--fh); font-size: 13px; font-weight: 700; margin-bottom: 3px; }
.alert-sub { font-size: 12px; color: var(--muted); line-height: 1.6; }

/* ── TABLE ── */
.inv-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.inv-table th { padding: 8px 10px; font-size: 10px; font-weight: 700; color: var(--muted); letter-spacing:.05em; text-transform: uppercase; text-align: left; border-bottom: 1px solid var(--border); }
.inv-table th:last-child { text-align: center; }
.inv-table td { padding: 11px 10px; border-bottom: 1px solid var(--border); }
.inv-table tr:last-child td { border-bottom: none; }
.inv-table tr:hover td { background: var(--surface-2); }
.inv-num { font-family: var(--fh); font-weight: 700; color: var(--amber); }
.inv-amount { font-weight: 700; }
.btn-dl { padding: 4px 12px; border-radius: 6px; font-size: 11px; font-weight: 600; background: var(--amber-dim); border: 1px solid rgba(245,167,66,.25); color: var(--amber); cursor: pointer; font-family: var(--fb); transition: all .2s; }
.btn-dl:hover { background: rgba(245,167,66,.2); }

/* ── THEME TOGGLE ── */
.theme-opts { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.theme-opt { padding: 14px; border-radius: 12px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; font-size: 13px; font-weight: 500; font-family: var(--fb); text-align: center; transition: all .2s; }
.theme-opt.on { border-color: var(--amber); background: var(--amber-dim); color: var(--amber); }

/* ── GMAIL ── */
.gmail-connected { background: var(--green-dim); border: 1px solid rgba(74,222,128,.2); border-radius: 12px; padding: 14px 16px; display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.gmail-connected span { font-size: 13px; font-weight: 600; color: var(--green); }

/* ── TOAST ── */
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--surface-2); border: 1px solid var(--border-hi); color: var(--text); padding: 12px 24px; border-radius: 12px; font-size: 13px; font-weight: 500; z-index: 9999; box-shadow: 0 8px 32px rgba(0,0,0,.4); transition: opacity .4s; opacity: 0; pointer-events: none; white-space: nowrap; }

.section-sep { font-size: 11px; font-weight: 700; letter-spacing:.07em; text-transform: uppercase; color: var(--muted); margin: 20px 0 12px; }

@media(max-width:640px) {
  .nav-links { display: none; }
  .plans-grid { grid-template-columns: 1fr; }
  .fields-2 { grid-template-columns: 1fr; }
  .tab-btn { font-size: 11px; padding: 8px 4px; }
  .page { padding: calc(var(--nav-h) + 16px) 12px 40px; }
}

    /* ── FOOTER LÉGAL ── */

.theme-toggle { width:34px; height:34px; display:flex; align-items:center; justify-content:center; background:var(--surface); border:1px solid var(--border); border-radius:9px; cursor:pointer; color:var(--text); transition:all .2s; flex-shrink:0; }

function esc(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function toast(msg) {
  const t = document.getElementById("toast-el");
  t.textContent = msg; t.style.opacity = "1";
  clearTimeout(t._to); t._to = setTimeout(() => { t.style.opacity = "0"; }, 3500);
}

function set(obj) {
  if ("deleteConfirm" in obj) { deleteConfirm = obj.deleteConfirm; render(); }
}

async function deleteAccount() {
  deleteLoading = true;
  render();
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = "login.html"; return; }
    const res = await fetch(FUNCTIONS_URL + "/delete-account", {
      method: "POST",
      headers: { "Authorization": "Bearer " + session.access_token, "Content-Type": "application/json" }
    });
    const data = await res.json();
    if (data.success) {
      await sb.auth.signOut();
      window.location.href = "index.html";
    } else {
      const msg = document.getElementById("delete-msg");
      if (msg) { msg.textContent = "❌ " + (data.error || "Erreur."); msg.style.color = "var(--red)"; }
      deleteLoading = false; render();
    }
  } catch(e) {
    const msg = document.getElementById("delete-msg");
    if (msg) { msg.textContent = "❌ " + e.message; msg.style.color = "var(--red)"; }
    deleteLoading = false; render();
  }
}

async function savePseudo() {
  const val = document.getElementById('pseudo-input')?.value?.trim() || '';
  const { data: { session } } = await sb.auth.getSession();
  if (!session) return;
  const { error } = await sb.from('profils').update({ pseudo: val }).eq('user_id', session.user.id);
  if (!error) { profil.pseudo = val; toast('✅ Pseudo enregistré !'); }
  else toast('❌ Erreur : ' + error.message);
}


async function requestPasswordReset() {
  const msg = document.getElementById('pass-msg');
  const btn = event.target;
  btn.disabled = true;
  btn.textContent = 'Envoi en cours…';
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (!session?.user?.email) { msg.textContent = '❌ Session introuvable.'; msg.style.color = '#f87171'; return; }
    const { error } = await sb.auth.resetPasswordForEmail(session.user.email, {
      redirectTo: 'https://www.monartio.fr/reset-password.html'
    });
    if (!error) {
      msg.textContent = '✅ Lien envoyé à ' + session.user.email + ' — vérifie ta boîte mail.';
      msg.style.color = '#4ade80';
    } else {
      msg.textContent = '❌ ' + error.message;
      msg.style.color = '#f87171';
    }
  } catch(e) {
    msg.textContent = '❌ Erreur : ' + e.message;
    msg.style.color = '#f87171';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Envoyer le lien par email';
  }
}

function doGoogleConnect() {
  const scope = encodeURIComponent([
    "https://www.googleapis.com/auth/gmail.send",
    "https://www.googleapis.com/auth/gmail.modify",
    "https://www.googleapis.com/auth/calendar.events",
    "https://www.googleapis.com/auth/calendar.readonly",
    "https://www.googleapis.com/auth/userinfo.email"
  ].join(" "));
  const redirect = encodeURIComponent("https://www.monartio.fr/settings.html");
  const url = `https://accounts.google.com/o/oauth2/v2/auth`
    + `?client_id=${GOOGLE_CLIENT_ID}`
    + `&redirect_uri=${redirect}`
    + `&response_type=code`
    + `&scope=${scope}`
    + `&access_type=offline`
    + `&prompt=consent`
    + `&include_granted_scopes=true`;
  window.location.href = url;
}

async function handleGoogleCode(code) {
  gmailConnecting = true; render();
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) {
      toast("⚠️ Session expirée. Reconnecte-toi à Artio d'abord.");
      gmailConnecting = false; render(); return;
    }
    const res = await fetch(FUNCTIONS_URL + "/gmail-oauth", {
      method: "POST",
      headers: {
        "Authorization": "Bearer " + session.access_token,
        "apikey": SB_KEY,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ code })
    });
    if (!res.ok) {
      const txt = await res.text();
      throw new Error(`Erreur serveur (${res.status}) : ${txt}`);
    }
    const data = await res.json();
    if (data.success) {
      gmailEmail = data.google_email;
      // Recalculer l'expiry côté client (1h par défaut pour access token)
      gmailTokenExpiry = new Date(Date.now() + 3600 * 1000);
      const features = [];
      if (data.has_gmail_send) features.push("emails");
      if (data.has_calendar)   features.push("agenda");
      toast(`✓ Google connecté : ${gmailEmail}${features.length ? " (" + features.join(" + ") + ")" : ""}`);
      activeTab = "gmail";
    } else {
      toast("Erreur Google : " + (data.error || "inconnue"));
    }
  } catch(e) {
    toast("Erreur : " + e.message);
  }
  gmailConnecting = false;
  history.replaceState(null, "", location.pathname);
  render();
}

async function doGoogleDisconnect() {
  if (!confirm("Déconnecter ton compte Google ? Cela désactivera l'envoi d'emails ET la synchronisation Google Calendar.")) return;
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) return;
    const res = await fetch(FUNCTIONS_URL + "/google-disconnect", {
      method: "POST",
      headers: {
        "Authorization": "Bearer " + session.access_token,
        "Content-Type":  "application/json"
      },
      body: JSON.stringify({})
    });
    const data = await res.json();
    if (!res.ok || !data.success) {
      toast("Erreur : " + (data.error || "inconnue"));
      return;
    }
    gmailEmail = null;
    gmailTokenExpiry = null;
    render();
    toast("Google déconnecté");
  } catch(e) {
    toast("Erreur : " + e.message);
  }
}

async function activerFacturationElectronique() {
  if (!user) return;
  if (!profil.siret || profil.siret.replace(/\s/g,"").length < 9) {
    toast("⚠️ SIRET manquant — renseignez-le dans l'onglet Mon entreprise.");
    return;
  }
  if (!facturationElectroniqueMandatAccepte) {
    toast("⚠️ Vous devez accepter le mandat de transmission.");
    return;
  }
  syncing = true;
  render();
  const activatedAt = new Date().toISOString();
  const { error } = await sb.from("profils").update({
    facturation_electronique_active: true,
    facturation_electronique_activated_at: activatedAt,
    facturation_electronique_mandat_accepte: true
  }).eq("user_id", user.id);
  syncing = false;
  if (error) {
    toast("❌ Erreur lors de l'activation : " + error.message);
    render();
    return;
  }
  facturationElectroniqueActive = true;
  facturationElectroniqueActivatedAt = activatedAt;
  toast("✅ Facturation électronique activée — vos prochaines factures seront émises automatiquement.");
  render();
}

  const _planName = subscriptionStatus === "solo" ? "Solo" : "Pro";

  checkoutLoading=true;render();
  try{
    const{data:{session}}=await sb.auth.getSession();
    if(!session){checkoutLoading=false;render();return;}
    const res=await fetch('https://mwmexkoeqeyueqgdkkni.supabase.co/functions/v1/reactivate-subscription',{
      method:'POST',
      headers:{'Authorization':'Bearer '+session.access_token,'Content-Type':'application/json'},
      body:JSON.stringify({})
    });
    const data=await res.json();
    if(!res.ok){alert("Erreur : "+(data.error||'inconnu'));checkoutLoading=false;render();return;}

      monthly: 'https://buy.stripe.com/fZu00j9whc0Xckb9vN7N601',
      annual:  'https://buy.stripe.com/3cI3cvdMxfd96ZR0Zh7N605'

      monthly: 'https://buy.stripe.com/14A3cv37Td5197Z37p7N603',

    }

  checkoutLoading = true; render();
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { alert("Session expirée, veuillez vous reconnecter."); checkoutLoading = false; render(); return; }

async function requestCancellation() {
  const planName = subscriptionStatus === "solo" ? "Solo" : "Pro";
  const _endRaw = subscriptionEndDate ? new Date(subscriptionEndDate) : (() => { const d = new Date(); d.setMonth(d.getMonth()+1,0); return d; })();
  const _endStr = _endRaw.toLocaleDateString("fr-FR", { day:"numeric", month:"long", year:"numeric" });
  if (!confirm(`Confirmer la résiliation du plan ${planName} ?\n\nVotre accès reste actif jusqu'au ${_endStr}, puis sera automatiquement désactivé.`)) return;
  cancelLoading = true; render();
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { cancelLoading = false; render(); return; }
    const res = await fetch(FUNCTIONS_URL + "/request-cancellation", { method:"POST", headers:{"Authorization":"Bearer "+session.access_token,"Content-Type":"application/json"}, body: JSON.stringify({}) });
    const data = await res.json();
    if (data?.success) {
      cancellationRequested = true;
      await sb.from("profils").update({cancellation_requested:true}).eq("user_id", session.user.id);
      toast("✓ Résiliation enregistrée. Votre accès reste actif jusqu'à la fin de la période.");
    } else { alert("Erreur : " + (data?.error||"inconnu")); }
  } catch(e) { alert("Erreur : " + e.message); }
  cancelLoading = false; render();
}

/* ── SAVE PROFIL ── */
function uploadLogo(event) {
  const file = event.target.files[0];
  if (!file) return;
  if (file.size > 300 * 1024) { toast("⚠ Logo trop lourd (max 300 Ko)."); return; }
  const reader = new FileReader();
  reader.onload = async (e) => {
    logoBase64 = e.target.result;
    profil.logo_base64 = logoBase64;
    const { error } = await sb.from("profils").update({ logo_base64: logoBase64 }).eq("user_id", user.id);
    if (error) { toast("Erreur upload logo : " + error.message); return; }
    toast("✅ Logo enregistré !");
    render();
  };
  reader.readAsDataURL(file);
}

async function removeLogo() {
  logoBase64 = null;
  profil.logo_base64 = null;
  const { error } = await sb.from("profils").update({ logo_base64: null }).eq("user_id", user.id);
  if (error) { toast("Erreur : " + error.message); return; }
  toast("Logo supprimé");
  render();
}

async function saveProfil() {
  document.querySelectorAll(".pi").forEach(el => {
    if (el.type === "checkbox") profil[el.dataset.k] = el.checked;
    else profil[el.dataset.k] = el.value;
  });
  if (!profil.nom || !profil.siret || !profil.taux_horaire) { toast("⚠ Nom, SIRET et taux horaire obligatoires."); return; }
  syncing = true; render();
  const { error } = await sb.from("profils").upsert({ user_id: user.id, ...profil, assujetti_tva: profil.assujetti_tva||false, tva_frequence: profil.tva_frequence||"trimestrielle", tva_regime: profil.tva_regime||"encaissements", contexte_ia: profil.contexte_ia||"", couleur_pdf: profil.couleur_pdf || "#378ADD", updated_at: new Date().toISOString() }, { onConflict: "user_id" });
  syncing = false;
  if (error) { toast("Erreur : " + error.message); render(); return; }
  toast("✓ Enregistré !");
  render();
}

function downloadFacture(index) {
  const f = factures[index];
  if (!f) return;
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const montant = Number(f.montant).toFixed(2).replace(".", ",");
  const dateEmission = new Date(f.date_emission).toLocaleDateString("fr-FR");
  const dateDebut = new Date(f.periode_debut).toLocaleDateString("fr-FR");
  const dateFin = new Date(f.periode_fin).toLocaleDateString("fr-FR");
  const frequence = f.frequence === "annuel" ? "Annuel" : "Mensuel";
  doc.setFillColor(8,11,20); doc.rect(0,0,210,42,"F");
  doc.setTextColor(255,255,255); doc.setFontSize(22); doc.setFont("helvetica","bold"); doc.text("Artio",14,20);

/* ── LOGOUT ── */
(function(){var b=document.getElementById("btn-logout");if(b)b.addEventListener("click",async()=>{await sb.auth.signOut();location.href="index.html";});})();

/* ── INIT ── */
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { location.href = "index.html"; return; }
  user = session.user;
  const { data: p } = await sb.from("profils").select("*").eq("user_id", user.id).single();
  if (p) {
    profil = { nom:p.nom||"", adresse:p.adresse||"", tel:p.tel||"", email:p.email||"", siret:p.siret||"", taux_horaire:p.taux_horaire||"", assujetti_tva:p.assujetti_tva||false, tva_frequence:p.tva_frequence||"trimestrielle", tva_regime:p.tva_regime||"encaissements", secteur:p.secteur||"", conditions_paiement:p.conditions_paiement||"", delai_paiement:p.delai_paiement||"30", validite_devis:p.validite_devis||3, iban:p.iban||"", contexte_ia:p.contexte_ia||"", couleur_pdf:p.couleur_pdf||"#378ADD" };
    logoBase64 = p.logo_base64 || null;
    isAdmin = p.is_admin === true;
    subscriptionStatus = p.subscription_status || "free";
    subscriptionEndDate = p.subscription_end_date || null;
    cancellationRequested = p.cancellation_requested || false;
    gmailEmail = p.google_email || p.gmail_email || null;
    // google_token_expiry est un timestamp ISO depuis la nouvelle migration ;
    // gmail_token_expiry est en bigint (ms epoch). On gère les deux formats.
    const expiryRaw = p.google_token_expiry || p.gmail_token_expiry;
    gmailTokenExpiry = expiryRaw ? new Date(expiryRaw) : null;
    // Facturation électronique
    facturationElectroniqueActive = p.facturation_electronique_active === true;
    facturationElectroniqueActivatedAt = p.facturation_electronique_activated_at || null;
    facturationElectroniqueMandatAccepte = p.facturation_electronique_mandat_accepte === true;
  }
  const { data: fdata } = await sb.from("factures").select("*").eq("user_id", user.id).order("date_emission", {ascending:false});
  if (fdata) factures = fdata;

  // Gestion retour OAuth Google (mail + calendar unifiés)
  const urlParams = new URLSearchParams(location.search);
  const gmailCode = urlParams.get("code");
  if (gmailCode) {
    history.replaceState(null, "", location.pathname);
    activeTab = "gmail";
    render();
    await handleGoogleCode(gmailCode);
    return;
  }

  const subParam = urlParams.get("subscription");
  if (subParam === "success") { activeTab = "abonnement"; toast("✅ Abonnement activé ! Bienvenue dans le Plan Pro."); }
  else if (subParam === "cancelled") { activeTab = "abonnement"; }
  const tab = urlParams.get("tab");
  if (tab && ["profil","compte","gmail","abonnement"].includes(tab)) activeTab = tab;
  history.replaceState(null,"",location.pathname);
  render();
  // ── Tutoriel interactif : reprend si en cours ──
  if(window.ArtioTour) window.ArtioTour.autoStart();
})();
