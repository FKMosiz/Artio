<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Artio — Paramètres</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root {
  --bg:        #080b14;
  --surface:   #0e1220;
  --surface-2: #141829;
  --surface-3: #1a2035;
  --border:    rgba(255,255,255,0.07);
  --border-hi: rgba(255,255,255,0.13);
  --text:      #e2e5f1;
  --muted:     #6b7494;
  --amber:     #f5a742;
  --amber-dim: rgba(245,167,66,0.12);
  --amber-glow:rgba(245,167,66,0.26);
  --teal:      #3ecfcf;
  --teal-dim:  rgba(62,207,207,0.11);
  --green:     #4ade80;
  --green-dim: rgba(74,222,128,0.1);
  --red:       #f87171;
  --red-dim:   rgba(248,113,113,0.1);
  --purple:    #a78bfa;
  --fh: 'Space Grotesk', sans-serif;
  --fb: 'Plus Jakarta Sans', sans-serif;
  --nav-h: 60px;
  --r: 14px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--fb); background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── NAV ── */
.topbar { position: fixed; top: 0; left: 0; right: 0; z-index: 100; height: var(--nav-h); padding: 0 20px; display: flex; align-items: center; gap: 16px; background: rgba(8,11,20,0.85); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
.nav-logo { font-family: var(--fh); font-size: 18px; font-weight: 700; color: var(--amber); letter-spacing:-0.02em; text-decoration:none; flex-shrink:0; }
.nav-links { display: flex; gap: 3px; flex: 1; justify-content: center; overflow-x: auto; }
.nav-link { padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 500; color: var(--muted); text-decoration: none; white-space: nowrap; border: none; background: transparent; cursor: pointer; font-family: var(--fb); transition: color .2s, background .2s; }
.nav-link:hover { color: var(--text); background: var(--surface); }
.nav-link.active { color: var(--amber); background: var(--amber-dim); font-weight: 600; }
.btn-logout { padding: 6px 14px; border-radius: 8px; font-size: 12px; font-weight: 500; background: transparent; border: 1px solid var(--border); color: var(--muted); cursor: pointer; font-family: var(--fb); transition: all .2s; }
.btn-logout:hover { border-color: var(--border-hi); color: var(--text); }

/* ── PAGE ── */
.page { padding: calc(var(--nav-h) + 24px) 20px 60px; max-width: 720px; margin: 0 auto; }
.page-title { font-family: var(--fh); font-size: 22px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 20px; }

/* ── TAB BAR ── */
.tab-bar { display: flex; gap: 4px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 4px; margin-bottom: 20px; }
.tab-btn { flex: 1; padding: 9px 8px; border: none; border-radius: 9px; font-size: 12px; font-weight: 600; cursor: pointer; background: transparent; color: var(--muted); font-family: var(--fb); transition: all .2s; white-space: nowrap; }
.tab-btn.active { background: var(--surface-2); color: var(--text); }
.tab-btn:hover:not(.active) { color: var(--text); }

/* ── CARDS ── */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 22px 24px; margin-bottom: 14px; }
.card-title { font-family: var(--fh); font-size: 14px; font-weight: 700; margin-bottom: 6px; }
.card-sub { font-size: 13px; color: var(--muted); margin-bottom: 16px; line-height: 1.6; }

/* ── FORM ── */
.field { margin-bottom: 14px; }
.field:last-child { margin-bottom: 0; }
.field-label { display: block; font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing:.06em; text-transform: uppercase; margin-bottom: 7px; }
.field-input { width: 100%; padding: 11px 14px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 14px; font-family: var(--fb); outline: none; transition: border-color .2s, box-shadow .2s; -webkit-appearance: none; }
.field-input:focus { border-color: var(--amber); box-shadow: 0 0 0 3px var(--amber-dim); }
.field-input::placeholder { color: var(--muted); }
select.field-input { cursor: pointer; }
select.field-input option { background: var(--surface-2); color: var(--text); }
.fields-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.check-row { display: flex; align-items: center; gap: 10px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; cursor: pointer; }
.check-row input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--amber); flex-shrink: 0; cursor: pointer; }
.check-row span { font-size: 14px; }

/* ── BUTTONS ── */
.btn-primary { width: 100%; padding: 13px; border-radius: 12px; background: var(--amber); border: none; color: #080b14; font-size: 14px; font-weight: 700; font-family: var(--fh); cursor: pointer; box-shadow: 0 0 24px var(--amber-glow); transition: transform .15s, opacity .2s; }
.btn-primary:hover { transform: translateY(-1px); }
.btn-primary:disabled { opacity: .5; cursor: not-allowed; transform: none; }
.btn-ghost { width: 100%; padding: 12px; border-radius: 12px; background: transparent; border: 1px solid var(--border); color: var(--muted); font-size: 13px; font-weight: 500; font-family: var(--fb); cursor: pointer; transition: all .2s; }
.btn-ghost:hover { border-color: var(--border-hi); color: var(--text); }
.btn-danger { width: 100%; padding: 12px; border-radius: 12px; background: var(--red-dim); border: 1px solid rgba(248,113,113,.2); color: var(--red); font-size: 13px; font-weight: 500; font-family: var(--fb); cursor: pointer; transition: all .2s; }
.btn-danger:hover { background: rgba(248,113,113,.18); }

/* ── PLAN CARDS ── */
.plans-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
.plan-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px; display: flex; flex-direction: column; gap: 14px; position: relative; }
.plan-card.current { border-color: var(--amber); background: linear-gradient(145deg, var(--amber-dim) 0%, var(--surface) 70%); }
.plan-card.pro-card { border-color: rgba(167,139,250,.3); background: linear-gradient(145deg, rgba(167,139,250,.07) 0%, var(--surface) 70%); }
.plan-badge { position: absolute; top: -11px; left: 50%; transform: translateX(-50%); background: var(--amber); color: #080b14; font-size: 10px; font-weight: 800; padding: 3px 12px; border-radius: 100px; white-space: nowrap; letter-spacing:.04em; }
.plan-badge.pro { background: var(--purple); color: #fff; }
.plan-name { font-family: var(--fh); font-size: 16px; font-weight: 700; }
.plan-price { font-family: var(--fh); font-size: 26px; font-weight: 800; }
.plan-price span { font-size: 13px; font-weight: 400; color: var(--muted); }
.plan-price-note { font-size: 10px; color: var(--green); font-weight: 600; margin-top: 2px; }
.plan-features { list-style: none; display: flex; flex-direction: column; gap: 7px; flex: 1; }
.plan-features li { font-size: 12px; display: flex; align-items: flex-start; gap: 7px; color: var(--muted); }
.plan-features li .ck { color: var(--teal); flex-shrink: 0; }
.billing-toggle { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 16px; }
.billing-btn { padding: 7px 18px; border-radius: 100px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: var(--fb); border: 1px solid var(--border); background: transparent; color: var(--muted); transition: all .2s; }
.billing-btn.on { background: var(--surface-2); color: var(--text); border-color: var(--border-hi); }
.discount-badge { background: var(--green-dim); color: var(--green); font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 100px; }

/* ── ALERT BOX ── */
.alert-box { border-radius: 12px; padding: 14px 16px; margin-bottom: 14px; display: flex; align-items: flex-start; gap: 12px; }
.alert-box.warning { background: rgba(251,146,60,.08); border: 1px solid rgba(251,146,60,.2); }
.alert-box.warning .alert-title { color: #fb923c; }
.alert-box.success { background: var(--green-dim); border: 1px solid rgba(74,222,128,.2); }
.alert-box.success .alert-title { color: var(--green); }
.alert-icon { font-size: 20px; flex-shrink: 0; }
.alert-title { font-family: var(--fh); font-size: 13px; font-weight: 700; margin-bottom: 3px; }
.alert-sub { font-size: 12px; color: var(--muted); line-height: 1.6; }

/* ── TABLE ── */
.inv-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.inv-table th { padding: 8px 10px; font-size: 10px; font-weight: 700; color: var(--muted); letter-spacing:.05em; text-transform: uppercase; text-align: left; border-bottom: 1px solid var(--border); }
.inv-table th:last-child { text-align: center; }
.inv-table td { padding: 11px 10px; border-bottom: 1px solid var(--border); }
.inv-table tr:last-child td { border-bottom: none; }
.inv-table tr:hover td { background: var(--surface-2); }
.inv-num { font-family: var(--fh); font-weight: 700; color: var(--amber); }
.inv-amount { font-weight: 700; }
.btn-dl { padding: 4px 12px; border-radius: 6px; font-size: 11px; font-weight: 600; background: var(--amber-dim); border: 1px solid rgba(245,167,66,.25); color: var(--amber); cursor: pointer; font-family: var(--fb); transition: all .2s; }
.btn-dl:hover { background: rgba(245,167,66,.2); }

/* ── THEME TOGGLE ── */
.theme-opts { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.theme-opt { padding: 14px; border-radius: 12px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; font-size: 13px; font-weight: 500; font-family: var(--fb); text-align: center; transition: all .2s; }
.theme-opt.on { border-color: var(--amber); background: var(--amber-dim); color: var(--amber); }

/* ── GMAIL ── */
.gmail-connected { background: var(--green-dim); border: 1px solid rgba(74,222,128,.2); border-radius: 12px; padding: 14px 16px; display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.gmail-connected span { font-size: 13px; font-weight: 600; color: var(--green); }

/* ── TOAST ── */
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--surface-2); border: 1px solid var(--border-hi); color: var(--text); padding: 12px 24px; border-radius: 12px; font-size: 13px; font-weight: 500; z-index: 9999; box-shadow: 0 8px 32px rgba(0,0,0,.4); transition: opacity .4s; opacity: 0; pointer-events: none; white-space: nowrap; }

/* ── FACT PULSE BADGE ── */
.fp-ok { font-size: 11px; color: var(--green); margin-top: 6px; }
.fp-warn { font-size: 11px; color: #fb923c; margin-top: 6px; }

.section-sep { font-size: 11px; font-weight: 700; letter-spacing:.07em; text-transform: uppercase; color: var(--muted); margin: 20px 0 12px; }

@media(max-width:640px) {
  .nav-links { display: none; }
  .plans-grid { grid-template-columns: 1fr; }
  .fields-2 { grid-template-columns: 1fr; }
  .tab-btn { font-size: 11px; padding: 8px 4px; }
  .page { padding: calc(var(--nav-h) + 16px) 12px 40px; }
}
</style>
</head>

/* ── GMAIL TAB ── */
function renderGmail() {
  return `<div class="card">

    </div>
  </div>`;
}

function doGmailConnect() {
  const clientId = (document.getElementById("gmail-client-id")?.value || gmailClientId).trim();
  if (!clientId) { alert("Entre ton Client ID Google OAuth 2.0."); return; }
  localStorage.setItem("artio_gmail_client_id", clientId);
  const scope = encodeURIComponent("https://www.googleapis.com/auth/gmail.readonly https://www.googleapis.com/auth/gmail.send");
  const redirect = encodeURIComponent(window.location.origin + "/settings.html");
  window.location.href = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${clientId}&redirect_uri=${redirect}&response_type=token&scope=${scope}&prompt=consent`;
}
function doGmailDisconnect() { gmailToken = null; sessionStorage.removeItem("gmail_token"); render(); toast("Gmail déconnecté"); }


/* ── ABONNEMENT TAB ── */
function renderAbonnement() {

  const endDate = subscriptionEndDate ? new Date(subscriptionEndDate).toLocaleDateString("fr-FR") : null;
  const features_free = ["Jusqu'à 5 devis par mois","Jusqu'à 5 factures par mois","Gestion des dossiers clients","Génération de PDF"];
  const features_pro  = ["Devis & factures illimités","IA & Dictée vocale","Connexion Gmail","Génération automatique","Support prioritaire"];

  return `
    ${isRestricted ? `<div class="alert-box warning">
      <div class="alert-icon">⚠️</div>
      <div><div class="alert-title">Accès restreint — paiement en attente</div>
      <div class="alert-sub">${endDate ? `Merci de régulariser avant le ${endDate} pour éviter la suspension.` : "Merci de régulariser votre paiement."}</div></div>
    </div>` : ""}

    ${!isPro ? `<div class="billing-toggle">
      <button class="billing-btn ${!isAnnual?"on":""}" onclick="billingPeriod='monthly';render()">Mensuel</button>
      <button class="billing-btn ${isAnnual?"on":""}" onclick="billingPeriod='annual';render()">
        Annuel &nbsp;<span class="discount-badge">2 mois offerts</span>
      </button>
    </div>` : ""}

    <div class="plans-grid">
      <div class="plan-card ${!isPro&&!isRestricted?"current":""}">
        ${!isPro&&!isRestricted ? `<div class="plan-badge">PLAN ACTUEL</div>` : ""}
        <div>
          <div class="plan-name">Gratuit</div>
          <div class="plan-price">0 €<span> / mois</span></div>
        </div>
        <ul class="plan-features">${features_free.map(f=>`<li><span class="ck">✓</span><span>${f}</span></li>`).join("")}</ul>
        <div style="padding:10px;border-radius:9px;background:var(--surface-2);text-align:center;font-size:12px;color:var(--muted)">Plan actif</div>
      </div>
      <div class="plan-card pro-card ${isPro?"current":""}">
        ${isPro ? `<div class="plan-badge pro">PLAN ACTUEL</div>` : ""}
        <div>
          <div class="plan-name">Pro ⚡</div>
          ${isPro ? `<div class="plan-price">—<span> / mois</span></div>` : isAnnual ? `
            <div class="plan-price">390 €<span> / an</span></div>
            <div class="plan-price-note">✓ 2 mois offerts — 32,50 €/mois</div>
          ` : `<div class="plan-price">39 €<span> / mois</span></div>`}
        </div>
        <ul class="plan-features">${features_pro.map(f=>`<li><span class="ck">✓</span><span>${f}</span></li>`).join("")}</ul>
        ${isPro ? (cancellationRequested ? `
          <div class="alert-box warning" style="margin:0">
            <div><div class="alert-title">Résiliation en cours</div>
            <div class="alert-sub">Accès Pro actif jusqu'au ${endDate||"fin de période"}.</div></div>
          </div>` : `
          <button class="btn-danger" onclick="requestCancellation()" ${cancelLoading?"disabled":""}>${cancelLoading?"Envoi…":"Demander l'annulation"}</button>
        `) : `
          <button class="btn-primary" onclick="startCheckout()" ${checkoutLoading?"disabled":""}>${checkoutLoading?"Redirection…":`Passer au Pro ${isAnnual?"(annuel)":"(mensuel)"}`}</button>
        `}
      </div>
    </div>
    <p style="text-align:center;font-size:11px;color:var(--muted)">Paiement sécurisé par Stripe · Sans engagement · Annulation à tout moment</p>

    ${factures.length > 0 ? `
    <div class="section-sep">Mes factures</div>
    <div class="card">
      <table class="inv-table">
        <thead><tr>
          <th>N°</th><th>Date</th><th>Plan</th><th>Montant</th><th>PDF</th>
        </tr></thead>
        <tbody>${factures.map((f,i) => `<tr>
          <td class="inv-num">${esc(f.numero_facture)}</td>
          <td style="color:var(--muted)">${new Date(f.date_emission).toLocaleDateString("fr-FR")}</td>
          <td style="color:var(--muted)">Pro — ${f.frequence==="annuel"?"Annuel":"Mensuel"}</td>
          <td class="inv-amount">${Number(f.montant).toFixed(2).replace(".",",")} €</td>
          <td style="text-align:center"><button class="btn-dl" onclick="downloadFacture(${i})">⬇ PDF</button></td>
        </tr>`).join("")}</tbody>
      </table>
    </div>` : ""}`;
}

async function startCheckout() {
  checkoutLoading = true; render();
  try {
    const { data: { session } } = await sb.auth.getSession();
    const res = await fetch(FUNCTIONS_URL + "/clever-task", { method:"POST", headers:{"Authorization":"Bearer "+SB_KEY,"apikey":SB_KEY,"Content-Type":"application/json"}, body: JSON.stringify({plan:billingPeriod,user_id:session.user.id}) });
    const data = await res.json();
    if (data?.url) window.location.href = data.url;
    else alert("Erreur : " + JSON.stringify(data));
  } catch(e) { alert("Erreur réseau : " + e.message); }
  checkoutLoading = false; render();
}

async function requestCancellation() {
  if (!confirm("Confirmer la demande d'annulation ? Vous conserverez l'accès jusqu'à la fin du mois payé.")) return;
  cancelLoading = true; render();
  try {
    const { data: { session } } = await sb.auth.getSession();
    const res = await fetch(FUNCTIONS_URL + "/request-cancellation", { method:"POST", headers:{"Authorization":"Bearer "+SB_KEY,"apikey":SB_KEY,"Content-Type":"application/json"}, body: JSON.stringify({user_id:session.user.id}) });
    const data = await res.json();
    if (data?.success) {
      cancellationRequested = true;
      await sb.from("profils").update({cancellation_requested:true}).eq("user_id", session.user.id);
      toast("✓ Demande envoyée. Accès Pro actif jusqu'à la fin de la période payée.");
    } else { alert("Erreur : " + (data?.error||"inconnu")); }
  } catch(e) { alert("Erreur : " + e.message); }
  cancelLoading = false; render();
}

/* ── SAVE PROFIL ── */
async function saveProfil() {
  document.querySelectorAll(".pi").forEach(el => {
    if (el.type === "checkbox") profil[el.dataset.k] = el.checked;
    else profil[el.dataset.k] = el.value;
  });
  if (!profil.nom || !profil.siret || !profil.taux_horaire) { toast("⚠ Nom, SIRET et taux horaire obligatoires."); return; }
  if (!profil.api_key) { toast("⚠ La clé API Anthropic est obligatoire."); return; }
  syncing = true; render();
  const { error } = await sb.from("profils").upsert({ user_id: user.id, ...profil, assujetti_tva: profil.assujetti_tva||false, updated_at: new Date().toISOString() }, { onConflict: "user_id" });
  syncing = false;
  if (error) { toast("Erreur : " + error.message); render(); return; }
  toast("✓ Enregistré !");
  render();
}

/* ── DOWNLOAD FACTURE ── */
function downloadFacture(index) {
  const f = factures[index];
  if (!f) return;
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const montant = Number(f.montant).toFixed(2).replace(".", ",");
  const dateEmission = new Date(f.date_emission).toLocaleDateString("fr-FR");
  const dateDebut = new Date(f.periode_debut).toLocaleDateString("fr-FR");
  const dateFin = new Date(f.periode_fin).toLocaleDateString("fr-FR");
  const frequence = f.frequence === "annuel" ? "Annuel" : "Mensuel";
  doc.setFillColor(8,11,20); doc.rect(0,0,210,42,"F");
  doc.setTextColor(255,255,255); doc.setFontSize(22); doc.setFont("helvetica","bold"); doc.text("Artio",14,20);
  doc.setFontSize(11); doc.setFont("helvetica","normal"); doc.setTextColor(148,163,184); doc.text("monartio.fr",14,30);
  doc.setTextColor(245,167,66); doc.setFontSize(14); doc.setFont("helvetica","bold"); doc.text("FACTURE",196,20,{align:"right"});
  doc.setFontSize(11); doc.setFont("helvetica","normal"); doc.setTextColor(148,163,184); doc.text(f.numero_facture,196,30,{align:"right"});
  let y = 58;
  doc.setFontSize(10); doc.setFont("helvetica","bold"); doc.setTextColor(100,100,100);
  doc.text("DATE D'ÉMISSION",14,y); doc.text("PÉRIODE",105,y);
  doc.setFont("helvetica","normal"); doc.setTextColor(30,30,30); doc.setFontSize(11);
  doc.text(dateEmission,14,y+7); doc.text(`${dateDebut} → ${dateFin}`,105,y+7);
  y += 22; doc.setDrawColor(220,220,220); doc.line(14,y,196,y);
  y += 14; doc.setFillColor(248,250,252); doc.roundedRect(14,y-6,182,36,3,3,"F");
  doc.setFontSize(10); doc.setFont("helvetica","bold"); doc.setTextColor(100,100,100);
  doc.text("DESCRIPTION",20,y+2); doc.text("MONTANT",190,y+2,{align:"right"});
  doc.setFont("helvetica","normal"); doc.setTextColor(30,30,30); doc.setFontSize(11);
  doc.text(`Abonnement Artio Pro — ${frequence}`,20,y+12);
  doc.setFont("helvetica","bold"); doc.setFontSize(13); doc.text(`${montant} €`,190,y+12,{align:"right"});
  doc.setFont("helvetica","normal"); doc.setFontSize(9); doc.setTextColor(130,130,130);
  doc.text(`Période : ${dateDebut} → ${dateFin}`,20,y+20);
  y += 50; doc.setDrawColor(245,167,66); doc.setLineWidth(0.5); doc.line(105,y,196,y);
  doc.setTextColor(30,30,30); doc.setFontSize(11); doc.setFont("helvetica","bold");
  doc.text("TOTAL PAYÉ",105,y+10);
  doc.setFontSize(16); doc.setTextColor(245,167,66); doc.text(`${montant} €`,190,y+10,{align:"right"});
  doc.setFontSize(9); doc.setFont("helvetica","normal"); doc.setTextColor(130,130,130);
  doc.text("TVA non applicable, art. 293 B du CGI",105,y+18);
  if (profil.nom) {
    y += 36;
    doc.setTextColor(100,100,100); doc.setFontSize(9); doc.setFont("helvetica","bold"); doc.text("FACTURÉ À",14,y);
    doc.setFont("helvetica","normal"); doc.setTextColor(30,30,30); doc.setFontSize(10);
    doc.text(profil.nom,14,y+7);
    if (profil.siret) doc.text(`SIRET : ${profil.siret}`,14,y+14);
    if (profil.adresse) doc.text(profil.adresse,14,y+21);
  }
  doc.setFillColor(248,250,252); doc.rect(0,278,210,20,"F");
  doc.setTextColor(150,150,150); doc.setFontSize(8); doc.setFont("helvetica","normal");
  doc.text("Artio — monartio.fr · Paiement traité par Stripe",105,287,{align:"center"});
  doc.save(`${f.numero_facture}.pdf`);
}

/* ── GMAIL OAUTH CALLBACK ── */
(function checkGmailCallback() {
  const hash = window.location.hash;
  if (hash && hash.includes("access_token")) {
    const params = new URLSearchParams(hash.substring(1));
    const token = params.get("access_token");
    if (token) { gmailToken = token; sessionStorage.setItem("gmail_token", token); history.replaceState(null,"",location.pathname); activeTab = "gmail"; }
  }
})();

/* ── LOGOUT ── */
document.getElementById("btn-logout").addEventListener("click", async () => { await sb.auth.signOut(); location.href = "index.html"; });

/* ── INIT ── */
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { location.href = "index.html"; return; }
  user = session.user;
  const { data: p } = await sb.from("profils").select("*").eq("user_id", user.id).single();
  if (p) {
    profil = { nom:p.nom||"", adresse:p.adresse||"", tel:p.tel||"", email:p.email||"", siret:p.siret||"", taux_horaire:p.taux_horaire||"", api_key:p.api_key||"", assujetti_tva:p.assujetti_tva||false, secteur:p.secteur||"", conditions_paiement:p.conditions_paiement||"", delai_paiement:p.delai_paiement||"30", iban:p.iban||"", factpulse_token:p.factpulse_token||"" };
    subscriptionStatus = p.subscription_status || "free";
    subscriptionEndDate = p.subscription_end_date || null;
    cancellationRequested = p.cancellation_requested || false;
  }
  const { data: fdata } = await sb.from("factures").select("*").eq("user_id", user.id).order("date_emission", {ascending:false});
  if (fdata) factures = fdata;
  const urlParams = new URLSearchParams(location.search);
  const subParam = urlParams.get("subscription");
  if (subParam === "success") { activeTab = "abonnement"; toast("✅ Abonnement activé ! Bienvenue dans le Plan Pro."); }
  else if (subParam === "cancelled") { activeTab = "abonnement"; }
  const tab = urlParams.get("tab");
  if (tab && ["profil","gmail","abonnement"].includes(tab)) activeTab = tab;
  history.replaceState(null,"",location.pathname);
  render();
})();
</script>
