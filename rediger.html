<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Artio · Rédiger</title>
<link rel="icon" type="image/png" href="artio-icon.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="plan-guard.js?v=1"></script>
<script src="tour.js?v=1"></script>
<script>const PAGE_PLAN_REQUIRED = "solo";</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<script src="pdf-generator.js?v=1"></script>
<style>
:root,[data-theme="dark"]{
  --bg:#080b14;--surface:#0e1220;--surface-2:#141829;--surface-3:#1a2035;
  --border:rgba(255,255,255,0.07);--border-hi:rgba(255,255,255,0.13);
  --text:#e2e5f1;--muted:#6b7494;--muted-2:#8a92ad;
  --amber:#f5a742;--amber-dim:rgba(245,167,66,0.13);--amber-glow:rgba(245,167,66,0.30);
  --teal:#3ecfcf;--teal-dim:rgba(62,207,207,0.11);
  --red:#f87171;--red-dim:rgba(248,113,113,0.10);--green:#4ade80;
  --fh:'Space Grotesk',sans-serif;--fb:'Plus Jakarta Sans',sans-serif;--fm:'JetBrains Mono',monospace;
}
[data-theme="light"]{
  --bg:#faf8f3;--surface:#ffffff;--surface-2:#f3efe6;--surface-3:#ece7dc;
  --border:rgba(20,18,12,0.08);--border-hi:rgba(20,18,12,0.16);
  --text:#1a1a1f;--muted:#6a6b78;--muted-2:#4d4e5a;
  --amber:#d97706;--amber-dim:rgba(217,119,6,0.10);--amber-glow:rgba(217,119,6,0.22);
  --teal:#0d9488;--teal-dim:rgba(13,148,136,0.10);
  --red:#dc2626;--red-dim:rgba(220,38,38,0.08);--green:#16a34a;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--fb);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;overflow:hidden;font-size:13.5px;min-height:100vh}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea{font-family:inherit;color:inherit;outline:none}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:3px}
::-webkit-scrollbar-track{background:transparent}
kbd{font-family:var(--fm);font-size:10.5px;padding:2px 6px;border:1px solid var(--border-hi);border-bottom-width:2px;border-radius:5px;background:var(--surface-2);color:var(--muted-2);font-weight:500;line-height:1}

/* ─────────────────────────────────────── RAIL */
.rail{width:56px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:14px 0;gap:4px;height:100vh}
.rail-logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--amber),#e07a18);display:flex;align-items:center;justify-content:center;color:#080b14;font-family:var(--fh);font-weight:800;font-size:17px;margin-bottom:12px;flex-shrink:0}
.rail-btn{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:background .14s,color .14s;position:relative;flex-shrink:0}
.rail-btn:hover{background:var(--surface-2);color:var(--text)}
.rail-btn.on{background:var(--amber-dim);color:var(--amber)}
.rail-btn.on::before{content:"";position:absolute;left:-7px;top:9px;bottom:9px;width:2.5px;border-radius:0 2px 2px 0;background:var(--amber)}
.rail-btn svg{width:18px;height:18px}
.rail-spacer{flex:1}
.rail-foot{display:flex;flex-direction:column;align-items:center;gap:6px;padding-top:10px;border-top:1px solid var(--border);width:100%}
.rail-avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#7c5cff,#3ecfcf);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;color:#fff;cursor:pointer}

/* ─────────────────────────────────────── NAV PANE */
.nav{width:218px;flex-shrink:0;background:var(--bg);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh}
.nav-head{padding:14px 16px 13px;display:flex;align-items:center;border-bottom:1px solid var(--border)}
.nav-head h2{font-family:var(--fh);font-size:15px;font-weight:700;letter-spacing:-.01em;flex:1}
.cmdk{font-size:10px;padding:3px 7px;border:1px solid var(--border-hi);border-radius:6px;color:var(--muted);font-family:var(--fm);cursor:pointer}
.nav-sect{padding:14px 14px 5px 16px;font-size:10px;font-weight:700;letter-spacing:.13em;color:var(--muted);text-transform:uppercase;display:flex;align-items:center;justify-content:space-between}
.nav-sect-r{letter-spacing:0;font-size:10px;font-weight:600;color:var(--muted-2);text-transform:none}
.nav-items{padding:2px 8px 0;display:flex;flex-direction:column;gap:1px}
.nav-it{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-radius:7px;font-size:12.5px;font-weight:500;cursor:pointer;color:var(--muted-2)}
.nav-it:hover{background:var(--surface-2);color:var(--text)}
.nav-it.on{background:var(--amber-dim);color:var(--amber);font-weight:600}
.nav-it-l{display:inline-flex;align-items:center;gap:8px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nav-it .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.nav-it-n{font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums}
.nav-it.on .nav-it-n{color:var(--amber)}
.nav-spacer{flex:1}
.nav-foot{padding:12px 16px 14px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:5px}
.kbd-row{display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--muted)}

/* ─────────────────────────────────────── MAIN */
.main{width:100%;display:flex;flex-direction:column;min-width:0;height:100vh;overflow:hidden}
.topbar{padding:10px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0}
.crumb{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;color:var(--muted)}
.crumb b{color:var(--text);font-weight:600}
.crumb-sep{width:12px;height:12px;opacity:.4}
.tb-spacer{flex:1}
.search-bar{width:280px;display:flex;align-items:center;gap:8px;padding:6px 11px;border:1px solid var(--border);border-radius:8px;background:var(--surface)}
.search-bar svg{width:13px;height:13px;color:var(--muted);flex-shrink:0}
.search-bar input{flex:1;background:transparent;border:none;font-size:12.5px;color:var(--text);min-width:0}
.search-bar input::placeholder{color:var(--muted)}
.live{font-size:11px;color:var(--muted);display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.live .dot{width:6px;height:6px;border-radius:50%;background:var(--teal);animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
.view-btns{display:inline-flex;background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:3px;gap:2px}
.view-btn{padding:6px 13px;border-radius:7px;font-size:12.5px;font-weight:600;color:var(--muted);display:inline-flex;align-items:center;gap:6px;transition:background .12s,color .12s}
.view-btn svg{width:13px;height:13px}
.view-btn.on{background:var(--surface-2);color:var(--amber)}

/* ─────────────────────────────────────── BODY */
.body{flex:1;display:flex;min-height:0;overflow:hidden}

/* ─────────────────────────────────────── EMAIL LIST */
.inbox{display:flex;width:100%;min-height:0}
.inbox.off{display:none}
.list{width:380px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--bg);height:100%}
.list-toolbar{padding:11px 16px 10px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);flex-shrink:0}
.list-toolbar .count{font-size:12.5px;font-weight:600}
.list-toolbar .count b{color:var(--amber)}
.list-toolbar .ml{margin-left:auto;display:inline-flex;align-items:center;gap:6px}
.live-sm{font-size:11px;color:var(--muted);display:inline-flex;align-items:center;gap:4px}
.live-sm .dot{width:5px;height:5px;border-radius:50%;background:var(--teal);animation:pulse 2s infinite}
.filter-seg{display:inline-flex;background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:2px;gap:1px}
.filter-seg button{padding:4px 9px;border-radius:5px;font-size:11.5px;font-weight:600;color:var(--muted)}
.filter-seg button.on{background:var(--surface-2);color:var(--amber)}

.list-search{padding:9px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.list-search input{width:100%;padding:7px 11px 7px 30px;border-radius:8px;border:1px solid var(--border);background:var(--surface-2);font-size:12.5px;color:var(--text);background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236b7494' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round'><circle cx='11' cy='11' r='7'/><path d='m21 21-4.3-4.3'/></svg>");background-repeat:no-repeat;background-position:10px center;background-size:13px}
.list-search input::placeholder{color:var(--muted)}

.list-items{flex:1;overflow-y:auto;padding:6px 8px 12px}
.li{display:grid;grid-template-columns:40px 1fr auto;gap:11px;padding:11px 12px;border-radius:10px;cursor:pointer;transition:background .12s;align-items:start;position:relative}
.li:hover{background:var(--surface-2)}
.li.on{background:var(--surface-2)}
.li.on::before{content:"";position:absolute;left:0;top:8px;bottom:8px;width:3px;background:var(--amber);border-radius:0 2px 2px 0}
.av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;font-family:var(--fh);flex-shrink:0}
.av.c1{background:linear-gradient(135deg,#f5a742,#f87171)}
.av.c2{background:linear-gradient(135deg,#3ecfcf,#34d399)}
.av.c3{background:linear-gradient(135deg,#a78bfa,#ec4899)}
.av.c4{background:linear-gradient(135deg,#fbbf24,#fb923c)}
.av.c5{background:linear-gradient(135deg,#60a5fa,#a78bfa)}
.li-body{min-width:0;display:flex;flex-direction:column;gap:3px}
.li-from{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:flex;align-items:center;gap:6px}
.li-new{width:6px;height:6px;border-radius:50%;background:var(--amber);flex-shrink:0}
.li-subj{font-size:12.5px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}
.li-snip{font-size:11.5px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.li-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:2px}
.li-tag{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;letter-spacing:.03em}
.li-tag.amber{background:var(--amber-dim);color:var(--amber)}
.li-tag.teal{background:var(--teal-dim);color:var(--teal)}
.li-tag.red{background:var(--red-dim);color:var(--red)}
.li-meta{font-size:10.5px;color:var(--muted);font-weight:500;text-align:right;flex-shrink:0;padding-top:2px}

/* ─────────────────────────────────────── READING + REPLY */
.read{flex:1;display:flex;flex-direction:column;min-width:0}
.read-hdr{padding:18px 26px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.read-meta-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.tag{padding:2px 8px;border-radius:99px;font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.05em}
.tag-amber{background:var(--amber-dim);color:var(--amber)}
.tag-teal{background:var(--teal-dim);color:var(--teal)}
.tag-conv{font-size:11px;color:var(--muted)}
.read-subj{font-family:var(--fh);font-size:22px;font-weight:700;letter-spacing:-.025em;line-height:1.2;margin-bottom:10px}
@media(max-width:680px){.read-subj{font-size:15px;margin-bottom:6px}.read-hdr{padding:10px 14px 8px}}
.read-from{display:flex;align-items:center;gap:10px}
.read-from .av{width:34px;height:34px;font-size:12px}
.read-from-info{flex:1}
.read-from-info b{font-size:13px;font-weight:600;display:block}
.read-from-info span{font-size:11.5px;color:var(--muted)}
.read-from-ts{font-size:11.5px;color:var(--muted);margin-left:auto}
.read-acts{display:flex;gap:6px;flex-shrink:0;align-items:center;margin-left:auto}
.icon-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--muted);display:flex;align-items:center;justify-content:center;transition:.14s}
.icon-btn:hover{border-color:var(--border-hi);color:var(--text)}
.icon-btn svg{width:14px;height:14px}

.read-actions{padding:9px 26px;display:flex;gap:6px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;flex-wrap:wrap;align-items:center}
.act{display:inline-flex;align-items:center;gap:7px;padding:6px 12px;border:1px solid var(--border);border-radius:7px;font-size:12px;font-weight:600;color:var(--muted-2);transition:.13s}
.act:hover{border-color:var(--border-hi);color:var(--text)}
.act.amber{background:var(--amber-dim);border-color:rgba(245,167,66,.3);color:var(--amber)}
.act.amber:hover{background:rgba(245,167,66,.2)}
.act svg{width:13px;height:13px}
.act-sp{flex:1}
.act.red{color:var(--red)}

.read-body{padding:22px 26px;overflow-y:auto;flex:1;font-size:14px;line-height:1.75;color:var(--text)}
.read-body p{margin-bottom:13px}
.read-body p:last-child{margin-bottom:0}

/* ─────────────────────────────────────── REPLY DOCK */
.dock{flex-shrink:0;border-top:1px solid var(--border);background:var(--surface);padding:13px 20px 15px}
.dock-tabs{display:flex;gap:5px;margin-bottom:10px;align-items:center;flex-wrap:wrap}
.dock-tab{padding:7px 13px;border-radius:9px;font-size:12.5px;font-weight:600;color:var(--muted);display:inline-flex;align-items:center;gap:6px;border:1px solid transparent;transition:.13s}
.dock-tab svg{width:13px;height:13px}
.dock-tab:hover{color:var(--text)}
.dock-tab.on{background:var(--amber-dim);color:var(--amber);border-color:rgba(245,167,66,.3)}
.dock-tab.manual.on{background:var(--surface-2);color:var(--text);border-color:var(--border-hi)}
.dock-sp{flex:1}
.dock-tone{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
.dock-tone-p{padding:3px 9px;border-radius:99px;border:1px solid var(--border);font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;transition:.12s}
.dock-tone-p.on{background:var(--amber-dim);border-color:rgba(245,167,66,.35);color:var(--amber)}
.dock-tone-p:hover:not(.on){border-color:var(--border-hi);color:var(--text)}

.dock-compose{background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:13px 14px}
.dock-textarea{width:100%;background:transparent;border:none;resize:none;font-size:13.5px;line-height:1.65;min-height:110px;color:var(--text);font-family:var(--fb)}
.dock-textarea::placeholder{color:var(--muted)}
.dock-foot{display:flex;align-items:center;gap:8px;margin-top:8px;padding-top:9px;border-top:1px solid var(--border)}
.dock-chip{display:inline-flex;align-items:center;gap:5px;background:var(--teal-dim);color:var(--teal);padding:3px 9px;border-radius:99px;font-weight:600;font-size:11px}
.btn-ghost{padding:7px 13px;border-radius:8px;font-size:12.5px;font-weight:600;color:var(--muted);border:1px solid var(--border);display:inline-flex;align-items:center;gap:6px;transition:.13s}
.btn-ghost:hover{color:var(--text);border-color:var(--border-hi)}
.btn-ghost svg{width:12px;height:12px}
.btn-send{margin-left:auto;padding:9px 18px;background:var(--amber);color:#080b14;border-radius:9px;font-weight:700;font-size:13px;font-family:var(--fh);display:inline-flex;align-items:center;gap:7px;box-shadow:0 0 22px var(--amber-glow);transition:.13s}
.btn-send:hover{transform:translateY(-1px)}
.btn-send svg{width:13px;height:13px}

/* ─────────────────────────────────────── COMPOSE VIEW */
.compose{display:none;flex-direction:column;width:100%;height:100%;overflow:hidden}
.compose.on{display:flex}

.cmp-topbar{padding:11px 20px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;flex-wrap:wrap}
.cmp-topbar label{font-size:11.5px;color:var(--muted);font-weight:600;flex-shrink:0}
.cmp-topbar input{padding:6px 10px;border-radius:7px;border:1px solid var(--border);background:var(--bg);font-size:12.5px;color:var(--text);transition:.13s;min-width:160px}
.cmp-topbar input:focus{border-color:var(--amber);box-shadow:0 0 0 3px var(--amber-dim)}
.cmp-topbar .sep{width:1px;height:20px;background:var(--border);flex-shrink:0}

.cmp-tabs{padding:9px 22px;display:flex;gap:5px;border-bottom:1px solid var(--border);flex-shrink:0;align-items:center;flex-wrap:wrap}
.cmp-tab{padding:6px 13px;border-radius:8px;font-size:12.5px;font-weight:600;color:var(--muted);border:1px solid transparent;transition:.13s}
.cmp-tab.on{background:var(--amber-dim);color:var(--amber);border-color:rgba(245,167,66,.3)}
.cmp-tabs .sp{flex:1}
.cmp-tone{display:flex;gap:5px;align-items:center;font-size:11px;color:var(--muted)}
.cmp-tone-p{padding:3px 9px;border-radius:99px;border:1px solid var(--border);font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;transition:.12s}
.cmp-tone-p.on{background:var(--amber-dim);border-color:rgba(245,167,66,.35);color:var(--amber)}

.cmp-body{flex:1;display:grid;grid-template-columns:1fr 282px;min-height:0;overflow:hidden}
.cmp-editor{padding:22px 28px;overflow-y:auto;border-right:1px solid var(--border);display:flex;flex-direction:column}
.cmp-subj{width:100%;background:transparent;border:none;font-family:var(--fh);font-size:24px;font-weight:700;letter-spacing:-.025em;padding:0;color:var(--text);margin-bottom:14px}
.cmp-subj::placeholder{color:var(--muted)}
.cmp-hr{height:1px;background:var(--border);margin:0 0 16px}
.cmp-textarea{flex:1;width:100%;background:transparent;border:none;font-size:14px;line-height:1.72;color:var(--text);resize:none;font-family:var(--fb);min-height:260px}
.cmp-textarea::placeholder{color:var(--muted)}

.cmp-side{display:flex;flex-direction:column;gap:14px;padding:18px;overflow-y:auto;background:var(--surface)}
.sc{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:13px 14px}
.sc h4{font-size:10.5px;font-weight:700;color:var(--amber);text-transform:uppercase;letter-spacing:.1em;margin-bottom:9px;display:flex;align-items:center;gap:6px}
.sc h4 svg{width:11px;height:11px}
.sc p{font-size:12px;line-height:1.55;color:var(--muted-2)}
.sc-sug{display:flex;flex-direction:column;gap:5px}
.sc-sug button{text-align:left;padding:7px 10px;border:1px solid var(--border);border-radius:8px;background:var(--surface-2);font-size:12px;color:var(--text);transition:.13s}
.sc-sug button:hover{border-color:var(--amber);background:var(--amber-dim);color:var(--amber)}
.sc-tok{display:flex;justify-content:space-between;font-size:11.5px;color:var(--muted);font-family:var(--fm);margin-top:8px}
.sc-tok b{color:var(--text)}
.sc-tpl{display:flex;flex-direction:column;gap:5px}
.sc-tpl button{text-align:left;padding:6px 10px;border:1px solid var(--border);border-radius:7px;background:var(--surface-2);font-size:12px;color:var(--muted-2);display:flex;align-items:center;gap:7px;transition:.13s}
.sc-tpl button:hover{color:var(--text);border-color:var(--border-hi)}

.cmp-foot{padding:11px 22px;display:flex;align-items:center;gap:10px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0;flex-wrap:wrap}
.cmp-foot .sp{flex:1}

@media(max-width:1200px){.cmp-body{grid-template-columns:1fr}.cmp-side{display:none}}
@media(max-width:1050px){.list{width:320px}}
@media(max-width:880px){.nav{display:none}}
@media(max-width:680px){
  .rail{display:none}
  .list{width:100%;border-right:none}
  .read{display:none;position:fixed;inset:0;z-index:50;background:var(--bg);flex-direction:column}
  .read.mobile-open{display:flex}
  /* Bouton retour dans le header du mail */

/* ─── IA (Claude proxy) ─── */
async function callClaude(prompt,maxTokens=600,retries=4){
  if(window.PlanGuard&&window.PlanGuard.isFree()){_showReadonlyAlert("La génération par IA nécessite un abonnement actif.");throw new Error("plan_required");}
  const{data:{session}}=await sb.auth.getSession();
  if(!session)throw new Error("Session expirée.");
  for(let a=1;a<=retries;a++){
    try{
      const res=await fetch(FUNCTIONS_URL+"/claude-proxy",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+session.access_token},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:maxTokens,messages:[{role:"user",content:prompt}]})});
      const d=await res.json();
      if(!res.ok){
        if(d.code==="plan_required"||res.status===403){_showReadonlyAlert("Abonnement requis pour utiliser l'IA.");throw new Error("plan_required");}
        if((res.status===529||res.status===503||res.status===429)&&a<retries){await new Promise(r=>setTimeout(r,1500*Math.pow(1.5,a)));continue;}
        throw new Error(d.error||d.message||"Erreur proxy IA");
      }
      return{text:d.content?.map(b=>b.text||"").join("")||"",usage:d.usage||null};
    }catch(e){
      if(a===retries){if(e.message==="plan_required")throw e;throw new Error("L'IA est momentanément surchargée. Réessayez.");}
      if(e.message==="plan_required")throw e;
      await new Promise(r=>setTimeout(r,1500*Math.pow(1.5,a)));
    }
  }
}

function decodeBase64Utf8(s){
  try{return decodeURIComponent(escape(atob(s.replace(/-/g,"+").replace(/_/g,"/"))));}

   Refresh automatique du token côté serveur.
   Le client n'a plus à gérer l'expiration.
   ───────────────────────────────────────────────────── */
async function gmailApi(action,params={}){
  const{data:{session}}=await sb.auth.getSession();

/* Parser multipart récursif */
function extractEmailParts(payload){
  let plain=null,html=null,hasAttach=false;
  const attachments=[];
  function walk(p){
    if(!p)return;
    const m=(p.mimeType||"").toLowerCase();
    const headers=p.headers||[];
    const disp=headers.find(h=>h.name?.toLowerCase()==="content-disposition")?.value||"";
    const isAttach=/attachment/i.test(disp)||(p.filename&&p.filename.length>0&&p.body?.attachmentId);
    if(isAttach&&p.body?.attachmentId){
      hasAttach=true;
      let filename=p.filename||"";
      if(!filename){
        const mm=disp.match(/filename[*]?=(?:"?(?:UTF-8''|UTF-8'')?([^";\s]+)"?)/i);
        if(mm){try{filename=decodeURIComponent(mm[1]);}catch(e){filename=mm[1];}}
      }
      attachments.push({
        attachmentId:p.body.attachmentId,
        filename:filename||"piece-jointe",
        mimeType:p.mimeType||"application/octet-stream",
        size:p.body.size||0,
      });
    }else{
      if(m==="text/plain"&&p.body?.data&&!plain)plain=p.body.data;
      else if(m==="text/html"&&p.body?.data&&!html)html=p.body.data;
    }
    if(p.parts&&p.parts.length>0)p.parts.forEach(walk);
  }
  walk(payload);
  return{plain,html,hasAttach,attachments};
}

/* Sender display "Marie Dubois <m@x.fr>" → "Marie Dubois" */
function senderName(from){
  if(!from)return"(inconnu)";
  const m=from.match(/^"?([^"<]+?)"?\s*<.+>$/);
  return m?m[1].trim():from.split("@")[0];
}
function senderEmail(from){
  if(!from)return"";
  const m=from.match(/<([^>]+)>/);
  return m?m[1]:from.trim();
}
function initials(name){
  const parts=(name||"").trim().split(/\s+/).filter(Boolean);
  if(parts.length===0)return"?";
  if(parts.length===1)return parts[0].slice(0,2).toUpperCase();
  return(parts[0][0]+parts[parts.length-1][0]).toUpperCase();
}
function avColor(name){
  const cls=["c1","c2","c3","c4","c5"];
  let h=0;for(const c of(name||"x"))h=(h*31+c.charCodeAt(0))&0xffff;
  return cls[h%cls.length];
}
function formatDate(dateStr){
  if(!dateStr)return"";
  const d=new Date(dateStr);
  if(isNaN(d))return"";
  const now=new Date();
  const sameDay=d.toDateString()===now.toDateString();
  if(sameDay)return d.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});
  const y=new Date(now);y.setDate(y.getDate()-1);
  if(d.toDateString()===y.toDateString())return"Hier";
  const diff=(now-d)/86400000;
  if(diff<7)return["Dim","Lun","Mar","Mer","Jeu","Ven","Sam"][d.getDay()];
  return d.toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit"});
}
function cleanSnippet(s){
  return(s||"").replace(/&#39;/g,"'").replace(/&quot;/g,'"').replace(/&amp;/g,"&").replace(/&lt;/g,"<").replace(/&gt;/g,">").replace(/\r\n|\r|\n/g," ").slice(0,160);
}

    const d=await gmailApi("list",{query:"in:inbox",maxResults:50});

      const{plain,html,hasAttach,attachments}=extractEmailParts(rawMsg.payload||{});

/* ─── THREAD (charge la conversation complète) ─── */
function parseGmailMessage(d){
  const hh=d.payload?.headers||[];
  const get=n=>hh.find(h=>h.name===n)?.value||"";
  const{plain,html,hasAttach,attachments}=extractEmailParts(d.payload||{});
  let body="",bodyType="text";
  if(plain){body=decodeBase64Utf8(plain).slice(0,12000);bodyType="text";}
  else if(html){body=decodeBase64Utf8(html);bodyType="html";}
  else if(d.payload?.body?.data){body=decodeBase64Utf8(d.payload.body.data).slice(0,12000);}
  return{
    id:d.id,
    from:get("From"),to:get("To"),
    subject:get("Subject"),date:get("Date"),
    body,bodyType,hasAttach,
    attachments:attachments||[],
    labelIds:d.labelIds||[],
    isSent:(d.labelIds||[]).includes("SENT"),
  };
}

async function fetchThread(threadId){
  if(S.threads[threadId])return S.threads[threadId];
  try{
    const d=await gmailApi("thread",{threadId});
    const msgs=(d.thread?.messages||[]).map(parseGmailMessage).sort((a,b)=>{
      const da=new Date(a.date||0).getTime();
      const db=new Date(b.date||0).getTime();
      return da-db;
    });
    S.threads[threadId]=msgs;
    return msgs;
  }catch(e){
    if(handleGmailError(e))return [];
    console.error("fetchThread:",e);return [];
  }
}

function _attIcon(mime){
  if(!mime)return"📎";
  if(/pdf/i.test(mime))return"📄";
  if(/image/i.test(mime))return"🖼";
  if(/word|document|msword/i.test(mime))return"📝";
  if(/sheet|excel/i.test(mime))return"📊";
  if(/zip|rar|compress/i.test(mime))return"🗜";
  if(/audio/i.test(mime))return"🎵";
  if(/video/i.test(mime))return"🎬";
  return"📎";

function _attSizeFmt(bytes){
  if(!bytes||bytes<=0)return"";
  if(bytes<1024)return bytes+" o";
  if(bytes<1024*1024)return Math.round(bytes/1024)+" Ko";
  return (bytes/1024/1024).toFixed(1).replace(".",",")+" Mo";
}

window.downloadAttachment=async function(messageId,attachmentId,filename,mimeType){
  showToast("⏳ Téléchargement…");
  try{
    const d=await gmailApi("attachment",{messageId,attachmentId});
    if(!d.data)throw new Error("Données manquantes");
    // Base64 URL-safe → standard
    const b64=d.data.replace(/-/g,"+").replace(/_/g,"/");
    const binary=atob(b64);
    const bytes=new Uint8Array(binary.length);
    for(let i=0;i<binary.length;i++)bytes[i]=binary.charCodeAt(i);
    const blob=new Blob([bytes],{type:mimeType||"application/octet-stream"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download=filename||"piece-jointe";
    document.body.appendChild(a);a.click();
    setTimeout(()=>{URL.revokeObjectURL(url);document.body.removeChild(a);},150);
    showToast("✅ "+filename);
  }catch(e){
    if(handleGmailError(e))return;
    showToast("❌ "+e.message);
  }
};

/* ─── MODALE PIÈCES JOINTES (centrée) ───
   Contexte : "reply" (réponse depuis messagerie) ou "compose" (nouveau msg)
   ────────────────────────────────────── */
let _pjContext=null;     // "reply" | "compose"
let _pjClientEmail=null; // email du client concerné (mode reply)

window.openPjModal=async function(context){
  _pjContext=context;
  _pjClientEmail=null;
  if(context==="reply"){
    const m=S.emails.find(e=>e.id===S.selectedEmailId);
    if(m){_pjClientEmail=senderEmail(m.from).toLowerCase();}
  }
  await loadDossiers();
  const inp=document.getElementById("pj-search");if(inp)inp.value="";
  renderPjModalBody();
  document.getElementById("pj-overlay").classList.add("open");
};

window.closePjModal=function(){
  document.getElementById("pj-overlay").classList.remove("open");
  _pjContext=null;_pjClientEmail=null;
};

function _pjItemHtml(d,idx){
  return `<button class="pj-item" onclick="pjPickDoc(${idx})">
    <span class="icn">${d.type==="facture"?"🧾":"📄"}</span>
    <div style="flex:1;min-width:0">
      <div class="nm">${esc(d.docNumber)} — ${esc(d.dossierNom||d.client?.nom||"")}</div>
      <div class="meta">${esc(d.date||"")}${d.ttc?" · "+d.ttc.toFixed(2)+" €":""}</div>
    </div>
  </button>`;
}

window.renderPjModalBody=function(){
  const body=document.getElementById("pj-body");if(!body)return;
  const q=(document.getElementById("pj-search")?.value||"").trim().toLowerCase();
  let docs=S.dossiers.slice();

  // Filtrer par recherche
  if(q){
    docs=docs.filter(d=>{
      const txt=((d.docNumber||"")+" "+(d.dossierNom||"")+" "+(d.client?.nom||"")+" "+(d.client?.email||"")).toLowerCase();
      return txt.includes(q);
    });
  }

  // Section "suggéré" si on est en réponse et qu'on a l'email du client
  let suggestedHtml="";
  if(_pjContext==="reply"&&_pjClientEmail&&!q){
    const sug=docs.filter(d=>(d.client?.email||"").toLowerCase()===_pjClientEmail);
    if(sug.length>0){
      suggestedHtml=`<div class="pj-section-h acc">⭐ Suggéré pour ce client</div>`+
        sug.map((d,i)=>_pjItemHtml(d,S.dossiers.indexOf(d))).join("");
      // Retirer les suggérés du reste
      docs=docs.filter(d=>(d.client?.email||"").toLowerCase()!==_pjClientEmail);
    }
  }

  // Section "Tous mes documents"
  const allHtml=docs.length===0
    ?(q?`<div class="pj-empty">Aucun résultat pour "${esc(q)}"</div>`:`<div class="pj-empty">Aucun devis ou facture dans tes dossiers</div>`)
    :docs.map(d=>_pjItemHtml(d,S.dossiers.indexOf(d))).join("");

  const allHeader=docs.length>0?`<div class="pj-section-h">${q?"Résultats":"Tous mes documents"}</div>`:"";
  body.innerHTML=suggestedHtml+allHeader+allHtml;
};

window.pjPickDoc=async function(idx){
  const doc=S.dossiers[idx];if(!doc)return;
  showToast("⏳ Génération du PDF…");
  try{
    if(!window.ArtioPDF)throw new Error("pdf-generator non chargé");
    const b64=window.ArtioPDF.toBase64(doc);
    const att={filename:doc.docNumber+".pdf",contentType:"application/pdf",data:b64};
    if(_pjContext==="reply"){
      S.replyAttachments.push(att);
      closePjModal();
      renderInbox();
    }else{
      S.composer.attachments.push(att);
      closePjModal();
      renderCompose();
    }
    showToast("📎 "+doc.docNumber+" ajouté");
  }catch(e){showToast("❌ "+e.message);}
};

window.pjAttachLocal=function(input){
  const f=input.files?.[0];if(!f)return;
  if(f.size>10*1024*1024){showToast("❌ Fichier > 10 MB");return;}
  const r=new FileReader();
  r.onload=ev=>{
    const url=ev.target.result;
    const b64=url.includes(",")?url.split(",")[1]:url;
    const att={filename:f.name,contentType:f.type||"application/octet-stream",data:b64};
    if(_pjContext==="reply"){
      S.replyAttachments.push(att);
      closePjModal();
      renderInbox();
    }else{
      S.composer.attachments.push(att);
      closePjModal();
      renderCompose();
    }
    showToast("📎 "+f.name+" ajouté");
    input.value="";
  };
  r.readAsDataURL(f);
};

window.sendReply=async function(btn){
  const email=S.emails.find(m=>m.id===S.selectedEmailId);if(!email)return;
  const text=(document.getElementById("reply-textarea")?.value||S.replyText||"").trim();
  if(!text){showToast("⚠️ Message vide");return;}
  const ccVal=(document.getElementById("reply-cc-input")?.value||S.replyCc||"").trim();
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spinner"></span> Envoi…';}
  const subj=email.subject?.startsWith("Re:")?email.subject:"Re: "+(email.subject||"");
  const ok=await gmailSendEmail({to:email.from,cc:ccVal||null,subject:subj,body:text,threadId:email.threadId,inReplyTo:email.messageId,attachments:S.replyAttachments});
  if(ok){
    S.replyText="";S.replyAttachments=[];S.replyMode="ia";
    S.replyCc="";S.replyShowCc=false;
    // Invalider le cache du thread pour recharger la conversation
    delete S.threads[email.threadId];
    gmailFetchEmails();
  }else if(btn){btn.disabled=false;btn.innerHTML='Envoyer';}
};

${e.contexte_ia?`\nContexte sur l'activité :\n${e.contexte_ia}\n`:""}

window.composerCopy=async function(btn){
  const body=document.getElementById("cmp-body")?.value||S.composer.body;
  if(!body.trim()){showToast("⚠️ Aucun texte à copier");return;}
  try{
    await navigator.clipboard.writeText(body);
    showToast("✅ Texte copié dans le presse-papier");
    if(btn){
      const orig=btn.innerHTML;
      btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Copié !';
      setTimeout(()=>{if(btn)btn.innerHTML=orig;},1800);
    }
  }catch(e){
    // Fallback : textarea temporaire
    const ta=document.createElement("textarea");ta.value=body;
    ta.style.position="fixed";ta.style.left="-9999px";
    document.body.appendChild(ta);ta.select();
    try{document.execCommand("copy");showToast("✅ Texte copié");}
    catch(e2){showToast("❌ Impossible de copier — sélectionne le texte manuellement");}
    document.body.removeChild(ta);
  }
};

Instruction : ${instruction}

Email actuel :
${body}`,800);
    logTokens("email_reformulate",usage);

  }catch(e){

function renderEmailRead(){
  const el=document.getElementById("email-read");if(!el)return;
  if(!S.gmailEmail||S.emails.length===0||!S.selectedEmailId){
    el.innerHTML=`<div class="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11Z"/></svg>
      <div>${S.gmailEmail?"Sélectionne un email":"Aucune boîte connectée"}</div>
    </div>`;
    return;
  }
  const m=S.emails.find(e=>e.id===S.selectedEmailId);if(!m){el.innerHTML="";return;}

  // Récupérer le thread (cache ou fallback sur juste m)
  const thread=S.threads[m.threadId];
  const messages=thread||[m]; // si le thread n'est pas encore chargé, on affiche juste m

  const tags=[];
  if((m.labelIds||[]).includes("UNREAD"))tags.push(`<span class="tag tag-teal">Non lu</span>`);
  const myEmail=(S.gmailEmail||"").toLowerCase();

  // Rendu d'un message (bulle)
  function renderBubble(msg){
    const senderEm=senderEmail(msg.from).toLowerCase();
    const isSent=msg.isSent||senderEm===myEmail;
    const nm=senderName(msg.from);
    let body="";
    if(!msg.body){body=`<p style="font-style:italic;opacity:.6">(vide)</p>`;}
    else if(msg.bodyType==="html"){
      const src=msg.body.replace(/"/g,"&quot;");
      body=`<iframe class="email-iframe" srcdoc="${src}" sandbox="allow-same-origin" onload="try{this.style.height=Math.min(this.contentDocument.body.scrollHeight+22,600)+'px'}catch(e){}"></iframe>`;
    }else{
      body=esc(msg.body).split(/\n\n+/).map(p=>`<p>${p.replace(/\n/g,"<br/>")}</p>`).join("");
    }
    // Pièces jointes (téléchargeables)
    const atts=msg.attachments||[];
    const attsHtml=atts.length>0?`<div class="bubble-atts">${atts.map(a=>{
      const ic=_attIcon(a.mimeType);
      const sz=_attSizeFmt(a.size);
      return `<button class="bubble-att" onclick="downloadAttachment('${msg.id}','${esc(a.attachmentId)}','${esc(a.filename).replace(/'/g,"\\'")}','${esc(a.mimeType)}')" title="Télécharger ${esc(a.filename)}">
        <span class="bubble-att-icn">${ic}</span>
        <div class="bubble-att-info">
          <span class="bubble-att-nm">${esc(a.filename)}</span>
          ${sz?`<span class="bubble-att-meta">${sz}</span>`:""}
        </div>
        <svg class="bubble-att-dl" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      </button>`;
    }).join("")}</div>`:"";
    return `<div class="bubble ${isSent?'sent':'received'}">
      <div class="bubble-meta">
        <span class="bubble-from">${isSent?"Vous":esc(nm)}</span>
        <span class="bubble-time">${esc(formatDate(msg.date))}</span>
      </div>
      <div class="bubble-body">${body}</div>
      ${attsHtml}
    </div>`;
  }

  const threadHtml=messages.map(renderBubble).join("");
  const loadingHtml=S.threadLoading&&!thread?`<div class="bubble loading"><span class="spinner"></span> Chargement de la conversation…</div>`:"";

  const isMobile=window.innerWidth<=680;
  const backBtn=isMobile?`<button class="mobile-back-btn" onclick="closeMobileEmail()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    Retour
  </button>`:"";

  el.innerHTML=`
    ${backBtn}
    <div class="read-hdr">
      <div class="read-meta-row">
        ${tags.join("")}
        ${messages.length>1?`<span class="tag tag-teal">💬 ${messages.length} messages</span>`:""}
        <div class="read-acts">
          <button class="icon-btn" onclick="gmailModify('${m.id}','archive')" title="Archiver"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="5" rx="1"/><path d="M4 8v11a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8"/><path d="M10 12h4"/></svg></button>
          <button class="icon-btn" onclick="gmailModify('${m.id}','markRead')" title="Marquer lu"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></button>
          <div class="has-pos">
            <button class="icon-btn" onclick="toggleDeleteMenu(event)" title="Supprimer" style="color:var(--red)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></button>
            ${S.showDeleteMenu?`<div class="del-menu" onclick="event.stopPropagation()">
              <button onclick="gmailModify('${m.id}','archive')">📥 Archiver</button>
              <button class="red" onclick="gmailModify('${m.id}','trash')">🗑 Corbeille</button>
            </div>`:""}
          </div>
        </div>
      </div>
      <h1 class="read-subj">${esc(m.subject||"(sans objet)")}</h1>
    </div>
    <div class="read-body" id="read-body-${m.id}">
      <div class="thread">${threadHtml}${loadingHtml}</div>
    </div>
    <div class="dock" id="reply-dock"></div>`;
  renderReplyDock();
  // Auto-scroll en bas pour voir le dernier message
  setTimeout(()=>{
    const body=document.getElementById("read-body-"+m.id);
    if(body)body.scrollTop=body.scrollHeight;
  },80);
}

  // Cc bloc
  const ccBlock=S.replyShowCc?`
    <div class="dock-cc-row">
      <span class="dock-cc-label">Cc</span>
      <div class="ac-wrap">
        <input class="ac-input" id="reply-cc-input" value="${esc(S.replyCc)}" placeholder="Tapez un nom ou email…" oninput="onReplyCcInput(this.value)" autocomplete="off"/>
        <div class="ac-dropdown" id="cc-dropdown"></div>
      </div>
      <button class="dock-add-cc" onclick="toggleReplyCc()" title="Retirer le Cc">✕</button>
    </div>`:"";

  const addCcBtn=!S.replyShowCc?`<button class="dock-add-cc" onclick="toggleReplyCc()">+ Ajouter Cc</button>`:"";

  // Textarea : compacte sur mobile
  const textareaStyle=isMobile?"min-height:54px;max-height:90px":"min-height:110px";
  let textareaContent;
  if(S.replyGenerating){
    textareaContent=`<div style="padding:10px 14px;font-size:13px;color:var(--muted);display:flex;align-items:center;gap:8px"><span class="spinner"></span> L'IA rédige…</div>`;
  }else{
    textareaContent=`<textarea class="dock-textarea" id="reply-textarea" placeholder="Cliquez sur 'Générer' ou écrivez directement…" oninput="onReplyInput(this)" style="${textareaStyle}">${esc(S.replyText)}</textarea>`;
  }

  el.innerHTML=`
    ${ccBlock}
    <div class="dock-compose">
      ${textareaContent}
      <div class="dock-foot">
        <div class="dock-chip-wrap">${attachChips}</div>
        ${addCcBtn}
        <button class="btn-ghost" onclick="openPjModal('reply')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
          Joindre
        </button>
        <button class="btn-ghost" onclick="generateReplyIA()" ${S.replyGenerating?"disabled":""}>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-3-6.7L21 8"/><path d="M21 3v5h-5"/></svg>
          ${S.replyText?"Régénérer":"Générer"}
        </button>
        <button class="btn-send" onclick="sendReply(this)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          Envoyer
        </button>
      </div>
    </div>`;
}

/* ─── COMPOSER RENDU ─── */
function renderCompose(){
  const el=document.getElementById("compose");if(!el)return;
  const c=S.composer;
  const attachChips=c.attachments.map((a,i)=>
    `<span class="dock-chip">📎 ${esc(a.filename)} <button onclick="removeComposerAttachment(${i})" style="background:none;border:none;color:var(--teal);cursor:pointer;font-size:14px;line-height:1;padding:0 0 0 4px">×</button></span>`
  ).join("");

  const bodyTextarea=c.generating
    ?`<div style="padding:20px;font-size:13px;color:var(--muted);display:flex;align-items:center;gap:10px"><span class="spinner"></span> L'IA rédige votre email…</div>`
    :`<textarea class="cmp-textarea" id="cmp-body" placeholder="Cliquez sur 'Générer' ou écrivez directement…" oninput="onComposerField('body',this.value)">${esc(c.body)}</textarea>`;

  el.innerHTML=`
    <div class="cmp-topbar">
      <label>À</label>
      <div class="ac-wrap" style="max-width:280px">
        <input class="ac-input" id="cmp-to" value="${esc(c.to)}" placeholder="Email ou nom du client…"
          oninput="onComposerField('to',this.value)" autocomplete="off"/>
      </div>
      <div class="sep"></div>
      <label>Sujet</label>
      <input style="flex:1;min-width:180px;padding:6px 10px;border-radius:7px;border:1px solid var(--border);background:var(--bg);font-size:12.5px;color:var(--text);font-family:var(--fb)" id="cmp-subject" value="${esc(c.subject)}" placeholder="Objet du message…" oninput="onComposerField('subject',this.value)"/>
    </div>
    <div class="cmp-body">
      <div class="cmp-editor">
        <div style="margin-bottom:14px">
          <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px">Message reçu du client <span style="font-weight:400;text-transform:none;letter-spacing:0">(optionnel)</span></div>
          <textarea style="width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:9px 11px;font-size:13px;color:var(--text);font-family:var(--fb);min-height:60px;resize:vertical" placeholder="Colle ici le message du client si tu réponds à un mail externe…" oninput="onComposerField('message_recu',this.value)">${esc(c.message_recu)}</textarea>
        </div>
        <div style="margin-bottom:14px">
          <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px">Ce que tu veux dire</div>
          <textarea style="width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:9px 11px;font-size:13px;color:var(--text);font-family:var(--fb);min-height:60px;resize:vertical" placeholder="Ex: confirmer le RDV, proposer un créneau, annoncer le prix…" oninput="onComposerField('contexte',this.value)">${esc(c.contexte)}</textarea>
        </div>
        ${bodyTextarea}
      </div>

      <aside class="cmp-side">
        <div class="sc">
          <h4>✎ Reformuler</h4>
          <div class="sc-sug">
            <button onclick="composerReformulate('Rendre plus concis (réduire de 30 %)')">Plus concis (−30 %)</button>
            <button onclick="composerReformulate('Ajouter un remerciement chaleureux au début')">Ajouter un remerciement</button>
            <button onclick="composerReformulate('Adopter un ton plus formel')">Ton plus formel</button>
            <button onclick="composerReformulate('Adopter un ton plus chaleureux et humain')">Ton plus chaleureux</button>
          </div>
        </div>

        <div class="sc">
          <h4>📎 Pièces jointes</h4>
          <div class="sc-sug">
            ${c.attachments.map((a,i)=>`<div style="display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--teal-dim);border-radius:8px;font-size:12px;color:var(--teal);font-weight:600">📎 ${esc(a.filename)}<button onclick="removeComposerAttachment(${i})" style="margin-left:auto;background:none;border:none;color:var(--teal);cursor:pointer;font-size:16px;line-height:1">×</button></div>`).join("")}
            <button style="border-style:dashed;width:100%" onclick="openPjModal('compose')">+ Joindre un document</button>
          </div>
        </div>
      </aside>
    </div>

    <div class="cmp-foot">
      ${attachChips}
      <button class="btn-ghost" onclick="composerGenerate()" ${c.generating?"disabled":""}>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-3-6.7L21 8"/><path d="M21 3v5h-5"/></svg>
        ${c.body?"Régénérer":"Générer"}
      </button>
      <div class="sp"></div>
      <button class="btn-send" onclick="composerCopy(this)" ${!c.body?"disabled style=\"opacity:.5;cursor:not-allowed\"":""}>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copier le texte
      </button>
    </div>`;
}

function renderAll(){renderInbox();renderCompose();}

/* ─── TAB SWITCHING ─── */
window.setTab=function(t){
  // Onglet "Nouveau message" réservé aux Pro
  if(t==='cmp'){
    const isPro=window.PlanGuard?.isPro?.()??false;
    if(!isPro){
      const el=document.createElement("div");
      el.style.cssText="position:fixed;inset:0;z-index:9100;display:flex;align-items:center;justify-content:center;background:rgba(8,11,20,0.78);backdrop-filter:blur(8px);";
      el.innerHTML=`<div style="background:var(--surface,#0e1220);border:1px solid rgba(245,167,66,0.25);border-radius:22px;padding:32px 28px;max-width:380px;width:90%;text-align:center;font-family:'Plus Jakarta Sans',sans-serif;">
        <div style="font-size:36px;margin-bottom:12px;">✉️</div>
        <div style="font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;color:var(--text,#e2e5f1);margin-bottom:8px;">Fonctionnalité Pro</div>
        <div style="font-size:13px;color:var(--muted,#6b7494);line-height:1.65;margin-bottom:22px;">L'envoi d'emails via Gmail est réservé aux abonnés <strong style="color:#f5a742">Pro</strong>. Passe au Pro pour envoyer et recevoir des emails directement depuis Artio.</div>
        <a href="settings.html?tab=abonnement" style="display:block;padding:12px;background:#f5a742;border-radius:12px;color:#080b14;font-size:14px;font-weight:700;text-decoration:none;margin-bottom:10px;">⚡ Passer Pro</a>
        <button onclick="this.closest('[style*=fixed]').remove()" style="font-size:12px;color:var(--muted,#6b7494);cursor:pointer;background:none;border:none;">Fermer</button>
      </div>`;
      document.body.appendChild(el);
      el.addEventListener("click",e=>{if(e.target===el)el.remove();});
      return;
    }
  }
  S.tab=t;
  const inbox=document.getElementById('inbox');
  const compose=document.getElementById('compose');
  const ti=document.getElementById('t-inbox');
  const tc=document.getElementById('t-cmp');
  const crumb=document.getElementById('crumb-sub');
  if(t==='inbox'){
    inbox.classList.remove('off');compose.classList.remove('on');
    ti.classList.add('on');tc.classList.remove('on');
    if(crumb)crumb.textContent='Non lus · '+S.emails.length;
    if(S.gmailEmail){
      if(S.emails.length===0)gmailFetchEmails();
      startPolling();
    }
    renderInbox();
  }else{
    inbox.classList.add('off');compose.classList.add('on');
    tc.classList.add('on');ti.classList.remove('on');
    if(crumb)crumb.textContent='Nouveau message';
    stopPolling();
    renderCompose();
  }
};

/* ─── THEME ─── */
window.toggleTheme=function(){
  const cur=document.documentElement.getAttribute('data-theme')||'dark';
  const next=cur==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',next);
  const mo=document.getElementById('th-moon'),su=document.getElementById('th-sun');
  if(mo)mo.style.display=next==='dark'?'block':'none';
  if(su)su.style.display=next==='light'?'block':'none';
  try{localStorage.setItem('artio-theme',next);}catch(e){}
};
(function(){
  const t=(()=>{try{return localStorage.getItem('artio-theme');}catch(e){return null;}})()||'dark';
  document.documentElement.setAttribute('data-theme',t);
  const mo=document.getElementById('th-moon'),su=document.getElementById('th-sun');
  if(mo)mo.style.display=t==='dark'?'block':'none';
  if(su)su.style.display=t==='light'?'block':'none';
})();

async function handleLogout(){await sb.auth.signOut();location.href="login.html";}
window.handleLogout=handleLogout;
window.toggleSidebar=function(){document.querySelector(".sidebar").classList.toggle("open");document.querySelector(".sidebar-overlay").classList.toggle("open");};
window.closeSidebar=function(){document.querySelector(".sidebar").classList.remove("open");document.querySelector(".sidebar-overlay").classList.remove("open");};

/* ─── INIT ─── */
async function initAuth(){
  const{data:{session}}=await sb.auth.getSession();
  if(!session){location.href="login.html";return;}
  S.user=session.user;
  window.PlanGuard?.init?.(session);

  try{
    const{data:profil}=await sb.from("profils").select("nom,secteur,contexte_ia,google_email").eq("user_id",session.user.id).single();
    if(profil){
      S.entreprise={nom:profil.nom||"",secteur:profil.secteur||"",contexte_ia:profil.contexte_ia||""};
      S.gmailEmail=profil.google_email||null;
    }
  }catch(e){console.error("loadProfil:",e);}

  // Avatar
  const avEl=document.getElementById("user-avatar");
  if(avEl){
    avEl.textContent=initials(S.entreprise.nom||S.user.email||"A");
  }
  // Topbar Gmail
  const tg=document.getElementById("topbar-gmail");
  if(tg)tg.textContent=S.gmailEmail||"non connecté";
  const gs=document.getElementById("gmail-status");
  if(gs)gs.textContent=S.gmailEmail?"✓ "+S.gmailEmail:"Non connecté";

  // Auth state changes
  sb.auth.onAuthStateChange((event,sess)=>{if(!sess)location.href="login.html";});

  // Close menus on outside click
  document.addEventListener("click",function(){
    if(S.showDeleteMenu||S.showAttachPicker||S.showComposeAttachPicker){
      S.showDeleteMenu=false;S.showAttachPicker=false;S.showComposeAttachPicker=false;
      if(S.tab==="inbox")renderInbox();else renderCompose();
    }
  });

  // Démarrage — choisir l'onglet selon le plan
  // Pro : Messagerie par défaut (Gmail accessible)
  // Free/Solo : Composer par défaut (génération de texte uniquement)
  const isPro=window.PlanGuard?.isPro?.()??false;
  S.tab=isPro?"inbox":"cmp";
  renderAll();
  // Activer la bonne classe sur les boutons de la topbar
  const ti=document.getElementById('t-inbox'),tc=document.getElementById('t-cmp');
  const cb=document.getElementById('crumb-sub');
  if(S.tab==="cmp"){
    document.getElementById('inbox').classList.add('off');
    document.getElementById('compose').classList.add('on');
    if(ti)ti.classList.remove('on');if(tc)tc.classList.add('on');
    if(cb)cb.textContent='Nouveau message';
  }else{
    if(ti)ti.classList.add('on');if(tc)tc.classList.remove('on');
  }

  if(S.gmailEmail&&S.tab==="inbox"){
    gmailFetchEmails();
    startPolling();
  }

  // ── Redirection depuis clients.html ──
  // ?to=email&name=nom ouvre directement le compositeur (Pro uniquement)
  const urlParams = new URLSearchParams(location.search);
  const paramTo   = urlParams.get('to');
  const paramName = urlParams.get('name');
  if (paramTo) {
    S.composer.to = paramName ? `${paramName} <${paramTo}>` : paramTo;
    setTab('cmp'); // setTab gère lui-même le paywall Pro
  }

  // Précharger les dossiers ET les clients pour la modale PJ et l'autocomplete Cc
  loadDossiers();
  loadClients();
  if(window.ArtioTour)window.ArtioTour.autoStart();
}
initAuth();
</script>
