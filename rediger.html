/* ══════════════════════════════════════════════════════════
   IA / UTILS
   ══════════════════════════════════════════════════════════ */
async function callClaude(prompt,maxTokens=400,retries=5){
  if(window.PlanGuard&&window.PlanGuard.isFree()){_showReadonlyAlert("La génération par IA nécessite un abonnement actif.");throw new Error("plan_required");}
  const{data:{session}}=await sb.auth.getSession();
  if(!session){throw new Error("Session expirée.");}
  for(let attempt=1;attempt<=retries;attempt++){
    try{
      const res=await fetch(FUNCTIONS_URL+"/claude-proxy",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+session.access_token},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:maxTokens,messages:[{role:"user",content:prompt}]})});
      const d=await res.json();
      if(!res.ok){
        if((d.code==="plan_required")||res.status===403){_showReadonlyAlert("Abonnement requis pour utiliser l'IA.");throw new Error("plan_required");}
        if((res.status===529||res.status===503||res.status===429)&&attempt<retries){await new Promise(r=>setTimeout(r,1500*Math.pow(1.5,attempt)));continue;}
        throw new Error(d.error||d.message||"Erreur proxy IA");
      }
      return{text:d.content?.map(b=>b.text||"").join("")||"",usage:d.usage||null};
    }catch(e){
      if(attempt===retries){if(e.message==="plan_required")throw e;throw new Error("L'IA est momentanément surchargée. Réessayez.");}
      if(e.message==="plan_required")throw e;
      await new Promise(r=>setTimeout(r,1500*Math.pow(1.5,attempt)));
    }
  }
}
async function logTokens(feature,usage){try{if(!usage||!S.user?.id)return;const i=usage.input_tokens||0,o=usage.output_tokens||0;await sb.from("token_logs").insert({user_id:S.user.id,feature,input_tokens:i,output_tokens:o,total_tokens:i+o,cout_estime:(i*0.000003)+(o*0.000015)});}catch(e){console.debug("logTokens:",e.message);}}

function _showReadonlyAlert(msg){

  document.body.appendChild(el);el.addEventListener("click",e=>{if(e.target===el)el.remove();});
}

function showToast(msg,dur=4500){
  let t=document.getElementById("artio-toast");
  if(!t){t=document.createElement("div");t.id="artio-toast";t.style.cssText="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#0e1220;border:1px solid rgba(255,255,255,0.13);color:#e2e5f1;padding:12px 24px;border-radius:12px;font-size:13px;font-weight:500;z-index:9999;box-shadow:0 8px 32px rgba(0,0,0,.5);transition:opacity .4s;";document.body.appendChild(t);}
  t.textContent=msg;t.style.opacity="1";clearTimeout(t._to);t._to=setTimeout(()=>{t.style.opacity="0";},dur);
}

/* ══════════════════════════════════════════════════════════
   DICTÉE VOIX
   ══════════════════════════════════════════════════════════ */
let recognition=null,voiceBuffer="",voiceRunning=false,voiceCallback=null;
function startVoiceGeneric(onResult){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){alert("Dictée non supportée. Utilisez Chrome.");return;}
  voiceCallback=onResult;voiceBuffer="";voiceRunning=true;
  let networkErrors=0;
  function makeSession(){
    if(!voiceRunning)return;
    const r=new SR();r.lang="fr-FR";r.continuous=true;r.interimResults=false;let si=0;
    r.onresult=e=>{for(let i=si;i<e.results.length;i++){if(e.results[i].isFinal){voiceBuffer+=" "+e.results[i][0].transcript;si=i+1;}}if(voiceCallback)voiceCallback(voiceBuffer.trim());renderPage();};
    r.onerror=e=>{if(e.error==="no-speech"||e.error==="aborted")return;if(e.error==="network"){networkErrors++;r.onend=null;if(networkErrors>=3){voiceRunning=false;return;}if(voiceRunning)setTimeout(makeSession,1000);return;}voiceRunning=false;};
    r.onend=()=>{if(voiceRunning)setTimeout(makeSession,100);};
    recognition=r;try{r.start();}catch(e){if(voiceRunning)setTimeout(makeSession,300);}
  }
  makeSession();
}
window.stopVoice=async()=>{
  voiceRunning=false;
  if(recognition){recognition.onend=null;try{recognition.stop();}catch(e){}}
  await new Promise(r=>setTimeout(r,450));
  if(recognition)recognition.onresult=null;
  S.voiceContextField=null;renderPage();
};
window.startVoiceContexte=function(fieldId){
  if(S.voiceContextField===fieldId){S.voiceContextField=null;window.stopVoice();return;}
  const existingEl=document.querySelector(`textarea[data-fid="${fieldId}"]`);
  voiceBuffer=(existingEl?existingEl.value:"").trim();
  S.voiceContextField=fieldId;
  voiceCallback=async t=>{const el=document.querySelector(`textarea[data-fid="${fieldId}"]`);if(el){el.value=t;S.fields[fieldId]=t;}};
  startVoiceGeneric(voiceCallback);
};

/* ══════════════════════════════════════════════════════════
   GMAIL — HELPERS DE BASE
   ══════════════════════════════════════════════════════════ */
function decodeBase64Utf8(str){
  try{return decodeURIComponent(escape(atob(str.replace(/-/g,"+").replace(/_/g,"/"))));}
  catch(e){try{return atob(str.replace(/-/g,"+").replace(/_/g,"/"));}catch(e2){return "";}}
}

function cleanEmailSnippet(str){
  return(str||"").replace(/&#39;/g,"'").replace(/&quot;/g,'"').replace(/&amp;/g,"&").replace(/&lt;/g,"<").replace(/&gt;/g,">")
    .replace(/\\r\\n|\\r|\\n/g," ").replace(/\r\n|\r|\n/g," ")
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").slice(0,200);
}

function isGmailExpired(){return S.gmailTokenExpiry&&new Date()>new Date(S.gmailTokenExpiry);}

/* ── Parser multipart récursif ─────────────────────────────
   Descend dans tous les sous-parts pour trouver text/plain
   et text/html, même imbriqués (multipart/alternative dans
   multipart/mixed, etc.)
   ─────────────────────────────────────────────────────────*/
function extractEmailParts(payload){
  let plain=null,html=null;
  function walk(part){
    if(!part)return;
    const mime=(part.mimeType||"").toLowerCase();
    if(mime==="text/plain"&&part.body?.data&&!plain) plain=part.body.data;
    else if(mime==="text/html"&&part.body?.data&&!html) html=part.body.data;
    if(part.parts&&part.parts.length>0) part.parts.forEach(walk);
  }
  walk(payload);
  return{plain,html};
}

/* ══════════════════════════════════════════════════════════
   GMAIL — CHARGEMENT DES EMAILS
   ══════════════════════════════════════════════════════════ */
async function gmailFetchEmails(){
  if(!S.gmailEmail){alert("Connecte ton Gmail dans les paramètres.");return;}
  if(isGmailExpired()){S.gmailEmail=null;S.gmailAccessToken=null;S.gmailTokenExpiry=null;S.emails=[];showToast("⚠️ Session Gmail expirée — reconnecte-toi dans les paramètres");renderPage();return;}
  S.emailsLoading=true;S.emailsError="";renderPage();
  try{
    const listRes=await fetch("https://gmail.googleapis.com/gmail/v1/users/me/messages?q=is:unread&maxResults=15",{headers:{"Authorization":"Bearer "+S.gmailAccessToken}});
    if(listRes.status===401){S.gmailEmail=null;S.gmailAccessToken=null;S.emailsError="Session expirée. Reconnecte Gmail dans les paramètres.";S.emailsLoading=false;renderPage();return;}
    const listData=await listRes.json();
    const messages=listData.messages||[];

    // Chargement en parallèle (limité à 15 emails)
    const emails=await Promise.all(messages.map(async m=>{
      const r=await fetch("https://gmail.googleapis.com/gmail/v1/users/me/messages/"+m.id+"?format=full",{headers:{"Authorization":"Bearer "+S.gmailAccessToken}});
      const d=await r.json();
      const headers=d.payload?.headers||[];
      const get=name=>headers.find(h=>h.name===name)?.value||"";

      // ── Parser récursif ─────────────────────────────────
      const{plain,html}=extractEmailParts(d.payload||{});
      // Préférer plain text, fallback sur html (sera affiché en iframe)
      let body="";
      let bodyType="text"; // "text" ou "html"
      if(plain){
        body=decodeBase64Utf8(plain).slice(0,5000);
        bodyType="text";
      }else if(html){
        body=decodeBase64Utf8(html); // pas de slice, l'iframe gère
        bodyType="html";
      }else if(d.payload?.body?.data){
        body=decodeBase64Utf8(d.payload.body.data).slice(0,5000);
        bodyType="text";
      }

      return{
        id:m.id,
        threadId:d.threadId||m.id,
        messageId:get("Message-Id"),
        from:get("From"),
        subject:get("Subject"),
        date:get("Date"),
        body,
        bodyType,
        snippet:d.snippet,
        labelIds:d.labelIds||[],
      };
    }));

    S.emails=emails;
    window.__emailMeta={};
    emails.forEach(m=>{window.__emailMeta[m.id]={threadId:m.threadId,messageId:m.messageId};});
    S.emailsLoading=false;renderPage();
  }catch(e){S.emailsError="Erreur : "+e.message;S.emailsLoading=false;renderPage();}
}

/* ══════════════════════════════════════════════════════════
   POLLING AUTO-REFRESH (toutes les 5s)
   ══════════════════════════════════════════════════════════ */
let _pollingTimer=null;

// L'utilisateur est-il en train d'interagir avec un email ?
// Si oui, on ne casse pas son UI : on fetch quand même mais on ne re-render pas
function _userIsBusyWithEmails(){
  if(S.expandedEmail) return true;
  if(S.showDeleteMenu||S.showAttachPicker) return true;
  const modes=Object.values(S.replyMode||{});
  if(modes.some(m=>m==="ia"||m==="direct")) return true;
  // Brouillon non-vide en cours
  for(const k in (S.emailDirectDraft||{})){
    if((S.emailDirectDraft[k]?.text||"").trim().length>0) return true;
  }
  return false;
}

async function gmailAutoRefresh(){
  // On ne polle que sur l'onglet Messagerie, avec une session valide
  if(S.tab!=="emails_gmail") return;
  if(!S.gmailEmail||isGmailExpired()) return;
  if(S.emailsLoading) return;

  try{
    // Fetch silencieux de la liste seulement (pas les détails) pour comparer
    const listRes=await fetch("https://gmail.googleapis.com/gmail/v1/users/me/messages?q=is:unread&maxResults=15",{headers:{"Authorization":"Bearer "+S.gmailAccessToken}});
    if(listRes.status===401){
      // Session Gmail morte — on arrête le polling
      S.gmailEmail=null;S.gmailAccessToken=null;
      S.emailsError="Session expirée. Reconnecte Gmail dans les paramètres.";
      renderPage();return;
    }
    if(!listRes.ok) return;
    const listData=await listRes.json();
    const newIds=(listData.messages||[]).map(m=>m.id).sort().join(",");
    const currentIds=S.emails.map(m=>m.id).sort().join(",");

    // Rien n'a changé → on ne fait rien (économise 15 requêtes détails)
    if(newIds===currentIds) return;

    // Liste différente → l'utilisateur est-il occupé ?
    if(_userIsBusyWithEmails()){
      // On laisse l'UI tranquille — l'utilisateur verra les nouveaux emails
      // après avoir fermé son interaction (au prochain tick de polling)
      return;
    }

    // Sinon on fetch tous les détails (déclenche un re-render)
    await gmailFetchEmails();
  }catch(e){
    // Silencieux : on n'embête pas l'utilisateur avec les erreurs de polling
    console.debug("gmailAutoRefresh:",e?.message||e);
  }
}

function startEmailsPolling(){
  if(_pollingTimer) return;
  _pollingTimer=setInterval(gmailAutoRefresh,5000);
}
function stopEmailsPolling(){
  if(_pollingTimer){clearInterval(_pollingTimer);_pollingTimer=null;}
}
window.addEventListener("beforeunload",stopEmailsPolling);

/* ══════════════════════════════════════════════════════════
   GMAIL — ENVOI
   ══════════════════════════════════════════════════════════ */
async function gmailSendEmail({emailId,threadId,messageId,to,subject,body,attachments=[]}){
  if(!S.gmailEmail){showToast("⚠️ Google non connecté");return false;}
  showToast("📤 Envoi en cours…");
  const{data:{session}}=await sb.auth.getSession();
  if(!session){showToast("⚠️ Session expirée");return false;}
  const cleanSubj=(subject||"").replace(/[''‚‛]/g,"'").replace(/[""„‟]/g,'"').replace(/…/g,"...");
  const subj=cleanSubj.startsWith("Re:")?cleanSubj:"Re: "+cleanSubj;
  const payload={to,subject:subj,text:body,threadId:threadId||emailId,inReplyTo:messageId||null};
  if(attachments&&attachments.length>0) payload.attachments=attachments;
  const res=await fetch(FUNCTIONS_URL+"/gmail-send",{method:"POST",headers:{"Authorization":"Bearer "+session.access_token,"Content-Type":"application/json"},body:JSON.stringify(payload)});
  const data=await res.json();
  if(res.ok&&data.success){showToast("✅ Email envoyé !");return true;}
  showToast("❌ Erreur : "+(data.error||"inconnue"));return false;
}

// Charger les dossiers depuis Supabase (lazy, une seule fois)
async function gmailLoadDossiers(){
  if(S.dossiersLoaded)return;
  try{
    const{data:{session}}=await sb.auth.getSession();if(!session)return;
    const{data:rows}=await sb.from("dossiers").select("id,nom,client,documents").eq("user_id",session.user.id).order("updated_at",{ascending:false}).limit(50);
    if(!rows)return;
    // Extraire tous les docs (devis + factures) avec leurs métadonnées
    const docs=[];
    rows.forEach(d=>{
      let documents=[];
      try{documents=typeof d.documents==="string"?JSON.parse(d.documents):(d.documents||[]);}catch(e){}
      documents.forEach(doc=>{
        if(doc.docNumber){
          docs.push({...doc,dossierId:d.id,dossierNom:d.nom||d.client||"",});
        }
      });
    });
    // Trier : factures en premier, puis devis, puis par date décroissante
    docs.sort((a,b)=>{
      if(a.type!==b.type)return a.type==="facture"?-1:1;
      return (b.date||"").localeCompare(a.date||"");
    });
    S.dossiers=docs.slice(0,30);
    S.dossiersLoaded=true;
  }catch(e){console.error("gmailLoadDossiers:",e);}
}

window.handleLocalFile=function(emailId,input){
  const file=input.files?.[0];
  if(!file){return;}
  const MAX=10*1024*1024; // 10 MB
  if(file.size>MAX){showToast("❌ Fichier trop volumineux (max 10 MB)");return;}
  const reader=new FileReader();
  reader.onload=function(ev){
    const dataUrl=ev.target.result;
    const b64=dataUrl.includes(",")?dataUrl.split(",")[1]:dataUrl;
    const att={filename:file.name,contentType:file.type||"application/octet-stream",data:b64};
    S.emailAttachments[emailId]=[...(S.emailAttachments[emailId]||[]),att];
    S.showAttachPicker=null;
    renderPage();
    showToast("📎 "+file.name+" ajouté");
  };
  reader.readAsDataURL(file);
};

  return`<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;">${atts.map((a,i)=>`<div style="display:flex;align-items:center;gap:5px;padding:4px 10px;background:var(--teal-dim);border:1px solid rgba(62,207,207,.3);border-radius:20px;font-size:12px;color:var(--teal);max-width:220px;overflow:hidden;"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(a.filename)}</span><button onclick="removeAttachment('${emailId}',${i})" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:14px;line-height:1;flex-shrink:0;padding:0 0 0 2px;" title="Retirer">×</button></div>`).join("")}</div>`;
}

function renderAttachPicker(emailId){
  if(S.showAttachPicker!==emailId)return"";
  const docs=S.dossiers||[];
  const docsHtml=docs.length===0
    ?`<div style="font-size:12px;color:var(--muted);padding:8px;">Aucun devis/facture trouvé dans vos dossiers</div>`
    :docs.map((d,i)=>`<button onclick="attachArtioDoc('${emailId}',${i})" style="display:flex;align-items:center;gap:8px;width:100%;padding:8px 10px;background:none;border:none;cursor:pointer;border-radius:8px;text-align:left;font-family:var(--fb);transition:background .15s;" onmouseover="this.style.background='var(--surface-3)'" onmouseout="this.style.background='none'"><span style="font-size:16px;">${d.type==="facture"?"🧾":"📄"}</span><div style="flex:1;overflow:hidden;"><div style="font-size:12px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(d.docNumber)} — ${esc(d.dossierNom)}</div><div style="font-size:11px;color:var(--muted);">${esc(d.date||"")} · ${d.ttc?d.ttc.toFixed(2)+" €":""}</div></div></button>`).join("");
  return`<div onclick="event.stopPropagation()" style="background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:10px;">
    <div style="display:flex;align-items:center;gap:7px;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg> Joindre un document</div>
    <div style="margin-bottom:8px;">
      <div style="font-size:11px;color:var(--muted);margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;">Devis & factures Artio</div>
      <div style="max-height:200px;overflow-y:auto;">${docsHtml}</div>
    </div>
    <div style="height:1px;background:var(--border);margin:10px 0;"></div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;">Fichier de l'appareil</div>
    <label style="display:inline-flex;align-items:center;gap:7px;padding:7px 14px;background:var(--surface);border:1px solid var(--border);border-radius:9px;cursor:pointer;font-size:12px;font-weight:500;color:var(--text);transition:border-color .2s;" onmouseover="this.style.borderColor='var(--amber)'" onmouseout="this.style.borderColor='var(--border)'">
      📁 Parcourir…
      <input type="file" accept=".pdf,.png,.jpg,.jpeg,.doc,.docx,.xlsx" style="display:none;" onchange="handleLocalFile('${emailId}',this)"/>
    </label>
    <span style="font-size:11px;color:var(--muted);margin-left:8px;">PDF, images, Word, Excel (max 10 MB)</span>
  </div>`;
}

function renderReplyArea(email){
  const mode=(S.replyMode||{})[email.id];
  const atts=S.emailAttachments?.[email.id]||[];

  // ── Boutons d'action (toujours visibles) ─────────────────
  const actionBar=`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;">
    <button class="btn-small btn-blue" onclick="generateEmailReply('${email.id}','${esc(email.from).replace(/'/g,"\\'")}','${esc(email.subject||"").replace(/'/g,"\\'")}','${esc((email.bodyType==="text"?email.body:"")).replace(/'/g,"\\'")}')">🤖 Répondre avec l'IA</button>
    <button class="btn-small btn-gray" onclick="openDirectReply('${email.id}')">✏️ Répondre directement</button>
    <button class="btn-small btn-gray" onclick="openAttachPicker('${email.id}',event)" title="Joindre un document" style="display:inline-flex;align-items:center;gap:5px;"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>${atts.length>0?"Joindre ("+atts.length+")":"Joindre"}</button>
    <div style="position:relative;display:inline-block;">
      <button class="btn-small" onclick="toggleDeleteMenu('${email.id}',event)" style="background:var(--red-dim);color:var(--red);border-color:rgba(248,113,113,.3);display:inline-flex;align-items:center;justify-content:center;" title="Supprimer"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></button>
      ${S.showDeleteMenu===email.id?`<div onclick="event.stopPropagation()" style="position:absolute;right:0;bottom:calc(100% + 4px);background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:6px;z-index:200;min-width:160px;box-shadow:0 4px 24px rgba(0,0,0,.6);">
        <button onclick="gmailModify('${email.id}','archive')" style="display:flex;align-items:center;gap:8px;width:100%;padding:8px 10px;background:none;border:none;cursor:pointer;border-radius:7px;font-family:var(--fb);font-size:13px;color:var(--text);text-align:left;" onmouseover="this.style.background='var(--surface-3)'" onmouseout="this.style.background='none'">📥 Archiver</button>
        <button onclick="gmailModify('${email.id}','trash')" style="display:flex;align-items:center;gap:8px;width:100%;padding:8px 10px;background:none;border:none;cursor:pointer;border-radius:7px;font-family:var(--fb);font-size:13px;color:var(--red);text-align:left;" onmouseover="this.style.background='var(--red-dim)'" onmouseout="this.style.background='none'"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg> Corbeille</button>
      </div>`:""}
    </div>
  </div>`;

  // ── Picker pièces jointes ─────────────────────────────────
  const attachPickerHtml=renderAttachPicker(email.id);

  // ── Pièces jointes attachées ──────────────────────────────
  const attachmentsHtml=renderAttachments(email.id);

  // ── Zone de réponse ───────────────────────────────────────
  let replyHtml="";
  if(mode==="ia"){
    const draft=(S.emailReplyDraft||{})[email.id];
    if(draft?.loading){
      replyHtml=`<div style="padding:12px;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:8px;">⏳ Réponse en cours de génération par l'IA…</div>`;
    }else if(draft?.text){
      replyHtml=`<div style="margin-top:4px;">
        <textarea id="reply-ia-${email.id}" style="width:100%;min-height:220px;font-size:13px;line-height:1.6;padding:12px;background:var(--surface-2);border:1px solid var(--amber);border-radius:10px;color:var(--text);font-family:var(--fb);resize:vertical;" oninput="S.emailReplyDraft['${email.id}'].text=this.value">${esc(draft.text)}</textarea>
        <div style="display:flex;gap:8px;margin-top:8px;">
          <button class="btn-small btn-green" onclick="sendIAReply('${email.id}',this)">📤 Envoyer</button>
          <button class="btn-small btn-gray" onclick="cancelReply('${email.id}')">✕ Annuler</button>
        </div>
      </div>`;
    }
  }else if(mode==="direct"){
    const draft=(S.emailDirectDraft||{})[email.id];
    replyHtml=`<div style="margin-top:4px;">
      <textarea id="reply-direct-${email.id}" style="width:100%;min-height:140px;font-size:13px;line-height:1.6;padding:12px;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--fb);resize:vertical;" placeholder="Écrivez votre réponse…" oninput="S.emailDirectDraft['${email.id}']={text:this.value}">${esc((draft?.text)||"")}</textarea>
      <div style="display:flex;gap:8px;margin-top:8px;">
        <button class="btn-small btn-green" onclick="sendDirectReply('${email.id}',this)">📤 Envoyer</button>
        <button class="btn-small btn-gray" onclick="cancelReply('${email.id}')">✕ Annuler</button>
      </div>
    </div>`;
  }

  return actionBar+attachPickerHtml+attachmentsHtml+replyHtml;
}

function renderEmailBody(email){
  if(!email.body)return`<div style="font-style:italic;color:var(--muted);font-size:12px;">Corps vide.</div>`;
  if(email.bodyType==="html"){
    // Iframe sandboxée — pas de scripts, pas de navigation
    const srcdoc=email.body.replace(/"/g,"&quot;");
    return`<iframe srcdoc="${srcdoc}" sandbox="allow-same-origin" style="width:100%;min-height:180px;border:none;border-radius:8px;background:#fff;" onload="try{this.style.height=Math.min(this.contentDocument.body.scrollHeight+20,600)+'px';}catch(e){}"></iframe>`;
  }
  // Texte brut
  const text=email.body.replace(/\r\n|\r|\n/g,"\n").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br/>");
  return`<div style="font-size:12px;line-height:1.7;color:var(--text);">${text}</div>`;
}

function renderEmailCard(email){
  const isExpanded=S.expandedEmail===email.id;
  return`<div class="dossier-card" style="margin-bottom:12px;" onclick="${S.showDeleteMenu===email.id?"event.stopPropagation&&event.stopPropagation()":""}">
    <div style="padding:14px;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;">
        <p style="font-weight:500;font-size:14px;flex:1;padding-right:8px;">${esc(email.subject||"(sans objet)")}</p>
        <span style="font-size:11px;color:var(--muted);white-space:nowrap;">${esc((email.date||"").slice(0,16))}</span>
      </div>
      <p style="font-size:12px;color:var(--muted);margin-bottom:8px;">${esc(email.from)}</p>
      <p style="font-size:12px;color:var(--muted);font-style:italic;margin-bottom:12px;">${cleanEmailSnippet(email.snippet)}</p>

      ${isExpanded
        ?`<div style="background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:12px;max-height:600px;overflow-y:auto;">${renderEmailBody(email)}</div>
           <button class="btn-small btn-gray" style="margin-bottom:12px;" onclick="set({expandedEmail:null})">▲ Réduire</button>`
        :`<button class="btn-small btn-gray" style="margin-bottom:12px;" onclick="set({expandedEmail:'${email.id}'})">👁 Voir le message</button>`
      }

      ${renderReplyArea(email)}
    </div>
  </div>`;
}

function renderEmailsGmail(){
  if(!S.gmailEmail||isGmailExpired()){
    if(S.gmailEmail&&isGmailExpired()){
      return`<div class="card" style="text-align:center;padding:2rem;"><p style="font-size:28px;margin-bottom:12px;">⚠️</p><p style="font-weight:500;margin-bottom:8px;color:#f5a742;">Session Gmail expirée</p><p style="font-size:13px;color:var(--muted);margin-bottom:20px;">${esc(S.gmailEmail)} — reconnecte-toi pour continuer.</p><a href="settings.html?tab=gmail" style="display:block;padding:13px;background:var(--amber);color:#080b14;border-radius:12px;text-decoration:none;font-size:14px;font-weight:700;text-align:center;box-shadow:0 0 24px var(--amber-glow)">🔄 Reconnecter Gmail</a></div>`;
    }
    return`<div class="card" style="text-align:center;padding:2rem;"><p style="font-size:20px;margin-bottom:12px;">📧</p><p style="font-weight:500;margin-bottom:8px;">Connexion Gmail</p><p style="font-size:13px;color:var(--muted);margin-bottom:20px;">Lis et réponds à tes emails directement depuis Artio.</p><a href="settings.html?tab=gmail" style="display:block;padding:13px;background:var(--amber);color:#080b14;border-radius:12px;text-decoration:none;font-size:14px;font-weight:700;text-align:center;box-shadow:0 0 24px var(--amber-glow)">⚙ Connecter Gmail</a></div>`;
  }

  const emailCount=S.emails.length;
  return`<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <div>
        <p style="font-weight:500;">Emails non lus${emailCount>0?" ("+emailCount+")":""}</p>
        <p style="font-size:11px;color:var(--muted);margin-top:2px;">${esc(S.gmailEmail)}</p>
      </div>
      <div style="display:flex;gap:10px;align-items:center;">
        <span style="font-size:11px;color:var(--muted);display:inline-flex;align-items:center;gap:5px;">
          <span class="pulse-dot" style="width:6px;height:6px;border-radius:50%;background:var(--teal);display:inline-block;"></span>
          ${S.emailsLoading?"Actualisation…":"Auto"}
        </span>
        <button class="btn-small btn-gray" onclick="gmailDisconnect()">Déconnecter</button>
      </div>
    </div>
    ${S.emailsError?`<div style="color:var(--red);font-size:13px;margin-bottom:12px;">⚠️ ${esc(S.emailsError)}</div>`:""}
    ${emailCount===0&&!S.emailsLoading
      ?`<div style="text-align:center;padding:2rem;color:var(--muted);"><p style="font-size:20px;margin-bottom:8px;">📭</p><p>Aucun email non lu</p><p style="font-size:11px;margin-top:8px;">La boîte se mettra à jour automatiquement</p></div>`
      :S.emails.map(renderEmailCard).join("")
    }
  </div>`;
}

/* ══════════════════════════════════════════════════════════
   RENDU PRINCIPAL
   ══════════════════════════════════════════════════════════ */
function renderPage(){
  const root=document.getElementById("app-root");if(!root)return;
  // Fermer les menus contextuels au clic en dehors
  let html=`<div style="font-family:var(--fh);font-size:22px;font-weight:700;margin-bottom:20px;margin-top:8px;">✉️ Rédiger</div>`;
  html+=renderRedigerSeg();
  html+=(S.tab==="emails_gmail"?renderEmailsGmail():renderEmail());
  root.innerHTML=html;
}

/* ══════════════════════════════════════════════════════════
   INIT AUTH
   ══════════════════════════════════════════════════════════ */
async function initAuth(){
  const theme=localStorage.getItem("artio-theme")||"dark";
  document.documentElement.setAttribute("data-theme",theme);
  const{data:{session}}=await sb.auth.getSession();
  if(!session){location.href="login.html";return;}
  S.user=session.user;
  window.PlanGuard?.init?.(session);
  try{
    const{data:profil}=await sb.from("profils").select("nom,secteur,contexte_ia,google_email,google_access_token,google_token_expiry,gmail_email,gmail_access_token,gmail_token_expiry").eq("user_id",session.user.id).single();
    if(profil){
      S.entreprise={nom:profil.nom||"",secteur:profil.secteur||"",contexte_ia:profil.contexte_ia||""};
      S.gmailEmail=profil.google_email||profil.gmail_email||null;
      S.gmailAccessToken=profil.google_access_token||profil.gmail_access_token||null;
      const expiryRaw=profil.google_token_expiry||profil.gmail_token_expiry;
      S.gmailTokenExpiry=expiryRaw?new Date(expiryRaw):null;
    }
  }catch(e){console.error("loadProfil:",e);}
  // Pré-remplissage depuis dossiers.html (relance/rappel)
  const sp=new URLSearchParams(window.location.search);
  if(sp.get("mode")==="email"){
    const body=localStorage.getItem("artio-email-body")||"";
    const clientNom=localStorage.getItem("artio-email-client-nom")||"";
    const clientEmail=localStorage.getItem("artio-email-client-email")||"";
    if(body){window.__emailBody=body;S.generatedText=body;S.fields.client_nom=clientNom||S.fields.client_nom;S.fields.client_email=clientEmail||S.fields.client_email;localStorage.removeItem("artio-email-body");localStorage.removeItem("artio-email-client-nom");localStorage.removeItem("artio-email-client-email");history.replaceState(null,"",window.location.pathname);}
  }
  // Fermer les menus contextuels au clic en dehors — uniquement si la cible n'est pas interactive
  document.addEventListener("click",function(e){
    if(S.showDeleteMenu||S.showAttachPicker){
      S.showDeleteMenu=null;S.showAttachPicker=null;renderPage();
    }
  });
  sb.auth.onAuthStateChange((event,sess)=>{if(!sess)location.href="login.html";});
  renderPage();
  // Si on arrive directement sur l'onglet Messagerie, démarrer le polling
  if(S.tab==="emails_gmail"&&S.gmailEmail&&!isGmailExpired()){
    if(S.emails.length===0) gmailFetchEmails();
    startEmailsPolling();
  }
  if(window.ArtioTour) window.ArtioTour.autoStart();
}
initAuth();

function toggleSidebar(){document.querySelector(".sidebar").classList.toggle("open");document.querySelector(".sidebar-overlay").classList.toggle("open");}
function closeSidebar(){document.querySelector(".sidebar").classList.remove("open");document.querySelector(".sidebar-overlay").classList.remove("open");}
function toggleTheme(){const cur=document.documentElement.getAttribute("data-theme")||"dark";const next=cur==="dark"?"light":"dark";document.documentElement.setAttribute("data-theme",next);try{localStorage.setItem("artio-theme",next);}catch(e){}}
async function handleLogout(){await sb.auth.signOut();location.href="login.html";}
</script>
