async function doLogout(){
  await sb.auth.signOut();
  window.location.href="index.html";
}

(async()=>{
  const{data:{session}}=await sb.auth.getSession();
  if(session?.user){
    document.getElementById("user-email").textContent=session.user.email;

})();

    <div style="display:flex;gap:8px;">
      <button onclick="setTheme(false)" style="flex:1;padding:9px;border-radius:8px;border:0.5px solid ${!dk?"#534AB7":"#e0deda"};background:${!dk?"#534AB7":"transparent"};color:${!dk?"#fff":"inherit"};cursor:pointer;font-size:13px;">☀️ Clair</button>
      <button onclick="setTheme(true)" style="flex:1;padding:9px;border-radius:8px;border:0.5px solid ${dk?"#534AB7":"#e0deda"};background:${dk?"#534AB7":"transparent"};color:${dk?"#fff":"inherit"};cursor:pointer;font-size:13px;">🌙 Sombre</button>
    </div>
  `;
}

function setLang(code){localStorage.setItem("artio_langue",code);renderSettingsPanel();setTimeout(()=>window.location.reload(),300);}
function setTheme(dark){
  if(dark)document.body.classList.add("dark");
  else document.body.classList.remove("dark");
  localStorage.setItem("artio_dark",dark?"1":"0");
  renderSettingsPanel();
}

// Ouvrir le panel au clic ⚙
document.addEventListener("click",e=>{
  if(e.target.closest("#settings-btn")){openSettings();renderSettingsPanel();}
});

</script>

<div class="settings-overlay" id="sov" onclick="closeSettings()"></div>
<div class="settings-panel" id="sp"></div>

</body>
</html>
