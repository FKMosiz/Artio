<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Artio — Tableau de bord</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg:        #080b14;
  --surface:   #0e1220;
  --surface-2: #141829;
  --surface-3: #1a2035;
  --border:    rgba(255,255,255,0.07);
  --border-hi: rgba(255,255,255,0.13);
  --text:      #e2e5f1;
  --muted:     #6b7494;
  --amber:     #f5a742;
  --amber-dim: rgba(245,167,66,0.12);
  --amber-glow:rgba(245,167,66,0.26);
  --teal:      #3ecfcf;
  --teal-dim:  rgba(62,207,207,0.11);
  --green:     #4ade80;
  --green-dim: rgba(74,222,128,0.11);
  --purple:    #a78bfa;
  --purple-dim:rgba(167,139,250,0.11);
  --fh: 'Space Grotesk', sans-serif;
  --fb: 'Plus Jakarta Sans', sans-serif;
  --nav-h: 60px;
  --r: 14px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--fb); background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── NAV ── */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: var(--nav-h); padding: 0 20px;
  display: flex; align-items: center; gap: 16px;
  background: rgba(8,11,20,0.85); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}
.nav-logo { font-family: var(--fh); font-size: 18px; font-weight: 700; color: var(--amber); letter-spacing:-0.02em; text-decoration:none; flex-shrink:0; }
.nav-links { display: flex; gap: 3px; flex: 1; justify-content: center; overflow-x: auto; }
.nav-link { padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 500; color: var(--muted); text-decoration: none; white-space: nowrap; border: none; background: transparent; cursor: pointer; font-family: var(--fb); transition: color .2s, background .2s; }
.nav-link:hover { color: var(--text); background: var(--surface); }
.nav-link.active { color: var(--amber); background: var(--amber-dim); font-weight: 600; }
.btn-logout { padding: 6px 14px; border-radius: 8px; font-size: 12px; font-weight: 500; background: transparent; border: 1px solid var(--border); color: var(--muted); cursor: pointer; font-family: var(--fb); transition: all .2s; }
.btn-logout:hover { border-color: var(--border-hi); color: var(--text); }

/* ── PAGE ── */
.page { padding: calc(var(--nav-h) + 24px) 20px 48px; max-width: 960px; margin: 0 auto; }

/* ── TOOLBAR ── */
.toolbar { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 24px; }
.page-title { font-family: var(--fh); font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
.period-wrap { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.field-select {
  padding: 8px 12px; border-radius: 9px; font-size: 13px;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text); cursor: pointer; font-family: var(--fb); outline: none;
  transition: border-color .2s;
}
.field-select:focus { border-color: var(--amber); }
.field-select option { background: var(--surface-2); }
.date-input {
  padding: 8px 10px; border-radius: 9px; font-size: 12px;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text); font-family: var(--fb); outline: none;
  transition: border-color .2s; cursor: pointer;
}
.date-input:focus { border-color: var(--amber); }
.date-sep { font-size: 13px; color: var(--muted); }

/* ── KPI GRID ── */
.kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
.kpi-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); padding: 18px 20px; position: relative; overflow: hidden;
  transition: border-color .2s;
}
.kpi-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  border-radius: var(--r) var(--r) 0 0;
}
.kpi-amber::before { background: var(--amber); }
.kpi-teal::before  { background: var(--teal); }
.kpi-green::before { background: var(--green); }
.kpi-purple::before { background: var(--purple); }
.kpi-icon {
  width: 34px; height: 34px; border-radius: 9px;
  display: flex; align-items: center; justify-content: center; margin-bottom: 12px;
}
.kpi-label { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing:.05em; text-transform: uppercase; margin-bottom: 6px; }
.kpi-value { font-family: var(--fh); font-size: 22px; font-weight: 700; margin-bottom: 4px; }
.kpi-amber .kpi-value { color: var(--amber); }
.kpi-teal  .kpi-value { color: var(--teal); }
.kpi-green .kpi-value { color: var(--green); }
.kpi-purple .kpi-value { color: var(--purple); }
.kpi-sub { font-size: 11px; color: var(--muted); }

/* ── CHART ── */
.chart-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); padding: 22px 24px; margin-bottom: 14px;
}
.card-title { font-family: var(--fh); font-size: 14px; font-weight: 700; margin-bottom: 20px; }
.bar-chart { display: flex; align-items: flex-end; gap: 10px; height: 140px; }
.bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; height: 100%; }
.bar-track { flex: 1; width: 100%; background: var(--surface-2); border-radius: 6px 6px 0 0; position: relative; display: flex; align-items: flex-end; overflow: hidden; }
.bar-fill {
  width: 100%; border-radius: 6px 6px 0 0;
  background: linear-gradient(180deg, var(--amber) 0%, rgba(245,167,66,.5) 100%);
  transition: height .6s cubic-bezier(.4,0,.2,1);
  min-height: 3px;
}
.bar-fill.empty { background: var(--surface-3); }
.bar-label { font-size: 10px; font-weight: 600; color: var(--muted); letter-spacing:.04em; }
.bar-val { font-size: 9px; color: var(--muted); white-space: nowrap; }

/* ── TABLE ── */
.table-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); overflow: hidden; margin-bottom: 14px;
}
.table-head {
  display: grid; grid-template-columns: 1fr 90px 100px 100px;
  padding: 12px 20px; border-bottom: 1px solid var(--border);
  background: var(--surface-2);
}
.table-head span { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing:.05em; text-transform: uppercase; }
.table-head span:last-child, .table-head span:nth-child(3) { text-align: right; }
.table-row-item {
  display: grid; grid-template-columns: 1fr 90px 100px 100px;
  padding: 11px 20px; border-bottom: 1px solid var(--border);
  align-items: center; transition: background .15s;
}
.table-row-item:last-child { border-bottom: none; }
.table-row-item:hover { background: var(--surface-2); }
.table-row-item span { font-size: 13px; }
.table-row-item span:nth-child(3), .table-row-item span:last-child { text-align: right; }
.table-row-item .dos-name { font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.table-row-item .doc-date { color: var(--muted); font-size: 12px; }
.table-row-item .ttc { font-family: var(--fh); font-weight: 700; color: var(--amber); }
.table-row-item .ht { color: var(--muted); font-size: 12px; }
.empty-row { padding: 28px; text-align: center; color: var(--muted); font-size: 13px; }

/* ── DECL GRID ── */
.decl-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.decl-item {
  background: var(--surface-2); border: 1px solid var(--border);
  border-radius: 10px; padding: 14px 16px;
}
.decl-label { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing:.05em; text-transform: uppercase; margin-bottom: 6px; }
.decl-val { font-family: var(--fh); font-size: 18px; font-weight: 700; }

@media(max-width:700px) {
  .kpi-grid { grid-template-columns: 1fr 1fr; }
  .nav-links { display: none; }
  .table-head, .table-row-item { grid-template-columns: 1fr 80px 90px; }
  .table-head span:nth-child(4), .table-row-item span:nth-child(4) { display: none; }
  .page { padding: calc(var(--nav-h) + 16px) 12px 40px; }
}
@media(max-width:400px) {
  .kpi-grid { grid-template-columns: 1fr; }
  .decl-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<header class="topbar">
  <a class="nav-logo" href="home.html">Artio</a>
  <nav class="nav-links">
    <a class="nav-link" href="app.html">Application</a>
    <a class="nav-link active" href="dashboard.html">Tableau de bord</a>
    <a class="nav-link" href="calendar.html">Calendrier</a>
    <a class="nav-link" href="clients.html">Clients</a>
  </nav>
  <div style="display:flex;gap:8px;align-items:center">
    <button class="btn-logout" onclick="location.href='aide.html'">Aide</button>
    <button class="btn-logout" id="btn-logout">Déconnexion</button>
  </div>
</header>

<main class="page" id="main">
  <div style="display:flex;align-items:center;justify-content:center;height:200px;color:var(--muted)">Chargement…</div>
</main>

<script>
const SUPABASE_URL = "https://mwmexkoeqeyueqgdkkni.supabase.co";
const SUPABASE_KEY = "sb_publishable_dbf0DrGQr377jyftcE-rYw_SK5nzZJw";
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

let user = null, dossiers = [], filterType = "mois", filterFrom = "", filterTo = "";
const now_ = new Date();
filterFrom = new Date(now_.getFullYear()-1, 0, 1).toISOString().slice(0,10);
filterTo   = now_.toISOString().slice(0,10);

const MOIS      = ["Jan","Fév","Mar","Avr","Mai","Jun","Jul","Aoû","Sep","Oct","Nov","Déc"];
const MOIS_LONG = ["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];

function esc(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function fmt(n) { return Number(n||0).toLocaleString("fr-FR",{minimumFractionDigits:2,maximumFractionDigits:2}) + " €"; }

function parseDateFR(s) {
  if (!s) return new Date("");
  const p = s.split("/");
  if (p.length === 3) return new Date(p[2], p[1]-1, p[0]);
  return new Date(s);
}

function getAllDocs() {
  const docs = [];
  dossiers.forEach(dos => { (dos.documents||[]).forEach(d => docs.push({...d, _dosNom: dos.nom||dos.client||""})); });
  return docs;
}

function filterDocs(docs) {
  const now = new Date();
  if (filterType === "mois") return docs.filter(d => { const dt = parseDateFR(d.date); return dt.getMonth() === now.getMonth() && dt.getFullYear() === now.getFullYear(); });
  if (filterType === "annee") return docs.filter(d => { const dt = parseDateFR(d.date); return dt.getFullYear() === now.getFullYear(); });
  if (filterType === "custom" && filterFrom && filterTo) {
    const from = new Date(filterFrom), to = new Date(filterTo);
    return docs.filter(d => { const dt = parseDateFR(d.date); return dt >= from && dt <= to; });
  }
  return docs;
}

function calcKPIs() {
  const now = new Date();
  const all = getAllDocs();
  const filtered = filterDocs(all);
  const factures = filtered.filter(d => d.type === "facture");
  const devis    = filtered.filter(d => d.type === "devis");
  const caTotal  = factures.reduce((s,d) => s+(d.ttc||0), 0);
  const caHT     = factures.reduce((s,d) => s+(d.totalHT||0), 0);
  const tvaColl  = factures.reduce((s,d) => s+(d.tva||0), 0);
  const caMois   = filterType === "mois" ? caTotal : filterDocs(all.filter(d => d.type==="facture" && (() => { const dt = parseDateFR(d.date); return dt.getMonth()===now.getMonth()&&dt.getFullYear()===now.getFullYear(); })())).reduce((s,d) => s+(d.ttc||0), 0);
  const devisAtt = devis.filter(d => !d.accepte);
  const caAttente = devisAtt.reduce((s,d) => s+(d.ttc||0), 0);
  const txConv   = devis.length > 0 ? Math.round((devis.filter(d=>d.accepte).length / devis.length)*100) : 0;
  const caParMois = {};
  all.filter(d => d.type==="facture").forEach(d => { const dt=parseDateFR(d.date); const k=dt.getFullYear()+"-"+dt.getMonth(); caParMois[k]=(caParMois[k]||0)+(d.ttc||0); });
  const bars = [];
  for (let i=5; i>=0; i--) { const dt=new Date(now); dt.setMonth(dt.getMonth()-i); const k=dt.getFullYear()+"-"+dt.getMonth(); bars.push({label:MOIS[dt.getMonth()], val:caParMois[k]||0}); }
  return { caTotal, caHT, tvaColl, caMois, caAttente, txConv, nbFactures:factures.length, nbDevis:devis.length, nbAttente:devisAtt.length, bars, factures, devis };
}

window.onPeriodChange = function() {
  filterType = document.getElementById("period-type").value;
  const now = new Date();
  if (filterType === "mois") { filterFrom = new Date(now.getFullYear(),now.getMonth(),1).toISOString().slice(0,10); filterTo = now.toISOString().slice(0,10); }
  else if (filterType === "annee") { filterFrom = new Date(now.getFullYear(),0,1).toISOString().slice(0,10); filterTo = now.toISOString().slice(0,10); }
  render();
};

function render() {
  const kpi = calcKPIs();
  const now = new Date();
  const maxBar = Math.max(...kpi.bars.map(b => b.val), 1);

  const customInputs = filterType === "custom" ? `
    <input type="date" class="date-input" value="${filterFrom}" onchange="filterFrom=this.value;render()" max="${new Date().toISOString().slice(0,10)}"/>
    <span class="date-sep">→</span>
    <input type="date" class="date-input" value="${filterTo}" onchange="filterTo=this.value;render()" max="${new Date().toISOString().slice(0,10)}"/>
  ` : "";

  const bars = kpi.bars.map(b => {
    const pct = Math.round((b.val / maxBar) * 100);
    return `<div class="bar-col">
      <div class="bar-val">${b.val > 0 ? fmt(b.val).replace(" €","") + "€" : ""}</div>
      <div class="bar-track">
        <div class="bar-fill ${b.val===0?"empty":""}" style="height:${Math.max(pct,2)}%"></div>
      </div>
      <div class="bar-label">${b.label}</div>
    </div>`;
  }).join("");

  const facturesRows = kpi.factures.length === 0
    ? `<div class="empty-row">Aucune facture pour cette période</div>`
    : kpi.factures.map(d => `<div class="table-row-item">
        <span class="dos-name">${esc(d._dosNom||"—")}</span>
        <span class="doc-date">${d.date||"—"}</span>
        <span class="ttc">${fmt(d.ttc)}</span>
        <span class="ht">${fmt(d.totalHT)}</span>
      </div>`).join("");

  document.getElementById("main").innerHTML = `
    <div class="toolbar">
      <div class="page-title">Tableau de bord</div>
      <div class="period-wrap">
        <select class="field-select" id="period-type" onchange="onPeriodChange()">
          <option value="mois" ${filterType==="mois"?"selected":""}>Mois en cours</option>
          <option value="annee" ${filterType==="annee"?"selected":""}>Année en cours</option>
          <option value="custom" ${filterType==="custom"?"selected":""}>Personnalisé</option>
        </select>
        ${customInputs}
      </div>
    </div>

    <div class="kpi-grid">
      <div class="kpi-card kpi-amber">
        <div class="kpi-icon" style="background:var(--amber-dim)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--amber)" stroke-width="2.2" stroke-linecap="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        </div>
        <div class="kpi-label">CA facturé</div>
        <div class="kpi-value">${fmt(kpi.caTotal)}</div>
        <div class="kpi-sub">${kpi.nbFactures} facture${kpi.nbFactures>1?"s":""}</div>
      </div>
      <div class="kpi-card kpi-teal">
        <div class="kpi-icon" style="background:var(--teal-dim)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--teal)" stroke-width="2.2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        </div>
        <div class="kpi-label">CA ce mois</div>
        <div class="kpi-value">${fmt(kpi.caMois)}</div>
        <div class="kpi-sub">${MOIS_LONG[now.getMonth()]} ${now.getFullYear()}</div>
      </div>
      <div class="kpi-card kpi-green">
        <div class="kpi-icon" style="background:var(--green-dim)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2.2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </div>
        <div class="kpi-label">Devis en attente</div>
        <div class="kpi-value">${fmt(kpi.caAttente)}</div>
        <div class="kpi-sub">${kpi.nbAttente} devis</div>
      </div>
      <div class="kpi-card kpi-purple">
        <div class="kpi-icon" style="background:var(--purple-dim)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--purple)" stroke-width="2.2" stroke-linecap="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        </div>
        <div class="kpi-label">Taux conversion</div>
        <div class="kpi-value">${kpi.txConv}%</div>
        <div class="kpi-sub">devis → facture</div>
      </div>
    </div>

    <div class="chart-card">
      <div class="card-title">CA mensuel — 6 derniers mois</div>
      <div class="bar-chart">${bars}</div>
    </div>

    <div class="table-card">
      <div class="card-title" style="padding:18px 20px 0;margin-bottom:0">Factures</div>
      <div class="table-head">
        <span>Dossier</span><span>Date</span><span>TTC</span><span>HT</span>
      </div>
      ${facturesRows}
    </div>

    <div class="chart-card">
      <div class="card-title">Récap déclaration</div>
      <div class="decl-grid">
        <div class="decl-item"><div class="decl-label">CA HT total</div><div class="decl-val" style="color:var(--amber)">${fmt(kpi.caHT)}</div></div>
        <div class="decl-item"><div class="decl-label">TVA collectée</div><div class="decl-val" style="color:var(--teal)">${fmt(kpi.tvaColl)}</div></div>
        <div class="decl-item"><div class="decl-label">CA TTC total</div><div class="decl-val">${fmt(kpi.caTotal)}</div></div>
        <div class="decl-item"><div class="decl-label">Nb factures</div><div class="decl-val">${kpi.nbFactures}</div></div>
      </div>
    </div>`;
}

document.getElementById("btn-logout").addEventListener("click", async () => {
  await sb.auth.signOut();
  window.location.href = "index.html";
});

(async () => {
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = "index.html"; return; }
    user = session.user;
    const { data, error } = await sb.from("dossiers").select("*").eq("user_id", user.id);
    if (error) console.error("Erreur dossiers:", error);
    dossiers = (data||[]).map(d => { let docs = []; try { docs = typeof d.documents === "string" ? JSON.parse(d.documents) : (d.documents||[]); } catch(e) {} return {...d, documents: docs}; });
    render();
  } catch(e) {
    document.getElementById("main").innerHTML = `<p style="padding:2rem;color:#f87171;">Erreur: ${e.message}</p>`;
  }
})();
</script>
<script src="chat-widget.js"></script>
</body>
</html>
