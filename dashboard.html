<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Artio — Tableau de bord</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a18;min-height:100vh}
.top-nav{background:#fff;border-bottom:0.5px solid #e0deda;padding:0 1rem;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:100}
.nav-links{display:flex;gap:2px;overflow-x:auto}
.nav-link{padding:5px 10px;border-radius:7px;font-size:12px;font-weight:500;color:#666;text-decoration:none;border:none;background:transparent;white-space:nowrap;cursor:pointer}
.nav-link.active{background:#E6F1FB;color:#185FA5}
.page-content{max-width:720px;margin:0 auto;padding:1.25rem 1rem}
.card{background:#fff;border:0.5px solid #e0deda;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1rem}
.kpi-card{background:#fff;border:0.5px solid #e0deda;border-radius:12px;padding:1rem;text-align:center}
.kpi-value{font-size:22px;font-weight:700;margin:6px 0 2px}
.kpi-label{font-size:11px;color:#888;font-weight:500}
.kpi-sub{font-size:11px;color:#aaa;margin-top:2px}
.kpi-blue{border-color:#378ADD}.kpi-blue .kpi-value{color:#185FA5}
.kpi-green{border-color:#A5D6A7}.kpi-green .kpi-value{color:#2E7D32}
.kpi-orange{border-color:#FFB74D}.kpi-orange .kpi-value{color:#E65100}
.kpi-purple{border-color:#7F77DD}.kpi-purple .kpi-value{color:#534AB7}
.section-title{font-size:14px;font-weight:600;margin-bottom:12px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.bar-label{font-size:12px;color:#555;width:36px;flex-shrink:0;text-align:right}
.bar-track{flex:1;background:#f0eeea;border-radius:4px;height:22px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:8px;font-size:11px;color:#fff;font-weight:500;min-width:2px}
.bar-amount{font-size:11px;color:#555;width:90px;flex-shrink:0;text-align:right}
.table-header{display:grid;grid-template-columns:1fr 80px 90px 90px;gap:8px;font-size:11px;color:#888;font-weight:600;padding-bottom:6px;border-bottom:0.5px solid #e0deda;margin-bottom:4px}
.table-row{display:grid;grid-template-columns:1fr 80px 90px 90px;gap:8px;align-items:center;padding:7px 0;border-bottom:0.5px solid #f5f5f3;font-size:12px}
.decl-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.decl-item{background:#E6F1FB;border-radius:8px;padding:10px}
.decl-item-label{font-size:11px;color:#555;margin-bottom:4px}
.decl-item-val{font-size:15px;font-weight:700;color:#185FA5}
select{padding:6px 10px;border-radius:8px;border:0.5px solid #d0d0cc;background:#fff;font-size:13px;color:#333;cursor:pointer}
.btn-small{padding:5px 12px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;border:0.5px solid #d0d0cc;background:#f5f5f3;color:#333}
.artio-logo{transition:filter 0.2s}
body.dark{background:#12101a!important;color:#e8e4f0!important}
body.dark .card,body.dark .kpi-card{background:#1e1a2e!important;border-color:#3d3560!important}
body.dark .top-nav{background:#1e1a2e!important;border-color:#3d3560!important}
body.dark .nav-link{color:#a090c0!important}
body.dark .nav-link.active{background:#2e2858!important;color:#AFA9EC!important}
body.dark .bar-track{background:#2a2440!important}
body.dark .bar-label,.bar-amount{color:#a090c0}
body.dark .table-row{border-color:#2a2440!important}
body.dark .table-header{border-color:#3d3560!important;color:#7F77DD!important}
body.dark .kpi-label,.kpi-sub{color:#7F77DD}
body.dark .decl-item{background:#2a2440!important}
body.dark .decl-item-label{color:#a090c0!important}
body.dark .decl-item-val{color:#AFA9EC!important}
body.dark select{background:#2a2440!important;border-color:#4a3f70!important;color:#e8e4f0!important}
body.dark .btn-small{background:#1e1a2e!important;border-color:#3d3560!important;color:#e8e4f0!important}
body.dark .artio-logo{filter:brightness(0) invert(1) drop-shadow(0 0 3px rgba(255,255,255,0.6))}
</style>
</head>
<body>
<div id="root">Chargement...</div>
<script>
const SUPABASE_URL="https://mwmexkoeqeyueqgdkkni.supabase.co";
const SUPABASE_KEY="sb_publishable_dbf0DrGQr377jyftcE-rYw_SK5nzZJw";
const{createClient}=supabase;
const sb=createClient(SUPABASE_URL,SUPABASE_KEY);
if(localStorage.getItem("artio_dark")==="1")document.body.classList.add("dark");

let user=null,dossiers=[],filterPeriode="all";
const MOIS=["Jan","Fev","Mar","Avr","Mai","Jun","Jul","Aou","Sep","Oct","Nov","Dec"];
const MOIS_LONG=["Janvier","Fevrier","Mars","Avril","Mai","Juin","Juillet","Aout","Septembre","Octobre","Novembre","Decembre"];

function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function fmt(n){return Number(n||0).toLocaleString("fr-FR",{minimumFractionDigits:2,maximumFractionDigits:2})+" \u20ac"}

function getAllDocs(){
  const docs=[];
  dossiers.forEach(dos=>{(dos.documents||[]).forEach(d=>docs.push({...d,_dosNom:dos.nom||dos.client||""}));});
  return docs;
}

function filterDocs(docs){
  if(filterPeriode==="all")return docs;
  const[y,m]=filterPeriode.split("-").map(Number);
  return docs.filter(d=>{const dt=new Date(d.date||"");return dt.getFullYear()===y&&dt.getMonth()===m;});
}

function calcKPIs(){
  const now=new Date();
  const all=getAllDocs();
  const filtered=filterDocs(all);
  const factures=filtered.filter(d=>d.type==="facture");
  const devis=filtered.filter(d=>d.type==="devis");
  const caTotal=factures.reduce((s,d)=>s+(d.ttc||0),0);
  const caHT=factures.reduce((s,d)=>s+(d.totalHT||0),0);
  const tvaColl=factures.reduce((s,d)=>s+(d.tva||0),0);
  const caMois=filterPeriode==="all"?all.filter(d=>d.type==="facture"&&(()=>{const dt=new Date(d.date||"");return dt.getMonth()===now.getMonth()&&dt.getFullYear()===now.getFullYear();})()).reduce((s,d)=>s+(d.ttc||0),0):caTotal;
  const devisAtt=devis.filter(d=>!d.accepte);
  const caAttente=devisAtt.reduce((s,d)=>s+(d.ttc||0),0);
  const txConv=devis.length>0?Math.round((devis.filter(d=>d.accepte).length/devis.length)*100):0;
  const caParMois={};
  all.filter(d=>d.type==="facture").forEach(d=>{const dt=new Date(d.date||"");const k=dt.getFullYear()+"-"+dt.getMonth();caParMois[k]=(caParMois[k]||0)+(d.ttc||0);});
  const bars=[];
  for(let i=5;i>=0;i--){const dt=new Date(now);dt.setMonth(dt.getMonth()-i);const k=dt.getFullYear()+"-"+dt.getMonth();bars.push({label:MOIS[dt.getMonth()],val:caParMois[k]||0});}
  return{caTotal,caHT,tvaColl,caMois,caAttente,txConv,nbFactures:factures.length,nbDevis:devis.length,nbAttente:devisAtt.length,bars,factures,devis};
}

function getMoisDispo(){
  const now=new Date(),list=[];
  for(let i=11;i>=0;i--){const dt=new Date(now);dt.setMonth(dt.getMonth()-i);list.push({key:dt.getFullYear()+"-"+dt.getMonth(),label:MOIS_LONG[dt.getMonth()]+" "+dt.getFullYear()});}
  return list;
}

function render(){
  const kpi=calcKPIs();
  const moisDispo=getMoisDispo();
  const maxBar=Math.max(...kpi.bars.map(b=>b.val),1);
  const now=new Date();
  document.getElementById("root").innerHTML=`
  <nav class="top-nav">
    <div class="nav-links">
      <a class="nav-link" href="app.html">\u{1F4CB} Application</a>
      <a class="nav-link active">\u{1F4CA} Tableau de bord</a>
      <a class="nav-link" href="calendar.html">\u{1F4C5} Calendrier</a>
    </div>
    <button class="btn-small" onclick="sb.auth.signOut().then(()=>location.href='index.html')">D\xe9connexion</button>
  </nav>
  <div class="page-content">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px;">
      <h1 style="font-size:20px;font-weight:700;">\u{1F4CA} Tableau de bord</h1>
      <select onchange="filterPeriode=this.value;render()">
        <option value="all" ${filterPeriode==="all"?"selected":""}>Toute la p\xe9riode</option>
        ${moisDispo.map(m=>`<option value="${m.key}" ${filterPeriode===m.key?"selected":""}>${m.label}</option>`).join("")}
      </select>
    </div>
    <div class="kpi-grid">
      <div class="kpi-card kpi-blue"><div class="kpi-label">\u{1F4B6} CA factur\xe9</div><div class="kpi-value">${fmt(kpi.caTotal)}</div><div class="kpi-sub">${kpi.nbFactures} facture(s)</div></div>
      <div class="kpi-card kpi-green"><div class="kpi-label">\u{1F4C5} CA ce mois</div><div class="kpi-value">${fmt(kpi.caMois)}</div><div class="kpi-sub">${MOIS_LONG[now.getMonth()]} ${now.getFullYear()}</div></div>
      <div class="kpi-card kpi-orange"><div class="kpi-label">\u23f3 Devis en attente</div><div class="kpi-value">${fmt(kpi.caAttente)}</div><div class="kpi-sub">${kpi.nbAttente} devis</div></div>
      <div class="kpi-card kpi-purple"><div class="kpi-label">\u2705 Taux conversion</div><div class="kpi-value">${kpi.txConv}%</div><div class="kpi-sub">devis \u2192 facture</div></div>
    </div>
    <div class="card">
      <div class="section-title">\u{1F4C8} CA mensuel \u2014 6 derniers mois</div>
      ${kpi.bars.map(b=>{const pct=Math.round((b.val/maxBar)*100);return`<div class="bar-row"><div class="bar-label">${b.label}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:#378ADD;"></div></div><div class="bar-amount">${b.val>0?fmt(b.val):"\u2014"}</div></div>`;}).join("")}
    </div>
    <div class="card">
      <div class="section-title">\u{1F4B6} Factures</div>
      ${kpi.factures.length===0?`<p style="color:#888;font-size:13px;text-align:center;padding:1rem;">Aucune facture pour cette p\xe9riode</p>`:`
      <div class="table-header"><span>Dossier</span><span>Date</span><span style="text-align:right;">TTC</span><span style="text-align:right;">HT</span></div>
      ${kpi.factures.map(d=>`<div class="table-row"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(d._dosNom||"\u2014")}</span><span style="color:#888;">${d.date||"\u2014"}</span><span style="font-weight:600;text-align:right;">${fmt(d.ttc)}</span><span style="color:#888;text-align:right;">${fmt(d.totalHT)}</span></div>`).join("")}`}
    </div>
    <div class="card">
      <div class="section-title">\u{1F4CB} R\xe9cap d\xe9claration</div>
      <div class="decl-grid">
        <div class="decl-item"><div class="decl-item-label">CA HT total</div><div class="decl-item-val">${fmt(kpi.caHT)}</div></div>
        <div class="decl-item"><div class="decl-item-label">TVA collect\xe9e</div><div class="decl-item-val">${fmt(kpi.tvaColl)}</div></div>
        <div class="decl-item"><div class="decl-item-label">CA TTC total</div><div class="decl-item-val">${fmt(kpi.caTotal)}</div></div>
        <div class="decl-item"><div class="decl-item-label">Nb factures</div><div class="decl-item-val">${kpi.nbFactures}</div></div>
      </div>
    </div>
  </div>`;
}

(async()=>{
  const{data:{session}}=await sb.auth.getSession();
  if(!session){window.location.href="index.html";return}
  user=session.user;
  const{data}=await sb.from("dossiers").select("*").eq("user_id",user.id);
  dossiers=(data||[]).map(d=>{let docs=[];try{docs=typeof d.documents==="string"?JSON.parse(d.documents):(d.documents||[])}catch(e){}return{...d,documents:docs};});
  render();
})();
</script>
</body>
</html>
