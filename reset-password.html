<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Artio — Nouveau mot de passe</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{--bg:#080b14;--surface:#0e1220;--surface-2:#141829;--border:rgba(255,255,255,0.07);--text:#e2e5f1;--muted:#6b7494;--amber:#f5a742;--amber-dim:rgba(245,167,66,0.12);--amber-glow:rgba(245,167,66,0.28);--red:#f87171;--green:#4ade80;--fh:'Space Grotesk',sans-serif;--fb:'Plus Jakarta Sans',sans-serif}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--fb);background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:36px 32px;width:100%;max-width:420px;}
    .logo{font-family:var(--fh);font-size:22px;font-weight:700;color:var(--amber);margin-bottom:8px;letter-spacing:-0.02em;}
    h1{font-family:var(--fh);font-size:18px;font-weight:700;margin-bottom:6px;}
    .sub{font-size:13px;color:var(--muted);margin-bottom:28px;line-height:1.6;}
    .field{margin-bottom:16px;}
    label{display:block;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;margin-bottom:7px;}
    input{width:100%;padding:11px 13px;font-size:14px;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--fb);outline:none;transition:border-color .2s,box-shadow .2s;}
    input:focus{border-color:var(--amber);box-shadow:0 0 0 3px var(--amber-dim);}
    .rules{font-size:11px;color:var(--muted);margin-bottom:20px;line-height:1.8;}
    .btn{width:100%;padding:13px;border-radius:12px;border:none;background:var(--amber);color:#080b14;font-size:15px;font-weight:700;font-family:var(--fh);cursor:pointer;box-shadow:0 0 24px var(--amber-glow);transition:transform .15s,opacity .2s;}
    .btn:hover:not(:disabled){transform:translateY(-1px);}
    .btn:disabled{opacity:.5;cursor:not-allowed;}
    .msg{font-size:13px;margin-top:14px;text-align:center;line-height:1.5;}
    .msg.ok{color:var(--green);}
    .msg.err{color:var(--red);}
    .back{display:block;text-align:center;margin-top:16px;font-size:13px;color:var(--muted);text-decoration:none;transition:color .2s;}
    .back:hover{color:var(--text);}
  </style>
</head>
<body>
<div class="card">
  <div class="logo">Artio</div>
  <h1>Nouveau mot de passe</h1>
  <p class="sub">Choisis un nouveau mot de passe sécurisé pour ton compte.</p>

  <div class="field">
    <label>Nouveau mot de passe</label>
    <input id="pass" type="password" placeholder="••••••••" autocomplete="new-password"/>
  </div>
  <div class="field">
    <label>Confirmer le mot de passe</label>
    <input id="confirm" type="password" placeholder="••••••••" autocomplete="new-password"/>
  </div>

  <div class="rules">
    8 caractères minimum · 1 majuscule · 1 minuscule · 1 chiffre · 1 caractère spécial
  </div>

  <button class="btn" id="btn" onclick="savePassword()">Enregistrer le mot de passe</button>
  <div class="msg" id="msg"></div>
  <a class="back" href="settings.html">← Retour aux paramètres</a>
</div>

<script>
const SB_URL = "https://mwmexkoeqeyueqgdkkni.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im13bWV4a29lcWV5dWVxZ2Rra25pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MDEzMzcsImV4cCI6MjA5MDk3NzMzN30.380jxCN_CpWqmnwraob5crwUeBpTQxrXsTe2YDF-Rk8";
const { createClient } = supabase;
const sb = createClient(SB_URL, SB_KEY);

// Supabase gère automatiquement le token de recovery dans l'URL au chargement
// onAuthStateChange reçoit PASSWORD_RECOVERY quand le lien est valide
sb.auth.onAuthStateChange(async (event) => {
  if (event === "PASSWORD_RECOVERY") {
    // Session établie — l'utilisateur peut changer son mot de passe
    document.getElementById("btn").disabled = false;
  }
});

async function savePassword() {
  const pass    = document.getElementById("pass").value;
  const confirm = document.getElementById("confirm").value;
  const msg     = document.getElementById("msg");
  const btn     = document.getElementById("btn");

  const rules = [
    [/.{8,}/,         "⚠️ 8 caractères minimum."],
    [/[A-Z]/,         "⚠️ Au moins une majuscule."],
    [/[a-z]/,         "⚠️ Au moins une minuscule."],
    [/[0-9]/,         "⚠️ Au moins un chiffre."],
    [/[^A-Za-z0-9]/, "⚠️ Au moins un caractère spécial (!@#$…)."],
  ];

  for (const [regex, errMsg] of rules) {
    if (!regex.test(pass)) {
      msg.textContent = errMsg; msg.className = "msg err"; return;
    }
  }
  if (pass !== confirm) {
    msg.textContent = "⚠️ Les mots de passe ne correspondent pas.";
    msg.className = "msg err"; return;
  }

  btn.disabled = true; btn.textContent = "Enregistrement…";
  const { error } = await sb.auth.updateUser({ password: pass });

  if (!error) {
    msg.textContent = "✅ Mot de passe mis à jour ! Redirection…";
    msg.className = "msg ok";
    setTimeout(() => window.location.href = "settings.html", 2000);
  } else {
    msg.textContent = "❌ " + error.message;
    msg.className = "msg err";
    btn.disabled = false; btn.textContent = "Enregistrer le mot de passe";
  }
}
</script>
</body>
</html>
