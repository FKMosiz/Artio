<script>
const SUPABASE_URL="https://mwmexkoeqeyueqgdkkni.supabase.co";
const SUPABASE_KEY="sb_publishable_dbf0DrGQr377jyftcE-rYw_SK5nzZJw";
const FUNCTIONS_URL=SUPABASE_URL+"/functions/v1";
const{createClient}=supabase;
const sb=window.sb=createClient(SUPABASE_URL,SUPABASE_KEY);
const DOC_STORE={};
function storeDoc(doc){const key=doc.docNumber;DOC_STORE[key]=doc;return key}
function getDoc(key){return DOC_STORE[key]}
function getStatuts(){return{devis_envoye:{label:"Devis envoyé",bg:"rgba(251,146,60,.13)",color:"#fb923c"},devis_accepte:{label:"Devis accepté",bg:"rgba(96,165,250,.13)",color:"#60a5fa"},facture:{label:"Facturé",bg:"rgba(62,207,207,.13)",color:"#3ecfcf"},termine:{label:"Terminé",bg:"rgba(107,116,148,.15)",color:"#6b7494"}};}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function todayFR(){return new Date().toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit",year:"numeric"})}
function isoToFR(iso){if(!iso)return todayFR();const[y,m,d]=iso.split("-");return d+"/"+m+"/"+y;}
function uid(){return"dos_"+Date.now()+Math.random().toString(36).slice(2,6)}
function getNextNum(type,user){const k="artio_ctr_"+type+"_"+(user?.id||"x");let n=(parseInt(localStorage.getItem(k)||"0"))+1;localStorage.setItem(k,n);return(type==="devis"?"DEV":"FACT")+"-2026-"+String(n).padStart(3,"0")}

let S={
  user:null,
  langue:"fr",
  entreprise:{nom:"",adresse:"",tel:"",email:"",siret:"",taux_horaire:"",assujetti_tva:false,secteur:"",conditions_paiement:"",delai_paiement:"30",validite_devis:3,iban:"",contexte_ia:"",logo_base64:null,couleur_pdf:null,rc_pro_assureur:"",rc_pro_police:"",decennale_assureur:"",decennale_police:"",certifications:"",nature_operation:""},
  dossiers:[],clients:[],
  openDossier:null,previewDocNum:null,deleteConfirm:null,
  convertingId:null,devisAConvertir:[],
  showDatePrestModal:false,showSiretModal:null,pendingConvert:null,
  signatureLink:null,signatureLinkCopied:false,
  emettreId:null,renamingDossierId:null,renamingDossierVal:"",
  rappelLoadingId:null,loading:false,
  openClientOverlay:null,
};
let dosCurrentPage=1;
const DOS_PAGE_SIZE=10;
function set(patch){Object.assign(S,patch);renderPage();}

window.openClientOverlay=function(nom){set({openClientOverlay:nom,openDossier:null});};
window.closeClientOverlay=function(){set({openClientOverlay:null,openDossier:null,previewDocNum:null,deleteConfirm:null});};
async function upsertDossier(dos){
  try{
    const{error}=await sb.from("dossiers").upsert({id:dos.id,user_id:S.user.id,nom:dos.nom||"",client:dos.client||"",statut:dos.statut||"devis_envoye",documents:dos.documents||[],created_at:new Date().toISOString(),updated_at:new Date().toISOString()},{onConflict:"id"});
    if(error){console.error("upsertDossier:",error.message);alert("Erreur de sauvegarde : "+error.message);}
  }catch(e){alert("Erreur de sauvegarde : "+e.message);}
}
async function deleteDossierDB(id){await sb.from("dossiers").delete().eq("id",id).eq("user_id",S.user.id);}

function checkDevisAConvertir(){
  try{
    const today=new Date();today.setHours(0,0,0,0);
    const liste=[];
    for(const dos of S.dossiers){
      if((dos.documents||[]).some(d=>d.type==="facture"))continue;
      const devis=(dos.documents||[]).find(d=>d.type==="devis"&&d.accepte);
      if(!devis)continue;
      if(devis.date_prestation){const dp=new Date(devis.date_prestation);dp.setHours(0,0,0,0);if(dp<=today)liste.push({dosId:dos.id,docNum:devis.docNumber,nom:dos.nom||dos.client||"",datePresta:devis.date_prestation});}
      else{liste.push({dosId:dos.id,docNum:devis.docNumber,nom:dos.nom||dos.client||"",datePresta:null});}
    }
    S.devisAConvertir=liste;
  }catch(e){console.error("checkDevisAConvertir:",e);}
}

async function hashDoc(obj){
  const str=JSON.stringify(obj,Object.keys(obj).sort());
  const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

async function callClaude(prompt,maxTokens=400,retries=5){
  if(window.PlanGuard&&window.PlanGuard.isFree()){_showReadonlyAlert("La génération par IA nécessite un abonnement actif.");throw new Error("plan_required");}
  const{data:{session}}=await sb.auth.getSession();
  if(!session){throw new Error("Session expirée, reconnecte-toi.");}
  for(let attempt=1;attempt<=retries;attempt++){
    try{
      const res=await fetch(FUNCTIONS_URL+"/claude-proxy",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+session.access_token},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:maxTokens,messages:[{role:"user",content:prompt}]})});
      const d=await res.json();
      if(!res.ok){
        if((d.code==="plan_required")||res.status===403){_showReadonlyAlert("Abonnement requis pour utiliser l'IA.");throw new Error("plan_required");}
        if((res.status===529||res.status===503||res.status===429)&&attempt<retries){await new Promise(r=>setTimeout(r,1500*Math.pow(1.5,attempt)));continue;}
        throw new Error(d.error||d.message||"Erreur proxy IA");
      }
      return{text:d.content?.map(b=>b.text||"").join("")||"",usage:d.usage||null};
    }catch(e){
      if(attempt===retries){if(e.message==="plan_required")throw e;throw new Error("L'IA est momentanément surchargée. Réessayez dans quelques instants.");}
      if(e.message==="plan_required")throw e;
      await new Promise(r=>setTimeout(r,1500*Math.pow(1.5,attempt)));
    }
  }
}

window.emettreFacture=async function(dosId,docNum,opts){
  const silent=opts&&opts.silent===true;
  const dos=S.dossiers.find(d=>d.id===dosId);if(!dos)return;
  const doc=dos.documents.find(d=>d.docNumber===docNum);if(!doc)return;
  // ⚡ GARDE D'IDEMPOTENCE : si déjà émise, on ne rappelle PAS FactPulse.
  if(doc.factpulse_id){
    if(!silent)showToast("✅ Cette facture a déjà été émise (Flow ID : "+doc.factpulse_id+")");
    return;
  }
  if(!S.entreprise?.siret){if(!silent)showToast("⚠️ SIRET manquant dans ton profil — va dans Paramètres.");return;}
  let clientSiret=(doc.client?.siret||"").replace(/\s/g,"");
  if(!clientSiret){if(silent)return;set({showSiretModal:{dosId,docNum}});return;}
  set({emettreId:docNum});
  try{
    // ── Génération du PDF source côté frontend ───────────────────
    // FactPulse a besoin d'un PDF "régulier" pour y embedder le XML CII.
    // On construit un doc complet avec entreprise + client, puis on
    // génère le PDF en base64 via pdf-generator.js.
    const docPourPDF={
      ...doc,
      entreprise:S.entreprise,
      client:{...(doc.client||{}),...(S.clients.find(c=>c.nom===dos.client)||{})}
    };
    let sourcePdfB64;
    try{
      if(!window.ArtioPDF||typeof window.ArtioPDF.toBase64!=="function"){
        throw new Error("pdf-generator.js non chargé");
      }
      sourcePdfB64=window.ArtioPDF.toBase64(docPourPDF);
    }catch(pdfErr){
      if(!silent)showToast("❌ Génération PDF impossible : "+pdfErr.message);
      set({emettreId:null});return;
    }

    const{data:{session}}=await sb.auth.getSession();
    if(!session){if(!silent)showToast("⚠️ Session expirée. Reconnecte-toi.");set({emettreId:null});return;}
    const resp=await fetch(FUNCTIONS_URL+"/index-factpulse",{method:"POST",headers:{"Authorization":"Bearer "+session.access_token,"Content-Type":"application/json"},body:JSON.stringify({dossier_id:dosId,doc_number:docNum,source_pdf:sourcePdfB64})});
    const result=await resp.json();
    if(!resp.ok||!result.success){const msg=result?.error||result?.message||"Erreur inconnue";if(!silent)showToast("❌ FactPulse : "+msg);else console.warn("FactPulse silent:",msg);set({emettreId:null});return;}
    const{data:freshDos}=await sb.from("dossiers").select("*").eq("id",dosId).single();
    if(freshDos){
      // Normaliser documents (peut arriver comme string JSON depuis Supabase)
      try{freshDos.documents=typeof freshDos.documents==="string"?JSON.parse(freshDos.documents):(freshDos.documents||[]);}catch(e){freshDos.documents=[];}
      const idx=S.dossiers.findIndex(d=>d.id===dosId);if(idx>=0)S.dossiers[idx]=freshDos;
    }
    set({emettreId:null,dossiers:[...S.dossiers]});
    if(!silent)showToast("✅ Facture émise électroniquement ! Flow ID : "+(result.flow_id||result.factpulse_id||"émis"));
  }catch(e){if(!silent)showToast("❌ Erreur réseau : "+e.message);set({emettreId:null});}
};

convertToFacture=async(dosId,docNum)=>{
  if(window.PlanGuard&&window.PlanGuard.isFree()){_showReadonlyAlert("Action impossible en mode lecture.");return;}
  const dos=S.dossiers.find(d=>d.id===dosId);if(!dos)return;
  const devis=dos.documents.find(d=>d.docNumber===docNum);if(!devis)return;
  if(!devis.date_prestation){set({pendingConvert:{dosId,docNum},showDatePrestModal:true});return;}
  await _doConvert(dosId,docNum,isoToFR(devis.date_prestation));
};
async function _doConvert(dosId,docNum,dateFacture){
  set({convertingId:docNum});
  const dos=S.dossiers.find(d=>d.id===dosId);if(!dos)return;
  const devis=dos.documents.find(d=>d.docNumber===docNum);if(!devis)return;
  const factNum=await getNextNum("facture",S.user);
  const factDoc={...devis,type:"facture",docNumber:factNum,date:dateFacture,validUntil:null,accepte:false};
  dos.statut="facture";
  dos.documents=dos.documents.map(d=>d.docNumber===docNum?{...d,accepte:true}:d).concat([factDoc]);
  storeDoc(factDoc);
  await upsertDossier(dos);
  set({convertingId:null,pendingConvert:null,showDatePrestModal:false});
  checkDevisAConvertir();
  // Générer le label lisible de la facture en arrière-plan
  setTimeout(()=>genererLabelDoc(dosId,factNum),500);
  // Auto-émission FactPulse — déclenchée UNIQUEMENT si l'utilisateur a activé
  // la facturation électronique dans Paramètres → Facturation électronique.
  // La garde d'idempotence côté Edge Function empêche les doubles appels.
  if(S.entreprise?.facturation_electronique_active===true && S.entreprise?.siret){
    try { await window.emettreFacture(dosId,factNum,{silent:true}); }
    catch(e){ console.warn("Auto-émission FactPulse:",e.message); }
  }
}

/* ── GROUPEMENT PAR CLIENT ── */
function groupByClient(dossiers){
  const map={};
  dossiers.forEach(dos=>{
    const key=(dos.nom||"Client inconnu").trim();
    if(!map[key])map[key]={nom:key,dossiers:[],totalTTC:0,nbDocs:0,lastDate:""};
    map[key].dossiers.push(dos);
    (dos.documents||[]).forEach(doc=>{
      map[key].nbDocs++;
      if(doc.type==="facture")map[key].totalTTC+=(doc.ttc||0);
    });
    const d=dos.updated_at||dos.created_at||dos.createdAt||"";
    if(!map[key].lastDate||d>map[key].lastDate)map[key].lastDate=d;
  });
  return Object.values(map).sort((a,b)=>b.lastDate.localeCompare(a.lastDate));
}

/* ── PAGINATION DOSSIERS ── */
function buildDossPagination(current,total){
  const pages=[];
  for(let i=1;i<=total;i++){if(i===1||i===total||(i>=current-2&&i<=current+2))pages.push(i);}
  const items=[];let prev=0;
  pages.forEach(p=>{if(prev&&p-prev>1)items.push("...");items.push(p);prev=p;});
  let h='<div class="pagination">';
  h+=`<button class="pg-btn arrow" onclick="goToDosPage(${current-1})" ${current===1?"disabled":""}>&#8249;</button>`;
  items.forEach(item=>{
    if(item==="...")h+='<span class="pg-dots">…</span>';
    else h+=`<button class="pg-btn ${item===current?"active":""}" onclick="goToDosPage(${item})">${item}</button>`;
  });
  h+=`<button class="pg-btn arrow" onclick="goToDosPage(${current+1})" ${current===total?"disabled":""}>&#8250;</button>`;
  return h+'</div>';
}
window.goToDosPage=function(n){dosCurrentPage=n;renderPage();window.scrollTo({top:0,behavior:"smooth"});};

(2)} €</td><td style="text-align:right;">${(parseFloat(p.quantite)*parseFloat(p.prix_unitaire)).toFixed(2)} €</td></tr>`).join("")}</tbody></table><div style="text-align:right;font-size:13px;"><p style="margin:3px 0;color:#888;">Total HT : ${doc.totalHT.toFixed(2)} €</p>${doc.entreprise.assujetti_tva?`<p style="margin:3px 0;color:#888;">TVA (${doc.tvaRate}%) : ${doc.tva.toFixed(2)} €</p>`:`<p style="margin:3px 0;color:#888;font-size:11px;">TVA non applicable — art. 293B du CGI</p>`}<p style="margin:6px 0 0;font-weight:500;font-size:15px;">${doc.entreprise.assujetti_tva?"Total TTC":"Total"} : ${doc.ttc.toFixed(2)} €</p></div></div>`;
}

function _showReadonlyAlert(msg){
  const existing=document.getElementById("pg-readonly-alert");if(existing)existing.remove();
  const wasSubscribed=window.PlanGuard?.wasSubscribed?.()??false;
  const btnLabel=wasSubscribed?"↩ Se réabonner":"🚀 Découvrir les offres";
  const el=document.createElement("div");el.id="pg-readonly-alert";
  el.style.cssText="position:fixed;inset:0;z-index:9100;display:flex;align-items:center;justify-content:center;background:rgba(8,11,20,0.78);backdrop-filter:blur(8px);";
  el.innerHTML=`<div style="background:#0e1220;border:1px solid rgba(245,167,66,0.25);border-radius:22px;padding:32px 28px;max-width:380px;width:90%;text-align:center;font-family:'Plus Jakarta Sans',sans-serif;"><div style="font-size:36px;margin-bottom:12px;">📂</div><div style="font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;color:#e2e5f1;margin-bottom:8px;">Mode lecture</div><div style="font-size:13px;color:#6b7494;line-height:1.65;margin-bottom:22px;">${msg}</div><a href="settings.html?tab=abonnement" style="display:block;padding:12px;background:#f5a742;border-radius:12px;color:#080b14;font-size:14px;font-weight:700;font-family:'Space Grotesk',sans-serif;text-decoration:none;margin-bottom:10px;">${btnLabel}</a><button onclick="document.getElementById('pg-readonly-alert').remove()" style="font-size:12px;color:#6b7494;cursor:pointer;background:none;border:none;">Fermer</button></div>`;
  document.body.appendChild(el);el.addEventListener("click",e=>{if(e.target===el)el.remove();});
}

function showToast(msg){
  let t=document.getElementById("artio-toast");
  if(!t){t=document.createElement("div");t.id="artio-toast";t.style.cssText="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#0e1220;border:1px solid rgba(255,255,255,0.13);color:#e2e5f1;padding:12px 24px;border-radius:12px;font-size:13px;font-weight:500;z-index:9999;box-shadow:0 8px 32px rgba(0,0,0,.5);transition:opacity .4s;";document.body.appendChild(t);}
  t.textContent=msg;t.style.opacity="1";clearTimeout(t._to);t._to=setTimeout(()=>{t.style.opacity="0";},4500);
}

function renderModals(){
  let m="";
  if(S.showDatePrestModal){m+=`<div style="position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9999;display:flex;align-items:center;justify-content:center;" onclick="if(event.target===this)set({showDatePrestModal:false,pendingConvert:null})"><div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;width:340px;max-width:90vw;"><p style="font-size:16px;font-weight:600;margin-bottom:6px;">📅 Date de la prestation</p><p style="font-size:13px;color:var(--muted);margin-bottom:20px;">Ce devis ne contient pas de date de prestation. Renseignez la date de réalisation pour dater la facture correctement.</p><label style="font-size:11px;font-weight:600;letter-spacing:.06em;color:var(--muted);display:block;margin-bottom:6px;">DATE DE RÉALISATION</label><input type="date" id="modal-date-prest" style="width:100%;padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:var(--surface-2);color:var(--text);font-size:14px;margin-bottom:20px;" max="${new Date().toISOString().slice(0,10)}"/><div style="display:flex;gap:10px;"><button onclick="set({showDatePrestModal:false,pendingConvert:null})" style="flex:1;padding:11px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:14px;">Annuler</button><button onclick="(async()=>{const v=document.getElementById('modal-date-prest').value;if(!v)return;const[y,m,d]=v.split('-');const p=S.pendingConvert;await _doConvert(p.dosId,p.docNum,d+'/'+m+'/'+y);showToast('✅ Facture générée');renderPage();})()" style="flex:1;padding:11px;border-radius:10px;background:var(--amber);color:#080b14;border:none;cursor:pointer;font-size:14px;font-weight:700;">Confirmer</button></div></div></div>`;
  }
  if(S.signatureLink){m+=`<div style="position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;" onclick="if(event.target===this)set({signatureLink:null,signatureLinkCopied:false})"><div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;width:420px;max-width:100%;"><p style="font-size:16px;font-weight:600;margin-bottom:6px;">✍️ Lien de signature créé</p><p style="font-size:13px;color:var(--muted);margin-bottom:16px;line-height:1.6;">Envoyez ce lien à votre client par SMS ou email. Il pourra signer le devis directement en ligne.</p><label style="font-size:11px;font-weight:600;letter-spacing:.06em;color:var(--muted);display:block;margin-bottom:6px;">LIEN À ENVOYER</label><input id="sig-link-input" type="text" readonly value="${esc(S.signatureLink)}" onclick="this.select()" style="width:100%;padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:var(--surface-2);color:var(--text);font-size:13px;margin-bottom:14px;font-family:monospace;"/><div style="display:flex;gap:10px;"><button onclick="set({signatureLink:null,signatureLinkCopied:false})" style="flex:1;padding:11px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:14px;">Fermer</button><button onclick="copySignatureLink()" style="flex:1.4;padding:11px;border-radius:10px;background:${S.signatureLinkCopied?"var(--green)":"var(--amber)"};color:#080b14;border:none;cursor:pointer;font-size:14px;font-weight:700;transition:background .2s;">${S.signatureLinkCopied?"✓ Copié !":"📋 Copier le lien"}</button></div></div></div>`;
  }
  if(S.showSiretModal){m+=`<div style="position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;" onclick="if(event.target===this)set({showSiretModal:null})"><div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;width:400px;max-width:100%;"><p style="font-size:16px;font-weight:600;margin-bottom:6px;">⚡ Facturation électronique</p><p style="font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.6;">Le SIRET du client est requis pour émettre la facture au format électronique (B2B). Laissez vide si le client est un particulier.</p><label style="font-size:11px;font-weight:600;letter-spacing:.06em;color:var(--muted);display:block;margin-bottom:6px;">SIRET DU CLIENT</label><input id="modal-siret-input" type="text" maxlength="14" placeholder="Ex : 35600000000048" style="width:100%;padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:var(--surface-2);color:var(--text);font-size:14px;font-family:monospace;letter-spacing:.05em;margin-bottom:20px;" /><div style="display:flex;gap:10px;"><button onclick="set({showSiretModal:null})" style="flex:1;padding:11px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:14px;">Annuler — B2C</button><button onclick="(async()=>{const raw=document.getElementById('modal-siret-input').value.replace(/\\s/g,'');if(!raw||raw.length<9){showToast('⚠️ SIRET invalide');return;}const modal=S.showSiretModal;const dos=S.dossiers.find(d=>d.id===modal.dosId);if(!dos)return;const doc=dos.documents.find(d=>d.docNumber===modal.docNum);if(!doc)return;doc.client=doc.client||{};doc.client.siret=raw;try{await upsertDossier(dos);}catch(e){console.warn(e);}set({showSiretModal:null});await window.emettreFacture(modal.dosId,modal.docNum);})()" style="flex:1.4;padding:11px;border-radius:10px;background:var(--amber);color:#080b14;border:none;cursor:pointer;font-size:14px;font-weight:700;">Émettre la facture</button></div></div></div>`;
  }
  if(m){const div=document.createElement("div");div.id="modals-root";div.innerHTML=m;const old=document.getElementById("modals-root");if(old)old.replaceWith(div);else document.body.appendChild(div);}
  else{const old=document.getElementById("modals-root");if(old)old.remove();}
}

function renderPage(){
  const root=document.getElementById("app-root");if(!root)return;
  root.innerHTML=`<div style="font-family:var(--fh);font-size:22px;font-weight:700;margin-bottom:20px;margin-top:8px;">📁 Dossiers</div>`+renderHistorique();
  renderModals();
}

async function loadUserData(userId){
  try{
    const{data:profil,error:pe}=await sb.from("profils").select("*").eq("user_id",userId).single();
    if(pe&&pe.code!=="PGRST116")console.error("Erreur profil:",pe.message);
    if(profil){S.entreprise={nom:profil.nom||"",adresse:profil.adresse||"",tel:profil.tel||"",email:profil.email||"",siret:profil.siret||"",taux_horaire:profil.taux_horaire||"",assujetti_tva:profil.assujetti_tva||false,secteur:profil.secteur||"",conditions_paiement:profil.conditions_paiement||"",delai_paiement:profil.delai_paiement||"30",validite_devis:profil.validite_devis||3,rc_pro_assureur:profil.rc_pro_assureur||"",rc_pro_police:profil.rc_pro_police||"",decennale_assureur:profil.decennale_assureur||"",decennale_police:profil.decennale_police||"",certifications:profil.certifications||"",nature_operation:profil.nature_operation||"",contexte_ia:profil.contexte_ia||"",iban:profil.iban||"",onboarding_done:profil.onboarding_done||false,logo_base64:profil.logo_base64||null,couleur_pdf:profil.couleur_pdf||null,facturation_electronique_active:profil.facturation_electronique_active===true};}
    const{data:dossiers,error:de}=await sb.from("dossiers").select("*").eq("user_id",userId).order("updated_at",{ascending:false});
    if(de)console.error("Erreur dossiers:",de.message);
    if(dossiers&&dossiers.length>0){S.dossiers=dossiers.map(d=>{let docs=[];try{docs=typeof d.documents==="string"?JSON.parse(d.documents):(d.documents||[]);}catch(e){docs=[];}return{...d,documents:docs};});S.dossiers.forEach(d=>(d.documents||[]).forEach(doc=>{if(doc.docNumber)storeDoc(doc);}));}
    const{data:cls}=await sb.from("clients").select("id,nom,email,tel,adresse").eq("user_id",userId).order("nom",{ascending:true});
    if(cls)S.clients=cls;
  }catch(e){console.error("loadUserData exception:",e);}
  checkDevisAConvertir();
  renderPage();
  // Ouvrir un dossier spécifique depuis un lien externe (ex: email relance paiement J+30)
  const dosParam=new URLSearchParams(window.location.search).get("dossier");
  if(dosParam){
    const dosFound=S.dossiers.find(d=>d.id===dosParam);
    if(dosFound){
      set({openDossier:dosParam});
      history.replaceState(null,"",window.location.pathname);
      setTimeout(()=>{
        const el=document.querySelector(`[data-dos-id="${dosParam}"]`);
        if(el) el.scrollIntoView({behavior:"smooth",block:"center"});
      },300);
    }
  }
}

async function initAuth(){
  const theme=localStorage.getItem("artio-theme")||"dark";
  document.documentElement.setAttribute("data-theme",theme);
  const{data:{session}}=await sb.auth.getSession();
  if(!session){location.href="login.html";return;}
  S.user=session.user;
  window.PlanGuard?.init?.(session);
  await loadUserData(session.user.id);
  sb.auth.onAuthStateChange((event,sess)=>{if(!sess)location.href="login.html";});
  // ── Tutoriel interactif : reprend si en cours ──
  if(window.ArtioTour) window.ArtioTour.autoStart();
}
initAuth();
document.addEventListener("keydown",e=>{if(e.key==="Escape"&&S.openClientOverlay)closeClientOverlay();});

function toggleSidebar(){document.querySelector(".sidebar").classList.toggle("open");document.querySelector(".sidebar-overlay").classList.toggle("open");}
function closeSidebar(){document.querySelector(".sidebar").classList.remove("open");document.querySelector(".sidebar-overlay").classList.remove("open");}
function toggleTheme(){const cur=document.documentElement.getAttribute("data-theme")||"dark";const next=cur==="dark"?"light":"dark";document.documentElement.setAttribute("data-theme",next);try{localStorage.setItem("artio-theme",next);}catch(e){}}
async function handleLogout(){await sb.auth.signOut();location.href="login.html";}
