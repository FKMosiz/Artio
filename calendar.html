<style>
:root {
  --bg:        #080b14;
  --surface:   #0e1220;
  --surface-2: #141829;
  --surface-3: #1a2035;
  --border:    rgba(255,255,255,0.07);
  --border-hi: rgba(255,255,255,0.13);
  --text:      #e2e5f1;
  --muted:     #6b7494;
  --amber:     #f5a742;
  --amber-dim: rgba(245,167,66,0.12);
  --amber-glow:rgba(245,167,66,0.26);
  --teal:      #3ecfcf;
  --teal-dim:  rgba(62,207,207,0.11);
  --fh: 'Space Grotesk', sans-serif;
  --fb: 'Plus Jakarta Sans', sans-serif;
  --r: 12px;
  --nav-h: 60px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--fb);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── NAV ── */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: var(--nav-h); padding: 0 20px;
  display: flex; align-items: center; gap: 16px;
  background: rgba(8,11,20,0.85); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}
.nav-logo { font-family: var(--fh); font-size: 18px; font-weight: 700; color: var(--amber); letter-spacing:-0.02em; text-decoration:none; flex-shrink:0; }
.nav-links { display: flex; gap: 3px; flex: 1; justify-content: center; overflow-x: auto; }
.nav-link {
  padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 500;
  color: var(--muted); text-decoration: none; white-space: nowrap;
  border: none; background: transparent; cursor: pointer; font-family: var(--fb);
  transition: color .2s, background .2s;
}
.nav-link:hover { color: var(--text); background: var(--surface); }
.nav-link.active { color: var(--amber); background: var(--amber-dim); font-weight: 600; }
.nav-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.btn-logout {
  padding: 6px 14px; border-radius: 8px; font-size: 12px; font-weight: 500;
  background: transparent; border: 1px solid var(--border); color: var(--muted);
  cursor: pointer; font-family: var(--fb); transition: all .2s;
}
.btn-logout:hover { border-color: var(--border-hi); color: var(--text); }

/* ── LAYOUT ── */
.page {
  flex: 1; padding: calc(var(--nav-h) + 20px) 20px 20px;
  max-width: 1100px; margin: 0 auto; width: 100%;
}

/* ── CAL HEADER ── */
.cal-toolbar {
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 12px; margin-bottom: 16px;
}
.cal-nav-group { display: flex; align-items: center; gap: 8px; }
.cal-title { font-family: var(--fh); font-size: 16px; font-weight: 700; min-width: 200px; }
.cal-nav-btn {
  width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center;
  background: var(--surface); border: 1px solid var(--border); color: var(--text);
  cursor: pointer; font-size: 13px; transition: border-color .2s;
}
.cal-nav-btn:hover { border-color: var(--border-hi); }
.btn-today {
  padding: 6px 14px; border-radius: 8px; font-size: 12px; font-weight: 600;
  background: var(--surface); border: 1px solid var(--border); color: var(--muted);
  cursor: pointer; font-family: var(--fb); transition: all .2s;
}
.btn-today:hover { color: var(--text); border-color: var(--border-hi); }
.view-toggle { display: flex; background: var(--surface); border: 1px solid var(--border); border-radius: 9px; overflow: hidden; padding: 3px; gap: 3px; }
.view-btn {
  padding: 5px 14px; border-radius: 6px; font-size: 12px; font-weight: 600;
  border: none; background: transparent; color: var(--muted);
  cursor: pointer; font-family: var(--fb); transition: all .2s;
}
.view-btn.active { background: var(--surface-2); color: var(--text); }
.btn-add-rdv {
  padding: 8px 16px; border-radius: 9px; font-size: 13px; font-weight: 600;
  background: var(--amber); border: none; color: #080b14;

  box-shadow: 0 0 20px var(--amber-glow);
  transition: transform .15s, box-shadow .15s;
}
.btn-add-rdv:hover { transform: translateY(-1px); box-shadow: 0 4px 24px var(--amber-glow); }

/* ── WEEK VIEW ── */
.cal-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
.cal-head-row {
  display: grid; grid-template-columns: 48px repeat(7, 1fr);
  border-bottom: 1px solid var(--border); background: var(--surface-2);
}
.cal-time-hdr { border-right: 1px solid var(--border); }
.cal-day-hdr {
  padding: 10px 4px; text-align: center;
  border-left: 1px solid var(--border); cursor: pointer;
}
.cal-day-hdr.today-col { background: var(--amber-dim); }
.hdr-dow { font-size: 10px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
.hdr-num { font-family: var(--fh); font-size: 18px; font-weight: 700; }
.today-col .hdr-num { color: var(--amber); }
.cal-body { overflow-y: auto; max-height: calc(100vh - 230px); }
.cal-body-row { display: grid; grid-template-columns: 48px repeat(7, 1fr); }
.time-cell {
  border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);
  height: 48px; display: flex; align-items: flex-start; justify-content: flex-end;
  padding: 3px 6px 0 0; font-size: 10px; color: var(--muted); flex-shrink: 0;
}
.day-cell {
  border-left: 1px solid var(--border); border-bottom: 1px solid var(--border);
  height: 48px; position: relative; cursor: pointer;
  transition: background .15s;
}
.day-cell:hover { background: var(--surface-2); }
.day-cell.today-col { background: rgba(245,167,66,0.04); }
.now-line {
  position: absolute; left: 0; right: 0; height: 2px;
  background: var(--amber); z-index: 5; pointer-events: none;
}
.now-line::before {
  content:''; position: absolute; left: -4px; top: -4px;
  width: 10px; height: 10px; border-radius: 50%; background: var(--amber);
}
.ev-block {
  position: absolute; left: 2px; right: 2px; min-height: 20px;
  border-radius: 5px; padding: 2px 5px; font-size: 10px; font-weight: 600;
  overflow: hidden; z-index: 3; cursor: pointer; line-height: 1.4;
}

/* ── MONTH VIEW ── */
.month-days-hdr {
  display: grid; grid-template-columns: repeat(7,1fr);
  background: var(--surface-2); border-bottom: 1px solid var(--border);
  border-radius: 14px 14px 0 0;
}
.month-hdr-cell {
  text-align: center; padding: 10px 4px;
  font-size: 10px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--muted);
  border-left: 1px solid var(--border);
}
.month-hdr-cell:first-child { border-left: none; }
.month-grid { display: grid; grid-template-columns: repeat(7,1fr); }
.month-cell {
  min-height: 90px; padding: 6px 7px; cursor: pointer;
  border-top: 1px solid var(--border); border-left: 1px solid var(--border);
  transition: background .15s; overflow: hidden;
}
.month-cell:nth-child(7n+1) { border-left: none; }
.month-cell:hover { background: var(--surface-2); }
.month-cell.other { opacity: .3; }
.month-cell.today { background: var(--amber-dim); }
.month-cell.today .m-num { color: var(--amber); }
.month-cell.ferie .m-num { color: #f87171; font-weight: 700; }
.m-ferie-label { font-size: 8px; color: #f87171; opacity: .85; line-height:1.2; margin-bottom:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.cal-day-hdr.ferie-col .hdr-num { color: #f87171; font-weight: 700; }
.cal-day-hdr.ferie-col .hdr-day { color: #f87171; opacity: .8; }
.m-num { font-family: var(--fh); font-size: 12px; font-weight: 700; margin-bottom: 4px; }
.m-ev {
  font-size: 9px; font-weight: 600; padding: 2px 5px; border-radius: 4px;
  margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── PANEL ── */
.overlay {
  display: none; position: fixed; inset: 0; z-index: 299;
  background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
}
.overlay.open { display: block; }
.panel {
  position: fixed; top: 0; right: -340px; bottom: 0; width: 320px;

.field { margin-bottom: 14px; }

.field-input {

/* ── GOOGLE CALENDAR BADGE ── */

/* ── IA BOUTON ── */
.ia-btn {

/* scrollbar */
.cal-body::-webkit-scrollbar { width: 5px; }

    /* ── FOOTER LÉGAL ── */

<script>
const SUPABASE_URL = "https://mwmexkoeqeyueqgdkkni.supabase.co";
const SUPABASE_KEY = "sb_publishable_dbf0DrGQr377jyftcE-rYw_SK5nzZJw";
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

let user = null, dossiers = [], rdvs = [], viewMode = "week";
let googleConnected = false, userSession = null;
const FN = SUPABASE_URL + "/functions/v1";
let viewDate = new Date();

const JOURS_FR = ["Lun","Mar","Mer","Jeu","Ven","Sam","Dim"];
const MOIS = ["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
const HEURES = Array.from({length:16}, (_,i) => i + 6);

const COLORS = [
  {id:"amber",  label:"Ambre",  hex:"#f5a742", dim:"rgba(245,167,66,.15)",  text:"#f5a742"},
  {id:"teal",   label:"Teal",   hex:"#3ecfcf", dim:"rgba(62,207,207,.14)",  text:"#3ecfcf"},
  {id:"blue",   label:"Bleu",   hex:"#60a5fa", dim:"rgba(96,165,250,.14)",  text:"#60a5fa"},
  {id:"green",  label:"Vert",   hex:"#4ade80", dim:"rgba(74,222,128,.13)",  text:"#4ade80"},
  {id:"purple", label:"Violet", hex:"#a78bfa", dim:"rgba(167,139,250,.14)", text:"#a78bfa"},
  {id:"red",    label:"Rouge",  hex:"#f87171", dim:"rgba(248,113,113,.13)", text:"#f87171"},
  {id:"orange", label:"Orange", hex:"#fb923c", dim:"rgba(251,146,60,.13)",  text:"#fb923c"},
  {id:"pink",   label:"Rose",   hex:"#f472b6", dim:"rgba(244,114,182,.13)", text:"#f472b6"},
];

function getColor(id) { return COLORS.find(c => c.id === id) || COLORS[0]; }

/* ── JOURS FÉRIÉS FRANÇAIS ── */
function easterDate(y) {
  const a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4;
  const f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3);
  const h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4;
  const l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451);
  const mo=Math.floor((h+l-7*m+114)/31),da=((h+l-7*m+114)%31)+1;
  return new Date(y,mo-1,da);
}
function getFeries(y) {
  const map={};
  function add(d,n){ map[localKey(d)]=n; }
  add(new Date(y,0,1),  "Jour de l'An");
  add(new Date(y,4,1),  "Fête du Travail");
  add(new Date(y,4,8),  "Victoire 1945");
  add(new Date(y,6,14), "Fête Nationale");
  add(new Date(y,7,15), "Assomption");
  add(new Date(y,10,1), "Toussaint");
  add(new Date(y,10,11),"Armistice");
  add(new Date(y,11,25),"Noël");
  const p=easterDate(y);
  const off=n=>{ const d=new Date(p); d.setDate(p.getDate()+n); return d; };
  add(off(1),  "Lundi de Pâques");
  add(off(39), "Ascension");
  add(off(50), "Lundi de Pentecôte");
  return map;
}
function feriesForRange(y1,y2) {
  const map={};
  for(let y=y1;y<=y2;y++) Object.assign(map,getFeries(y));
  return map;
}

function localKey(d) {
  if (typeof d === "string") return d.slice(0, 10);
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
}
function esc(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function getWeekStart(d) {
  const dt = new Date(d);
  const dow = dt.getDay();
  const diff = dow === 0 ? -6 : 1 - dow;
  dt.setDate(dt.getDate() + diff);
  dt.setHours(0,0,0,0);
  return dt;
}
function getWeekDays(start) {
  return Array.from({length:7}, (_,i) => { const d = new Date(start); d.setDate(d.getDate()+i); return d; });
}

function buildEvents() {
  const ev = {};
  function add(date, o) { const k = localKey(date); if (!ev[k]) ev[k] = []; ev[k].push(o); }
  dossiers.forEach(dos => {
    (dos.documents||[]).forEach(doc => {
      if (!doc.date_prestation) return;
      const dk = doc.date_prestation.slice(0,10);
      if (!ev[dk]) ev[dk] = [];
      ev[dk].push({
        type: doc.type,
        label: (doc.type === "devis" ? "Devis" : "Facture") + " — " + esc(dos.nom||dos.client||""),
        hour: doc.heure_prestation||"",
        heureFin: doc.heure_fin_prestation||"",
        dosId: dos.id,
        accepte: doc.accepte||false,
        color: doc.type === "devis" ? "blue" : "teal",
      });
    });
  });
  rdvs.forEach(r => add(r.date, {type:"rdv", label: esc(r.titre), hour: r.heure||"", id: r.id, color: r.couleur||"amber"}));
  // Jours fériés : couvrir l'année en cours ± 1
  const ny = new Date().getFullYear();
  const feries = feriesForRange(ny-1, ny+1);
  Object.entries(feries).forEach(([dk,nom]) => {
    if(!ev[dk]) ev[dk]=[];
    ev[dk].unshift({type:"ferie", label:nom, hour:"", color:"red", isFerie:true});
  });
  return ev;
}

/* ── WEEK VIEW ── */
function renderWeek() {
  const ev = buildEvents();
  const ws = getWeekStart(viewDate);
  const days = getWeekDays(ws);
  const todayKey = localKey(new Date());
  const nowH = new Date().getHours(), nowM = new Date().getMinutes();

  const label = `${days[0].getDate()} — ${days[6].toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"})}`;

  const feries = feriesForRange(ws.getFullYear()-1, ws.getFullYear()+1);
  const headCells = days.map(d => {
    const isToday = localKey(d) === todayKey;
    const isFerie = !!feries[localKey(d)];
    const dow = JOURS_FR[(d.getDay()+6)%7];
    return `<div class="cal-day-hdr ${isToday?"today-col":""} ${isFerie?"ferie-col":""}">
      <div class="hdr-dow">${dow}</div>
      <div class="hdr-num">${d.getDate()}</div>
    </div>`;
  }).join("");

  const bodyRows = HEURES.map(h => {
    const timeLabel = h + "h";
    const dayCells = days.map(d => {
      const dk = localKey(d);
      const isToday = dk === todayKey;
      const dayEvs = (ev[dk]||[]).filter(e => {
        const eh = e.hour ? parseInt(e.hour.split(":")[0]) : 9;
        return eh === h;
      });
      const nowDot = isToday && h === nowH
        ? `<div class="now-line" style="top:${Math.round(nowM/60*48)}px"></div>` : "";
      const total = dayEvs.length;
      const evBlocks = dayEvs.map((e, idx) => {
        const c = getColor(e.color);
        const startM = e.hour ? parseInt(e.hour.split(":")[1]||0) : 0;
        let heightStyle = "";
        if (e.heureFin) {
          const [fH,fM] = e.heureFin.split(":").map(Number);
          const durMin = (fH*60+fM) - (h*60+startM);
          if (durMin > 10) heightStyle = `height:${durMin/60*48}px;`;
        }
        // Affichage côte à côte comme Google Calendar si plusieurs events simultanés
        const colW = total > 1 ? `calc(${(100/total).toFixed(1)}% - 3px)` : "calc(100% - 4px)";
        const colL = total > 1 ? `calc(${(idx*100/total).toFixed(1)}% + 2px)` : "2px";
        return `<div class="ev-block" style="top:${Math.round(startM/60*48)}px;${heightStyle}left:${colL};right:auto;width:${colW};background:${c.dim};color:${c.text};border-left:2px solid ${c.hex};" onclick="event.stopPropagation();openPanel('${dk}',${h})" title="${e.label}">${e.label}</div>`;
      }).join("");
      return `<div class="day-cell ${isToday?"today-col":""}" onclick="openPanel('${dk}',${h})">${nowDot}${evBlocks}</div>`;
    }).join("");
    return `<div class="cal-body-row"><div class="time-cell">${timeLabel}</div>${dayCells}</div>`;
  }).join("");

  return `
    <div class="cal-toolbar">
      <div class="cal-nav-group">
        <button class="cal-nav-btn" onclick="changeWeek(-1)">◀</button>
        <div class="cal-title">${label}</div>
        <button class="cal-nav-btn" onclick="changeWeek(1)">▶</button>
        <button class="btn-today" onclick="goToday()">Aujourd'hui</button>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <div class="view-toggle">
          <button class="view-btn ${viewMode==="week"?"active":""}" onclick="setView('week')">Semaine</button>
          <button class="view-btn ${viewMode==="month"?"active":""}" onclick="setView('month')">Mois</button>
        </div>
        <button class="btn-add-rdv" onclick="openPanel('${localKey(new Date())}',9)">+ RDV</button>
        <button class="ia-btn" id="btn-ia-semaine" onclick="iaOptimiseSemaine()">✨ Optimiser la semaine</button>
      </div>
      <div id="gcal-btn-wrap" style="margin-bottom:0"></div>
    </div>
    <div class="cal-wrap">
      <div class="cal-head-row">
        <div class="cal-time-hdr"></div>
        ${headCells}
      </div>
      <div class="cal-body" id="cal-body">
        ${bodyRows}
      </div>
    </div>`;
}

/* ── MONTH VIEW ── */
function renderMonth() {
  const ev = buildEvents();
  const y = viewDate.getFullYear(), m = viewDate.getMonth();
  const todayKey = localKey(new Date());
  const feries = feriesForRange(y-1, y+1);
  const first = new Date(y, m, 1);
  let dow = first.getDay(); if (dow === 0) dow = 7;
  const days = [];
  for (let i = dow-1; i > 0; i--) { const d = new Date(y,m,1-i); d._other = true; days.push(d); }
  const last = new Date(y, m+1, 0).getDate();
  for (let i = 1; i <= last; i++) days.push(new Date(y, m, i));
  let edow = new Date(y, m+1, 0).getDay(); if (edow === 0) edow = 7;
  for (let i = 1; i <= 7-edow; i++) { const d = new Date(y, m+1, i); d._other = true; days.push(d); }

  const cells = days.map(d => {
    const dk = localKey(d);
    const isToday = dk === todayKey;
    const dayEvs = ev[dk] || [];
    const evHtml = dayEvs.slice(0,3).map(e => {
      const c = getColor(e.color);
      return `<div class="m-ev" style="background:${c.dim};color:${c.text};">${e.label}</div>`;
    }).join("") + (dayEvs.length > 3 ? `<div style="font-size:9px;color:var(--muted);">+${dayEvs.length-3}</div>` : "");
    const isFerie = !d._other && !!feries[dk];
    return `<div class="month-cell ${d._other?"other":""} ${isToday?"today":""} ${isFerie?"ferie":""}" onclick="openPanel('${dk}',9)">
      <div class="m-num">${d.getDate()}</div>
      ${isFerie ? `<div class="m-ferie-label">${feries[dk]}</div>` : ""}
      ${evHtml}
    </div>`;
  }).join("");

  return `
    <div class="cal-toolbar">
      <div class="cal-nav-group">
        <button class="cal-nav-btn" onclick="changeMonth(-1)">◀</button>
        <div class="cal-title">${MOIS[m]} ${y}</div>
        <button class="cal-nav-btn" onclick="changeMonth(1)">▶</button>
        <button class="btn-today" onclick="goToday()">Aujourd'hui</button>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <div class="view-toggle">
          <button class="view-btn ${viewMode==="week"?"active":""}" onclick="setView('week')">Semaine</button>
          <button class="view-btn ${viewMode==="month"?"active":""}" onclick="setView('month')">Mois</button>
        </div>
        <button class="btn-add-rdv" onclick="openPanel('${localKey(new Date())}',9)">+ RDV</button>
        <button class="ia-btn" id="btn-ia-semaine" onclick="iaOptimiseSemaine()">✨ Optimiser la semaine</button>
      </div>
      <div id="gcal-btn-wrap" style="margin-bottom:0"></div>
    </div>
    <div class="cal-wrap">
      <div class="month-days-hdr">
        ${JOURS_FR.map(j => `<div class="month-hdr-cell">${j}</div>`).join("")}
      </div>
      <div class="month-grid">${cells}</div>
    </div>`;
}

function render() {
  document.getElementById("main").innerHTML = viewMode === "week" ? renderWeek() : renderMonth();
  if (viewMode === "week") {
    const body = document.getElementById("cal-body");
    if (body) body.scrollTop = Math.max(0, (new Date().getHours() - HEURES[0] - 1) * 48);
  }
}

window.setView   = v => { viewMode = v; render(); };
window.changeWeek  = d => { viewDate.setDate(viewDate.getDate()+d*7); render(); };
window.changeMonth = d => { viewDate.setMonth(viewDate.getMonth()+d); render(); };
window.goToday   = () => { viewDate = new Date(); render(); };

/* ── PANEL ── */
function openPanel(dk, h) {
  // ── Plan Guard ──
  if(window.PlanGuard && window.PlanGuard.isFree()){
    const el=document.createElement("div");
    el.style.cssText="position:fixed;inset:0;z-index:9100;display:flex;align-items:center;justify-content:center;background:rgba(8,11,20,0.78);backdrop-filter:blur(8px);";
    el.innerHTML=`<div style="background:#0e1220;border:1px solid rgba(245,167,66,0.25);border-radius:22px;padding:32px 28px;max-width:380px;width:90%;text-align:center;font-family:'Plus Jakarta Sans',sans-serif;"><div style="font-size:36px;margin-bottom:12px;">📂</div><div style="font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;color:#e2e5f1;margin-bottom:8px;">Mode lecture</div><div style="font-size:13px;color:#6b7494;line-height:1.65;margin-bottom:22px;">La création de RDV nécessite un abonnement actif.</div><a href="settings.html?tab=abonnement" style="display:block;padding:12px;background:#f5a742;border-radius:12px;color:#080b14;font-size:14px;font-weight:700;text-decoration:none;margin-bottom:10px;">↩ Se réabonner</a><button onclick="this.closest('[style]').remove()" style="font-size:12px;color:#6b7494;cursor:pointer;background:none;border:none;">Fermer</button></div>`;
    document.body.appendChild(el);
    el.addEventListener("click",e=>{if(e.target===el)el.remove();});
    return;
  }
  const ev = buildEvents();
  const dayEvs = ev[dk] || [];
  const dateObj = new Date(dk + "T12:00:00");
  const dateLabel = dateObj.toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"});
  const hStr = String(h).padStart(2,"0") + ":00";
  let selectedColor = "amber";

  const evCards = dayEvs.map(e => {
    const c = getColor(e.color);
    return `<div class="rdv-card" style="border-left-color:${c.hex};">
      <div class="rdv-title">${e.label}</div>
      <div class="rdv-meta">${e.hour ? "⏰ " + e.hour : "Heure non définie"}</div>
      ${e.id ? `<button class="rdv-del" onclick="deleteRdv('${e.id}','${dk}')">Supprimer</button>` : ""}
    </div>`;
  }).join("");

  const colorSwatches = COLORS.map(c =>
    `<div class="col-swatch ${c.id === selectedColor ? "active" : ""}" style="background:${c.hex}" title="${c.label}"
      id="sw-${c.id}" onclick="pickColor('${c.id}')"></div>`
  ).join("");

  document.getElementById("panel").innerHTML = `
    <div class="panel-head">
      <div>
        <div class="panel-title" style="text-transform:capitalize">${dateLabel}</div>
        <div class="panel-sub">${dayEvs.length} événement${dayEvs.length > 1 ? "s" : ""}</div>
      </div>
      <button class="panel-close" onclick="closePanel()">✕</button>
    </div>
    <div class="panel-body">
      ${evCards}
      ${dayEvs.length > 0 ? '<div class="divider-line"></div>' : ''}
      <div class="form-section-title">Ajouter un RDV</div>
      <div class="field">
        <label class="field-label">TITRE</label>
        <input id="rdv-titre" class="field-input" type="text" placeholder="Ex: Intervention chez M. Dupont"/>
      </div>
      <div class="field">
        <label class="field-label">HEURE</label>
        <input id="rdv-heure" class="field-input" type="time" value="${hStr}"/>
      </div>
      <div class="field">
        <label class="field-label">COULEUR</label>
        <div class="color-row">${colorSwatches}</div>
        <input type="hidden" id="rdv-couleur" value="${selectedColor}"/>
      </div>
      <div class="field">
        <label class="field-label">DOSSIER LIÉ (OPTIONNEL)</label>
        <select id="rdv-dos" class="field-input">
          <option value="">-- Aucun --</option>
          ${dossiers.map(d => `<option value="${d.id}">${esc(d.nom||d.client||d.id)}</option>`).join("")}
        </select>
      </div>
      <div style="margin-bottom:10px;">
        <button onclick="iaCreneaux('${dk}')" style="width:100%;padding:9px;border-radius:9px;font-size:12px;font-weight:600;background:linear-gradient(135deg,rgba(167,139,250,.1),rgba(62,207,207,.07));border:1px solid rgba(167,139,250,.25);color:#a78bfa;cursor:pointer;font-family:var(--fb);margin-bottom:8px;">✨ Suggérer des créneaux</button>
        <div id="ia-creneau-result"></div>
      </div>
      <button class="btn-panel-submit" onclick="addRdv('${dk}')">Ajouter le RDV</button>
    </div>`;

  document.getElementById("panel").classList.add("open");
  document.getElementById("ov").classList.add("open");
}

window.pickColor = function(id) {
  document.getElementById("rdv-couleur").value = id;
  document.querySelectorAll(".col-swatch").forEach(s => s.classList.remove("active"));
  document.getElementById("sw-" + id)?.classList.add("active");
};

function closePanel() {
  document.getElementById("panel").classList.remove("open");
  document.getElementById("ov").classList.remove("open");
}

// ── Sync Google Calendar ─────────────────────────────────────────
async function syncToGoogle(action, rdvId, googleEventId) {
  if (!googleConnected || !userSession) return;
  try {
    await fetch(FN + "/google-calendar-sync", {
      method: "POST",
      headers: { "Authorization": "Bearer " + userSession.access_token, "Content-Type": "application/json" },
      body: JSON.stringify({ action, rdv_id: rdvId, google_event_id: googleEventId || null })
    });
  } catch(e) { console.warn("Google sync failed:", e); }
}

// ── Sync tous les events dossier vers Google au chargement ──────
async function syncAllDossierEvents() {
  if (!googleConnected || !userSession) return;
  const token = userSession.access_token;
  for (const dos of dossiers) {
    for (const doc of (dos.documents || [])) {
      if (!doc.date_prestation) continue;
      const date = doc.date_prestation.slice(0, 10);
      const titre = (doc.type === "devis" ? "Devis" : "Facture") + " — " + (dos.nom || dos.client || dos.id);
      // Fire and forget — on ne bloque pas le rendu
      fetch(FN + "/google-calendar-sync", {
        method: "POST",
        headers: { "Authorization": "Bearer " + token, "Content-Type": "application/json" },
        body: JSON.stringify({
          action:      "sync_dossier",
          dossier_id:  dos.id,
          doc_number:  doc.docNumber || doc.numero || "",
          titre,
          date,
          heure:       doc.heure_prestation || "09:00",
          heure_fin:   doc.heure_fin_prestation || "",
          type:        doc.type || "devis",
        })
      }).catch(() => {});
    }
  }
}

window.addRdv = async function(dk) {
  const titre = document.getElementById("rdv-titre")?.value.trim();
  if (!titre) { document.getElementById("rdv-titre")?.focus(); return; }
  const heure   = document.getElementById("rdv-heure")?.value || "";
  const couleur = document.getElementById("rdv-couleur")?.value || "amber";
  const dosId   = document.getElementById("rdv-dos")?.value || null;
  const rdv = { id: Date.now().toString(), user_id: user.id, date: dk, titre, heure, couleur, dossier_id: dosId };
  const { error } = await sb.from("rdvs").upsert(rdv, { onConflict: "id" });
  if (error) { alert("Erreur : " + error.message); return; }
  rdvs.push(rdv);
  syncToGoogle("create", rdv.id, null);
  closePanel();
  render();
  openPanel(dk, parseInt(heure)||9);
};

window.deleteRdv = async function(id, dk) {
  const existing = rdvs.find(r => r.id === id);
  const gId = existing ? existing.google_event_id : null;
  await sb.from("rdvs").delete().eq("id", id);
  rdvs = rdvs.filter(r => r.id !== id);
  syncToGoogle("delete", id, gId);
  closePanel();
  render();
  if ((buildEvents()[dk]||[]).length > 0 || true) openPanel(dk, 9);
};

// ── IA : créneaux suggérés ───────────────────────────────────────
window.iaCreneaux = async function(dk) {
  const el = document.getElementById("ia-creneau-result");
  if (!el) return;
  el.innerHTML = "<div class=\"ia-loading\">Analyse des disponibilités…</div>";
  const ev = buildEvents();
  const occupes = (ev[dk]||[]).filter(e=>!e.isFerie).map(e=>e.hour||"?").join(", ")||"aucun";
  const ws = getWeekStart(viewDate);
  const planning = [];
  for (let i=0;i<7;i++) { const d=new Date(ws); d.setDate(d.getDate()+i); const k=localKey(d); (ev[k]||[]).filter(e=>!e.isFerie).forEach(e=>planning.push(k+" "+e.hour+": "+e.label)); }
  const prompt = "Tu es l'IA Artio. Suggère 3 créneaux optimaux pour un RDV le "+dk+".\nOccupés : "+occupes+"\nSemaine : "+planning.join(" | ")+". Réponds: HH:MM — raison courte (1 ligne chacun, 3 lignes max, en français).";
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:150, messages:[{role:"user",content:prompt}] }) });
    const data = await res.json();
    const texte = data.content?.[0]?.text || "";
    const lignes = texte.split("\n").filter(l => l.match(/\d{2}:\d{2}/));
    if (lignes.length > 0) {
      el.innerHTML = "<div style=\"font-size:11px;color:var(--muted);margin-bottom:6px;\">✨ Cliquez pour sélectionner</div><div class=\"ia-slots\">" + lignes.map(l => { const h=l.match(/(\d{2}:\d{2})/)?.[1]||""; return "<div class=\"ia-slot\" onclick=\"document.getElementById('rdv-heure').value='"+h+"';document.getElementById('rdv-titre').focus()\">"+l.trim()+"</div>"; }).join("") + "</div>";
    } else { el.innerHTML = "<div class=\"ia-response\">"+texte+"</div>"; }
  } catch(e) { el.innerHTML = "<div style=\"font-size:11px;color:var(--muted);\">IA indisponible</div>"; }
};

// ── IA : optimisation semaine ────────────────────────────────────
window.iaOptimiseSemaine = async function() {
  const ev = buildEvents();
  const ws = getWeekStart(viewDate);
  const planning = [];
  for (let i=0;i<7;i++) { const d=new Date(ws); d.setDate(d.getDate()+i); const k=localKey(d); const je=(ev[k]||[]).filter(e=>!e.isFerie); if(je.length>0) planning.push(k+": "+je.map(e=>(e.hour||"?")+e.label).join(" | ")); }
  const btn = document.getElementById("btn-ia-semaine");
  if (btn) btn.textContent = "✨ Analyse…";
  const prompt = "Tu es l'IA Artio. Analyse ce planning et donne 3-4 conseils concrets pour l'optimiser (regrouper déplacements, équilibrer charge, créneaux creux). Planning:\n"+(planning.join("\n")||"Semaine vide")+"\nRéponds en bullet points courts, en français.";
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:400, messages:[{role:"user",content:prompt}] }) });
    const data = await res.json();
    const texte = data.content?.[0]?.text || "Aucune suggestion.";
    const div = document.createElement("div");
    div.style.cssText = "position:fixed;inset:0;z-index:400;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);padding:20px;";
    div.innerHTML = "<div style=\"background:var(--surface);border:1px solid rgba(167,139,250,.3);border-radius:16px;padding:24px;max-width:480px;width:100%;max-height:80vh;overflow-y:auto;\"><div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;\"><div style=\"font-family:var(--fh);font-size:15px;font-weight:700;color:#a78bfa;\">✨ Optimisation IA — semaine</div><button onclick=\"this.closest(\\'div[style]\\').remove()\" style=\"width:28px;height:28px;border-radius:7px;background:var(--surface-2);border:1px solid var(--border);color:var(--muted);cursor:pointer;font-size:14px;\">✕</button></div><div style=\"font-size:13px;line-height:1.65;white-space:pre-wrap;color:var(--text);\">"+texte+"</div></div>";
    div.addEventListener("click", e => { if (e.target===div) div.remove(); });
    document.body.appendChild(div);
  } catch(e) { alert("IA indisponible"); }
  finally { if (btn) btn.textContent = "✨ Optimiser la semaine"; }
};

document.getElementById("btn-logout").addEventListener("click", async () => {
  await sb.auth.signOut();
  window.location.href = "index.html";
});

// ── Rendu du bouton Google Calendar dans la toolbar ─────────────
function renderGoogleBtn() {
  const el = document.getElementById("gcal-btn-wrap");
  if (!el) return;
  if (googleConnected) {
    el.innerHTML = '<div class="gcal-btn connected"><div class="gcal-sync-dot"></div>Google Calendar connecté</div>';
  } else {
    el.innerHTML = '<a class="gcal-btn disconnected" id="gcal-connect-btn" href="#">🔗 Connecter Google Calendar</a>';
    document.getElementById("gcal-connect-btn")?.addEventListener("click", e => {
      e.preventDefault();
      const token = userSession?.access_token || "";
      window.location.href = FN + "/google-calendar-auth?token=" + encodeURIComponent(token);
    });
  }
}

// ── Gestion du retour OAuth (paramètre URL) ──────────────────────
function handleOAuthReturn() {
  const p = new URLSearchParams(window.location.search);
  if (p.get("google_connected") === "1") {
    googleConnected = true;
    window.history.replaceState({}, "", "calendar.html");
  } else if (p.get("google_error")) {
    console.warn("Google Calendar erreur:", p.get("google_error"));
    window.history.replaceState({}, "", "calendar.html");
  }
}

(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = "index.html"; return; }
  user = session.user;
  userSession = session;

  const [{ data: dos }, { data: rv }, { data: profil }] = await Promise.all([
    sb.from("dossiers").select("*").eq("user_id", user.id),
    sb.from("rdvs").select("*").eq("user_id", user.id),
    sb.from("profils").select("google_connected").eq("user_id", user.id).single(),
  ]);

  dossiers = (dos||[]).map(d => {
    let docs = [];
    try { docs = typeof d.documents === "string" ? JSON.parse(d.documents) : (d.documents||[]); } catch(e) {}
    return { ...d, documents: docs };
  });
  rdvs = rv || [];
  googleConnected = profil?.google_connected || false;

  handleOAuthReturn();
  render();
  renderGoogleBtn();
  // Sync automatique des events dossier vers Google Calendar
  syncAllDossierEvents();

  // Abonnement Realtime — MAJ automatique si Google webhook modifie des rdvs
  sb.channel("rdvs-changes")
    .on("postgres_changes", { event: "*", schema: "public", table: "rdvs", filter: "user_id=eq." + user.id }, payload => {
      if (payload.eventType === "INSERT") {
        const r = payload.new;
        if (!rdvs.find(x => x.id === r.id)) rdvs.push(r);
      } else if (payload.eventType === "UPDATE") {
        rdvs = rdvs.map(x => x.id === payload.new.id ? payload.new : x);
      } else if (payload.eventType === "DELETE") {
        rdvs = rdvs.filter(x => x.id !== payload.old.id);
      }
      render();
    })
    .subscribe();
})();
