<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Artio — Assistant artisan</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a18;min-height:100vh}
    .app{max-width:720px;margin:0 auto;padding:1.5rem 1rem 4rem}
    input,textarea{width:100%;font-family:inherit;font-size:14px;padding:9px 11px;border-radius:8px;border:0.5px solid #d0d0cc;background:#f0eeea;color:#1a1a18;outline:none;transition:border-color .15s}
    input:focus,textarea:focus{border-color:#378ADD}
    textarea{resize:vertical}
    button{font-family:inherit;cursor:pointer}
    .card{background:#fff;border:0.5px solid #e0deda;border-radius:12px;padding:1.25rem;margin-bottom:16px}
    .label{display:block;font-size:12px;font-weight:500;color:#666;margin-bottom:4px}
    .opt{font-weight:400;font-size:11px;margin-left:6px;color:#999}
    .field{margin-bottom:12px}
    .tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
    .tab-btn{padding:8px 14px;border-radius:8px;font-size:13px;border:0.5px solid #d0d0cc;background:#fff;color:#1a1a18;transition:all .15s}
    .tab-btn.active{border:2px solid #378ADD;background:#E6F1FB;color:#185FA5;font-weight:500}
    .btn-primary{width:100%;padding:11px;border-radius:8px;border:none;background:#378ADD;color:#fff;font-size:14px;font-weight:500;margin-top:4px}
    .btn-primary:disabled{background:#B5D4F4;cursor:not-allowed}
    .btn-small{font-size:12px;padding:5px 10px;border-radius:8px;font-weight:500;border:0.5px solid}
    .btn-green{background:#EAF3DE;color:#3B6D11;border-color:#3B6D11}
    .btn-blue{background:#E6F1FB;color:#185FA5;border-color:#185FA5}
    .btn-red{background:#FCEBEB;color:#A32D2D;border-color:#A32D2D}
    .btn-teal{background:#E1F5EE;color:#085041;border-color:#085041}
    .btn-gray{background:transparent;color:#888;border-color:#ccc}
    .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem}
    .badge{display:inline-block;font-size:12px;padding:2px 8px;border-radius:6px;font-weight:500}
    .mode-tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
    .mode-btn{padding:10px;border-radius:8px;font-size:13px;border:0.5px solid #d0d0cc;background:#f0eeea;color:#888}
    .mode-btn.active{border:2px solid #378ADD;background:#E6F1FB;color:#185FA5;font-weight:500}
    .voice-box{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:10px;border:0.5px solid #d0d0cc;background:#f0eeea;cursor:pointer;margin-bottom:20px;transition:all .2s}
    .voice-box.recording{background:#FCEBEB;border-color:#F09595}
    .voice-box.processing{background:#E1F5EE;border-color:#5DCAA5}
    .voice-btn{width:48px;height:48px;border-radius:50%;border:none;color:#fff;font-size:20px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
    .pieces-grid{display:grid;grid-template-columns:1fr 64px 88px 32px;gap:6px}
    .remove-btn{height:38px;border-radius:8px;border:0.5px solid #d0d0cc;background:transparent;color:#888;font-size:18px;display:flex;align-items:center;justify-content:center;width:100%}
    .totaux{background:#f0eeea;border-radius:8px;padding:12px 14px;margin-bottom:14px;font-size:13px}
    .totaux-row{display:flex;justify-content:space-between;color:#666;margin-bottom:3px}
    .totaux-total{display:flex;justify-content:space-between;font-weight:500;color:#1a1a18;border-top:0.5px solid #d0d0cc;padding-top:6px;margin-top:4px}
    .dossier-card{background:#fff;border:0.5px solid #e0deda;border-radius:12px;overflow:hidden;margin-bottom:10px}
    .dossier-header{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;cursor:pointer}
    .dossier-body{border-top:0.5px solid #e0deda;padding:12px 16px;background:#f5f5f3}
    .doc-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0}
    .doc-row+.doc-row{border-top:0.5px solid #e0deda}
    .btn-actions{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
    .result-box{background:#f0eeea;border-radius:8px;padding:1rem;margin-top:16px}
    .result-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
    pre{white-space:pre-wrap;font-size:13px;line-height:1.7;font-family:inherit}
    .preview-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:14px}
    .preview-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:10px}
    .preview-table th{padding:7px 8px;background:#E6F1FB;color:#185FA5;font-weight:500}
    .preview-table td{padding:6px 8px;border-bottom:0.5px solid #e0deda}
    .divider{border-top:0.5px solid #e0deda;padding-top:10px;margin-bottom:10px}
    .auth-box{max-width:400px;margin:4rem auto;padding:0 1rem}
    .auth-logo{text-align:center;margin-bottom:2rem}
    .auth-tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
    .auth-tab{padding:10px;border-radius:8px;font-size:14px;border:0.5px solid #d0d0cc;background:#f0eeea;color:#888}
    .auth-tab.active{border:2px solid #378ADD;background:#E6F1FB;color:#185FA5;font-weight:500}
    .error-msg{background:#FCEBEB;color:#A32D2D;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:12px}
    .success-msg{background:#EAF3DE;color:#3B6D11;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:12px}
    .user-bar{display:flex;align-items:center;gap:8px}
    .user-email{font-size:12px;color:#888}
    @media(max-width:580px){.preview-grid{grid-template-columns:1fr}.btn-actions{gap:4px}.btn-small{font-size:11px;padding:4px 8px}}
  </style>
</head>

function todayFR(){return new Date().toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit",year:"numeric"})}
function addDays(n){const d=new Date();d.setDate(d.getDate()+n);return d.toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit",year:"numeric"})}
function uid(){return"dos_"+Date.now()+Math.random().toString(36).slice(2,6)}
function calcTotaux(h,t,p,r){
  const moHT=(parseFloat(h)||0)*(parseFloat(t)||0);
  const pHT=p.filter(x=>x.description&&x.quantite&&x.prix_unitaire).reduce((a,x)=>a+parseFloat(x.quantite)*parseFloat(x.prix_unitaire),0);
  const totalHT=moHT+pHT;const tv=parseFloat(r)||0;const tva=totalHT*tv/100;
  return{moHT,piecesHT:pHT,totalHT,tvaRate:tv,tva,ttc:totalHT+tva};
}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function getNextNum(type,entreprise){
  const k="artio_ctr_"+type+"_"+(entreprise?.id||"x");
  let n=(parseInt(localStorage.getItem(k)||"0"))+1;
  localStorage.setItem(k,n);
  return(type==="devis"?"DEV":"FACT")+"-2026-"+String(n).padStart(3,"0");
}

// ——— API CLAUDE ———
async function callClaude(prompt,maxTokens=400){
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":S.entreprise.api_key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:maxTokens,messages:[{role:"user",content:prompt}]})
  });
  const d=await res.json();
  if(d.error)throw new Error(d.error.message);
  return d.content?.map(b=>b.text||"").join("")||"";
}

// ——— VOICE ———
let recognition=null;
let voiceBuffer="";
let lastResultIndex=0;
function startVoiceGeneric(onResult){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){alert("Dictée non supportée. Utilisez Chrome.");return}
  recognition=new SR();
  voiceBuffer="";
  lastResultIndex=0;
  recognition.lang="fr-FR";recognition.continuous=true;recognition.interimResults=true;
  recognition.onstart=()=>set({voiceState:"recording",voiceTranscript:""});
  recognition.onresult=e=>{
    let interim="";
    // Traiter seulement les nouveaux résultats depuis lastResultIndex
    for(let i=lastResultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal){
        voiceBuffer+=e.results[i][0].transcript+" ";
        lastResultIndex=i+1;
      } else {
        interim=e.results[i][0].transcript;
      }
    }
    S.voiceTranscript=(voiceBuffer+interim).trim();
    render();
  };
  recognition.onerror=e=>{
    if(e.error!=="aborted"&&e.error!=="no-speech"){set({voiceState:"idle"});alert("Erreur micro : "+e.error)}
  };
  recognition.onend=()=>{
    if(S.voiceState==="recording") recognition.start();
  };
  recognition.start();
}

window.stopVoice=async()=>{
  if(!recognition)return;
  recognition.onend=null; // Empêcher le relancement auto
  recognition.stop();
  const transcript=(voiceBuffer||S.voiceTranscript||"").trim();
  if(!transcript){set({voiceState:"idle"});return}
  set({voiceState:"processing",voiceTranscript:transcript});
  await window._voiceCallback(transcript);
  set({voiceState:"idle"});
  setTimeout(()=>set({voiceTranscript:""}),3000);
};

window.startVoice=()=>{
  window._voiceCallback=async t=>{
    try{
      const raw=await callClaude("Extrait les informations de cette dictée pour un plombier. Réponds UNIQUEMENT en JSON valide sans texte avant ou après.\nDictée: \""+t+"\"\nTaux horaire: "+S.entreprise.taux_horaire+"€/h\nJSON attendu: {\"client_nom\":\"...\",\"client_adresse\":\"...\",\"client_tel\":\"...\",\"client_email\":\"...\",\"adresse_travaux\":\"...\",\"travaux\":\"...\",\"nb_heures\":\"chiffre\",\"tva\":\"chiffre\",\"pieces\":[{\"description\":\"...\",\"quantite\":\"chiffre\",\"prix_unitaire\":\"chiffre\"}]}",600);
      const p=JSON.parse(raw.replace(/```json|```/g,"").trim());
      const nf={...S.fields};
      Object.entries(p).forEach(([k,v])=>{if(k!=="pieces"&&v!==null&&v!=="null"&&v!=="")nf[k]=String(v)});
      S.fields=nf;
      if(p.pieces?.length)S.pieces=p.pieces.filter(x=>x.description&&x.description!=="...").map(x=>({description:x.description,quantite:String(x.quantite||"1"),prix_unitaire:String(x.prix_unitaire||"")}));
      render();
    }catch(e){console.error("Voice parse error",e)}
  };
  startVoiceGeneric(window._voiceCallback);
};

window.startVoiceSuivi=()=>{
  window._voiceCallback=async t=>{
    try{
      const raw=await callClaude("Extrait les informations de ce résumé oral de chantier. Réponds UNIQUEMENT en JSON valide.\nDictée: \""+t+"\"\nJSON: {\"client_nom\":\"...\",\"adresse_travaux\":\"...\",\"avancement\":\"résumé complet\",\"suite\":\"prochaine étape ou null\",\"contexte\":\"contexte ou null\"}",400);
      const p=JSON.parse(raw.replace(/```json|```/g,"").trim());
      const nf={...S.fields};
      Object.entries(p).forEach(([k,v])=>{if(v!==null&&v!=="null"&&v!=="")nf[k]=String(v)});
      S.fields=nf;
      render();
    }catch(e){console.error("Voice suivi error",e)}
  };
  startVoiceGeneric(window._voiceCallback);
};

window.handleGenerate=async()=>{
  document.querySelectorAll("input[data-fid],textarea[data-fid]").forEach(el=>{S.fields[el.dataset.fid]=el.value});
  document.querySelectorAll("input[data-pid]").forEach(el=>{
    const[i,k]=el.dataset.pid.split("_");
    if(!S.pieces[i])S.pieces[i]={};S.pieces[i][k]=el.value;
  });
  const e=S.entreprise,f=S.fields,tab=S.tab;
  if(!e.api_key){alert("Configure d'abord ta clé API.");return}
  if(tab==="email"){
    const req=S.emailMode==="reponse"?["client_nom","message"]:["client_nom","avancement"];
    const miss=req.filter(id=>!(f[id]||"").trim());
    if(miss.length){alert("Champs manquants : "+miss.join(", "));return}
    set({loading:true,generatedText:""});
    try{
      const prompt=S.emailMode==="reponse"
        ?`Rédige une réponse email professionnelle pour ${e.nom}.\nClient : ${f.client_nom}\nMessage : ${f.message}\nContexte : ${f.contexte||"aucun"}\nSigne "${e.nom}".`
        :`Rédige un email de mise à jour chantier pour ${e.nom}.\nClient : ${f.client_nom}\nChantier : ${f.adresse_travaux||""}\nAvancement : ${f.avancement}\nProchaine étape : ${f.suite||"à définir"}\nContexte : ${f.contexte||"aucun"}\nSigne "${e.nom}".`;
      const text=await callClaude(prompt,500);
      set({loading:false,generatedText:text});
    }catch(err){set({loading:false,generatedText:"Erreur : "+err.message})}
    return;
  }
  const req=["client_nom","client_adresse","travaux","nb_heures","tva"];
  const miss=req.filter(id=>!(f[id]||"").trim());
  if(miss.length){alert("Champs manquants : "+miss.join(", "));return}
  set({loading:true,generatedDoc:null});
  try{
    const docNumber=getNextNum(tab,e);
    const pv=S.pieces.filter(p=>p.description&&p.quantite&&p.prix_unitaire);
    const totaux=calcTotaux(f.nb_heures,e.taux_horaire,pv,f.tva);
    const desc=await callClaude(`Rédige en 2-3 phrases professionnelles la description de ces travaux de plomberie : ${f.travaux}. Paragraphe fluide, pas de liste.`,300);
    const doc={type:tab,docNumber,date:todayFR(),validUntil:tab==="devis"?addDays(30):null,accepte:false,entreprise:{...e},client:{nom:f.client_nom,adresse:f.client_adresse,tel:f.client_tel||"",email:f.client_email||""},adresse_travaux:f.adresse_travaux||f.client_adresse,description:desc,nb_heures:f.nb_heures,pieces:pv,...totaux};
    const nom=f.client_nom+" — "+f.travaux.slice(0,40)+(f.travaux.length>40?"...":"");
    const dos={id:uid(),nom,client:f.client_nom,statut:tab==="devis"?"devis_envoye":"facture",createdAt:todayFR(),documents:[doc]};
    await upsertDossier(dos);
    S.dossiers=[dos,...S.dossiers];
    set({loading:false,generatedDoc:doc,openDossier:dos.id,tab:"historique"});
  }catch(err){set({loading:false});alert("Erreur : "+err.message)}
};

function generatePDF(doc){
  const{jsPDF}=window.jspdf;
  const pdf=new jsPDF({unit:"mm",format:"a4"});
  const W=210,m=18,cW=W-2*m,rX=W-m;let y=m;
  pdf.setFontSize(16).setFont(undefined,"bold").text(doc.entreprise.nom,m,y);y+=6;
  pdf.setFontSize(9).setFont(undefined,"normal").text(doc.entreprise.adresse,m,y);y+=5;
  pdf.text("Tél : "+doc.entreprise.tel,m,y);y+=4;
  pdf.text("Email : "+doc.entreprise.email,m,y);y+=4;
  pdf.text("SIRET : "+doc.entreprise.siret,m,y);
  pdf.setFontSize(20).setFont(undefined,"bold").text(doc.type==="devis"?"DEVIS":"FACTURE",rX,m,{align:"right"});
  pdf.setFontSize(10).setFont(undefined,"normal");
  pdf.text("N° "+doc.docNumber,rX,m+9,{align:"right"});
  pdf.text("Date : "+doc.date,rX,m+15,{align:"right"});
  if(doc.validUntil)pdf.text("Valable jusqu'au : "+doc.validUntil,rX,m+21,{align:"right"});
  y=58;pdf.setDrawColor(220,220,220).line(m,y,W-m,y);y+=8;
  pdf.setFontSize(9).setFont(undefined,"bold").text("CLIENT",m,y);y+=5;
  pdf.setFont(undefined,"normal").text(doc.client.nom,m,y);y+=4;
  pdf.text(doc.client.adresse,m,y);y+=4;
  if(doc.client.tel){pdf.text("Tél : "+doc.client.tel,m,y);y+=4}
  y+=3;
  if(doc.adresse_travaux){pdf.setFont(undefined,"bold").text("ADRESSE DES TRAVAUX",m,y);y+=5;pdf.setFont(undefined,"normal").text(doc.adresse_travaux,m,y);y+=8}
  pdf.setFont(undefined,"bold").text("DESCRIPTION DES TRAVAUX",m,y);y+=5;
  pdf.setFont(undefined,"normal");
  const dl=pdf.splitTextToSize(doc.description,cW);
  pdf.text(dl,m,y);y+=dl.length*4.5+6;
  const tb=[["Main d'œuvre ("+doc.nb_heures+"h × "+doc.entreprise.taux_horaire+"€/h)",doc.nb_heures,parseFloat(doc.entreprise.taux_horaire).toFixed(2)+" €",doc.moHT.toFixed(2)+" €"],...doc.pieces.map(p=>[p.description,p.quantite,parseFloat(p.prix_unitaire).toFixed(2)+" €",(parseFloat(p.quantite)*parseFloat(p.prix_unitaire)).toFixed(2)+" €"])];
  pdf.autoTable({startY:y,head:[["Description","Qté","Prix unit. HT","Total HT"]],body:tb,margin:{left:m,right:m},styles:{fontSize:9,cellPadding:3},headStyles:{fillColor:[55,138,221],textColor:255,fontStyle:"bold"},columnStyles:{0:{cellWidth:90},1:{cellWidth:18,halign:"center"},2:{cellWidth:34,halign:"right"},3:{cellWidth:28,halign:"right"}}});
  y=pdf.lastAutoTable.finalY+6;
  pdf.setFontSize(9).setFont(undefined,"normal");
  pdf.text("Total HT :",145,y);pdf.text(doc.totalHT.toFixed(2)+" €",rX,y,{align:"right"});y+=5;
  pdf.text("TVA ("+doc.tvaRate+"%) :",145,y);pdf.text(doc.tva.toFixed(2)+" €",rX,y,{align:"right"});y+=5;
  pdf.setFont(undefined,"bold").setFontSize(11).text("TOTAL TTC :",145,y);pdf.text(doc.ttc.toFixed(2)+" €",rX,y,{align:"right"});y+=10;
  pdf.setFont(undefined,"normal").setFontSize(8).setTextColor(80);
  if(doc.type==="devis"){pdf.text("Conditions : 30% d'acompte à la commande, solde à réception des travaux.",m,y);y+=4;pdf.text("Devis valable 30 jours. Garantie décennale applicable.",m,y);y+=12;pdf.setTextColor(0).setFontSize(9).text("Bon pour accord — Date et signature du client :",m,y);y+=14;pdf.setDrawColor(180).line(m,y,m+80,y)}
  else{pdf.text("Paiement à 30 jours. Pénalités de retard : 3× le taux légal. Indemnité forfaitaire : 40 €.",m,y)}
  try{pdf.addImage("data:image/png;base64,"+LOGO_WHITE,"PNG",m,280,22,7)}catch{}
  pdf.setFontSize(7).setTextColor(150).text(doc.entreprise.nom+" — SIRET : "+doc.entreprise.siret,W/2,287,{align:"center"});
  pdf.save(doc.docNumber+".pdf");
}

  else txt=`<p style="font-size:12px;color:#888;font-style:italic;">✓ "${esc(S.voiceTranscript)}"</p>`;
  return`<div class="voice-box ${bg}" onclick="${vs==="idle"?fn:""}">
    <button class="voice-btn" style="background:${btnBg};" onclick="event.stopPropagation();${vs==="recording"?"stopVoice()":fn};">${icon}</button>
    <div style="flex:1;">${txt}</div>
  </div>`;
}

function renderPieces(){
  const p=S.pieces;
  return`<div style="margin-bottom:14px;">
    <label class="label" style="margin-bottom:8px;">Pièces / matériaux</label>
    <div class="pieces-grid" style="margin-bottom:4px;">
      ${["Description","Qté","Prix HT €",""].map(h=>`<span style="font-size:11px;color:#888;">${h}</span>`).join("")}
    </div>
    ${p.map((x,i)=>`<div class="pieces-grid" style="margin-bottom:6px;">
      <input value="${esc(x.description)}" placeholder="Ex: Chauffe-eau 200L" data-pid="${i}_description" />
      <input type="number" value="${esc(x.quantite)}" min="1" data-pid="${i}_quantite" />
      <input type="number" value="${esc(x.prix_unitaire)}" placeholder="0.00" data-pid="${i}_prix_unitaire" />
      <button class="remove-btn" onclick="S.pieces.splice(${i},1);render()">×</button>
    </div>`).join("")}
    <button class="btn-small btn-gray" style="font-size:12px;padding:6px 12px;" onclick="S.pieces.push({description:'',quantite:'1',prix_unitaire:''});render()">+ Ajouter une pièce</button>
  </div>`;
}

function renderTotaux(){
  const f=S.fields,e=S.entreprise,p=S.pieces;
  if(!f.nb_heures||!e.taux_horaire)return"";
  const t=calcTotaux(f.nb_heures,e.taux_horaire,p,f.tva);
  return`<div class="totaux">
    <div class="totaux-row"><span>Main d'œuvre (${f.nb_heures}h × ${e.taux_horaire}€)</span><span>${t.moHT.toFixed(2)} € HT</span></div>
    <div class="totaux-row"><span>Fournitures</span><span>${t.piecesHT.toFixed(2)} € HT</span></div>
    <div class="totaux-total"><span>Total HT</span><span>${t.totalHT.toFixed(2)} €</span></div>
    ${parseFloat(f.tva)>0?`<div class="totaux-total"><span>Total TTC (${f.tva}%)</span><span>${t.ttc.toFixed(2)} €</span></div>`:""}
  </div>`;
}

function renderDevisFacture(){
  const f=S.fields,tab=S.tab,e=S.entreprise;
  const fields=[
    ["client_nom","Nom du client","Ex: M. Dupont","text",false],
    ["client_adresse","Adresse du client","Ex: 12 rue de la Paix, 75001 Paris","text",false],
    ["client_tel","Téléphone client","Ex: 06 12 34 56 78","text",true],
    ["client_email","Email client","Ex: dupont@email.com","text",true],
    ["adresse_travaux","Adresse des travaux","Si différente de l'adresse client","text",true],
    ["travaux",tab==="devis"?"Description des travaux":"Travaux réalisés","Ex: Remplacement chauffe-eau 200L...","textarea",false],
    ["nb_heures","Heures main d'œuvre"+(e.taux_horaire?" ("+e.taux_horaire+" €/h HT)":""),"Ex: 3","number",false],
    ["tva","TVA (%)","10 (rénovation) ou 20 (neuf)","text",false],
  ];
  return`<div class="card">
    ${renderVoice("devis")}
    ${fields.map(([id,label,ph,type,opt])=>`<div class="field">
      <label class="label">${label}${opt?`<span class="opt">(optionnel)</span>`:""}</label>
      ${type==="textarea"?`<textarea placeholder="${ph}" data-fid="${id}">${esc(f[id]||"")}</textarea>`:`<input type="${type}" value="${esc(f[id]||"")}" placeholder="${ph}" data-fid="${id}" oninput="S.fields['${id}']=this.value;${id==='nb_heures'||id==='tva'?'render()':''}" />`}
    </div>`).join("")}
    ${renderPieces()}
    ${renderTotaux()}
    <button class="btn-primary" ${S.loading?"disabled":""} onclick="handleGenerate()">${S.loading?"Génération en cours...":"Générer"}</button>
  </div>
  ${S.generatedDoc?`<div class="card">${renderDocPreview(S.generatedDoc)}</div>`:""}`;
}

function renderEmail(){
  const f=S.fields,m=S.emailMode;
  const reponseF=[["client_nom","Nom du client","Ex: M. Martin","text",false],["message","Message reçu du client","Colle ici le message...","textarea",false],["contexte","Contexte","Ex: le retard est dû à une livraison...","textarea",true]];
  const suiviF=[["client_nom","Nom du client","Ex: M. Dupont","text",false],["adresse_travaux","Adresse du chantier","Ex: 12 rue de la Paix","text",true],["avancement","Où en sont les travaux","Ex: chauffe-eau posé, mise en service demain...","textarea",false],["suite","Prochaine étape","Ex: retour jeudi matin","text",true],["contexte","Contexte","Ex: retard livraison pièce...","textarea",true]];
  const activeF=m==="reponse"?reponseF:suiviF;
  return`<div class="card">
    <div class="mode-tabs">
      <button class="mode-btn ${m==="reponse"?"active":""}" onclick="setEmailMode('reponse')">💬 Répondre à un message</button>
      <button class="mode-btn ${m==="suivi"?"active":""}" onclick="setEmailMode('suivi')">🔧 Mise à jour chantier</button>
    </div>
    ${m==="suivi"?renderVoice("suivi"):""}
    ${activeF.map(([id,label,ph,type,opt])=>`<div class="field">
      <label class="label">${label}${opt?`<span class="opt">(optionnel)</span>`:""}</label>
      ${type==="textarea"?`<textarea placeholder="${ph}" data-fid="${id}">${esc(f[id]||"")}</textarea>`:`<input type="${type}" value="${esc(f[id]||"")}" placeholder="${ph}" data-fid="${id}" oninput="S.fields['${id}']=this.value" />`}
    </div>`).join("")}
    <button class="btn-primary" ${S.loading?"disabled":""} onclick="handleGenerate()">${S.loading?"Génération en cours...":"Générer l'email"}</button>
    ${S.generatedText?`<div class="result-box">
      <div class="result-header">
        <span style="font-size:13px;font-weight:500;color:#666;">Email généré — copie et envoie depuis ta messagerie</span>
        <button class="btn-small ${S.copied?"btn-green":"btn-gray"}" onclick="copyText(${JSON.stringify(S.generatedText)})">${S.copied?"Copié ✓":"Copier"}</button>
      </div>
      <pre>${esc(S.generatedText)}</pre>
    </div>`:""}
  </div>`;
}

function renderHistorique(){
  if(!S.dossiers.length)return`<div class="card" style="text-align:center;padding:2rem;"><p style="color:#888;font-size:13px;">Aucun dossier pour l'instant.</p><p style="color:#999;font-size:12px;margin-top:8px;">Génère un devis pour créer ton premier dossier.</p></div>`;
  return S.dossiers.map(dos=>{
    const st=STATUTS[dos.statut]||STATUTS.devis_envoye;
    const isOpen=S.openDossier===dos.id;
    const hasFacture=dos.documents.some(d=>d.type==="facture");
    return`<div class="dossier-card">
      <div class="dossier-header" onclick="toggleDossier('${dos.id}')">
        <div style="flex:1;min-width:0;">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px;">
            <span class="badge" style="background:${st.bg};color:${st.color};">${st.label}</span>
            <span style="font-size:13px;font-weight:500;">${esc(dos.nom)}</span>
          </div>
          <p style="font-size:12px;color:#888;">${dos.documents.length} document${dos.documents.length>1?"s":""} · ${dos.createdAt}</p>
        </div>
        <div style="display:flex;align-items:center;gap:8px;margin-left:12px;">
          ${dos.statut!=="termine"?`<button class="btn-small btn-teal" onclick="event.stopPropagation();markTermine('${dos.id}')">✓ Clôturer</button>`:""}
          ${S.deleteConfirm==="dos_"+dos.id?`<button class="btn-small btn-red" onclick="event.stopPropagation();confirmDeleteDossier('${dos.id}')">Confirmer</button><button class="btn-small btn-gray" onclick="event.stopPropagation();set({deleteConfirm:null})">✕</button>`:`<button class="btn-small btn-red" onclick="event.stopPropagation();set({deleteConfirm:'dos_${dos.id}'})">🗑</button>`}
          <span style="color:#888;">${isOpen?"▲":"▼"}</span>
        </div>
      </div>
      ${isOpen?`<div class="dossier-body">
        ${dos.documents.map(doc=>`
          <div class="doc-row">
            <div style="cursor:pointer;" onclick="togglePreview('${doc.docNumber}')">
              <div style="display:flex;align-items:center;gap:8px;">
                <span style="font-size:16px;">${doc.type==="devis"?"📋":"💶"}</span>
                <div>
                  <span style="font-size:13px;font-weight:500;">${doc.docNumber}</span>
                  ${doc.accepte?`<span style="font-size:11px;color:#3B6D11;margin-left:6px;">✓ Accepté</span>`:""}
                  <p style="font-size:12px;color:#888;margin-top:1px;">${doc.date} · ${doc.ttc.toFixed(2)} € TTC</p>
                </div>
              </div>
            </div>
            <div class="btn-actions">
              <button class="btn-small btn-green" onclick='generatePDF(${JSON.stringify(doc).replace(/'/g,"\'")})'>⬇ PDF</button>
              ${doc.type==="devis"&&!doc.accepte?`<button class="btn-small btn-blue" onclick="markAccepte('${dos.id}','${doc.docNumber}')">Marquer accepté</button>`:""}
              ${doc.type==="devis"&&doc.accepte&&!hasFacture?`<button class="btn-small btn-teal" onclick="convertToFacture('${dos.id}','${doc.docNumber}')">${S.convertingId===doc.docNumber?"...":"💶 Convertir"}</button>`:""}
              ${S.deleteConfirm===doc.docNumber?`<button class="btn-small btn-red" onclick="confirmDeleteDoc('${dos.id}','${doc.docNumber}')">Confirmer</button><button class="btn-small btn-gray" onclick="set({deleteConfirm:null})">✕</button>`:`<button class="btn-small" style="background:transparent;color:#A32D2D;border-color:#F09595;" onclick="set({deleteConfirm:'${doc.docNumber}'})">🗑</button>`}
            </div>
          </div>
          ${S.previewDocNum===doc.docNumber?`<div style="background:#fff;border-radius:8px;padding:1rem;margin-bottom:8px;border:0.5px solid #e0deda;">${renderDocPreview(doc)}</div>`:""}
        `).join("")}
      </div>`:""}
    </div>`;
  }).join("");
}

function renderDocPreview(doc){
  return`<div style="font-size:13px;line-height:1.7;">
    <div class="preview-grid">
      <div><p style="font-weight:500;margin-bottom:2px;">${esc(doc.entreprise.nom)}</p><p style="color:#888;font-size:12px;">${esc(doc.entreprise.adresse)}<br/>${esc(doc.entreprise.tel)} — ${esc(doc.entreprise.email)}<br/>SIRET : ${esc(doc.entreprise.siret)}</p></div>
      <div style="text-align:right;"><p style="font-weight:500;font-size:16px;margin-bottom:2px;">${doc.type==="devis"?"DEVIS":"FACTURE"}</p><p style="color:#888;font-size:12px;">N° ${doc.docNumber}<br/>Date : ${doc.date}${doc.validUntil?"<br/>Valable jusqu'au : "+doc.validUntil:""}</p></div>
    </div>
    <div class="divider"><p style="font-size:12px;font-weight:500;color:#888;margin-bottom:3px;">CLIENT</p><p>${esc(doc.client.nom)}<br/>${esc(doc.client.adresse)}${doc.client.tel?"<br/>Tél : "+esc(doc.client.tel):""}</p></div>
    ${doc.adresse_travaux?`<div style="margin-bottom:10px;"><p style="font-size:12px;font-weight:500;color:#888;margin-bottom:3px;">ADRESSE DES TRAVAUX</p><p>${esc(doc.adresse_travaux)}</p></div>`:""}
    <div style="margin-bottom:12px;"><p style="font-size:12px;font-weight:500;color:#888;margin-bottom:3px;">DESCRIPTION</p><p>${esc(doc.description)}</p></div>
    <table class="preview-table">
      <thead><tr><th style="text-align:left;">Description</th><th style="text-align:right;">Qté</th><th style="text-align:right;">Prix unit. HT</th><th style="text-align:right;">Total HT</th></tr></thead>
      <tbody>
        <tr><td>Main d'œuvre (${doc.nb_heures}h × ${doc.entreprise.taux_horaire} €/h)</td><td style="text-align:right;">${doc.nb_heures}</td><td style="text-align:right;">${parseFloat(doc.entreprise.taux_horaire).toFixed(2)} €</td><td style="text-align:right;">${doc.moHT.toFixed(2)} €</td></tr>
        ${doc.pieces.map(p=>`<tr><td>${esc(p.description)}</td><td style="text-align:right;">${p.quantite}</td><td style="text-align:right;">${parseFloat(p.prix_unitaire).toFixed(2)} €</td><td style="text-align:right;">${(parseFloat(p.quantite)*parseFloat(p.prix_unitaire)).toFixed(2)} €</td></tr>`).join("")}
      </tbody>
    </table>
    <div style="text-align:right;font-size:13px;">
      <p style="margin:3px 0;color:#888;">Total HT : ${doc.totalHT.toFixed(2)} €</p>
      <p style="margin:3px 0;color:#888;">TVA (${doc.tvaRate}%) : ${doc.tva.toFixed(2)} €</p>
      <p style="margin:6px 0 0;font-weight:500;font-size:15px;">Total TTC : ${doc.ttc.toFixed(2)} €</p>
    </div>
    ${doc.type==="devis"?`<div style="margin-top:12px;padding:10px;background:#f0eeea;border-radius:8px;font-size:11px;color:#888;">Conditions : 30% d'acompte à la commande, solde à réception. Devis valable 30 jours. Garantie décennale applicable.</div>`:""}
  </div>`;
}

// ——— INIT ———
async function initDB(){
  try { await initAuth(); }
  catch(e){ document.getElementById("root").innerHTML="<p style='padding:2rem;color:red;'>Erreur : "+e.message+"</p>"; }
}
initDB();
</script>
</body>
